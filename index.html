<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, system-ui;
    background: #0b0b0b;
    color: #fff;
}
.wrapper {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 460px;
}
#output {
    min-height: 220px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
}
.actions {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    font-size: 12px;
}
.actions span { cursor: pointer; }
select, input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #fff;
    text-align: center;
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="output"></div>
</div>

<div class="actions">
    <span onclick="generate()">generate</span>

    <select id="countrySelect"></select>

    <span>bulk <input id="bulkInput" type="number" value="5" min="1" max="2000"></span>

    <span onclick="runBulk()">run</span>
    <span onclick="copy()">copy</span>
    <span onclick="downloadJSON()">json</span>
    <span onclick="downloadCSV()">csv</span>
</div>

<script>

/* =========================
   COUNTRY ENGINE
========================= */

const BASE_COUNTRIES = [
{ name:"USA", code:"+1", cities:["New York","Los Angeles","Chicago","Houston","Miami"] },
{ name:"UK", code:"+44", cities:["London","Manchester","Liverpool","Birmingham"] },
{ name:"Germany", code:"+49", cities:["Berlin","Munich","Hamburg","Frankfurt"] },
{ name:"France", code:"+33", cities:["Paris","Lyon","Marseille","Nice"] },
{ name:"Spain", code:"+34", cities:["Madrid","Barcelona","Valencia"] },
{ name:"Italy", code:"+39", cities:["Rome","Milan","Naples"] },
{ name:"Netherlands", code:"+31", cities:["Amsterdam","Rotterdam","Utrecht"] },
{ name:"Canada", code:"+1", cities:["Toronto","Vancouver","Montreal"] },
{ name:"Australia", code:"+61", cities:["Sydney","Melbourne","Brisbane"] },
{ name:"Japan", code:"+81", cities:["Tokyo","Osaka","Kyoto"] }
];

const EXTRA = [
"Brazil","Argentina","Mexico","Poland","Sweden","Norway","Finland","Denmark",
"Portugal","Greece","Turkey","Ukraine","Romania","Hungary","Czech Republic",
"Austria","Switzerland","Belgium","Ireland","India","China","South Korea",
"Indonesia","Thailand","Vietnam","Philippines","Malaysia","Singapore",
"Pakistan","Bangladesh","South Africa","Egypt","Nigeria","Kenya",
"Saudi Arabia","UAE","Israel","Chile","Peru","Colombia"
];

const COUNTRIES = [...BASE_COUNTRIES];

EXTRA.forEach(c=>{
    COUNTRIES.push({
        name: c,
        code: "+" + Math.floor(1 + Math.random()*99),
        cities: ["Capital","Metro","City Center"]
    });
});

/* =========================
   NAMES (100+)
========================= */

const FIRST = [
"James","John","Robert","Michael","William","David","Richard","Joseph","Thomas","Charles",
"Emma","Olivia","Sophia","Isabella","Mia","Charlotte","Amelia","Harper","Evelyn","Abigail"
];

const LAST = [
"Smith","Johnson","Brown","Taylor","Anderson","Thomas","Jackson","White","Harris","Martin",
"Thompson","Garcia","Martinez","Robinson","Clark","Rodriguez","Lewis","Lee","Walker","Hall"
];

for(let i=0;i<80;i++){
    FIRST.push("Name"+i);
    LAST.push("Surname"+i);
}

/* =========================
   INIT DROPDOWN
========================= */

const select = document.getElementById("countrySelect");

select.innerHTML = `<option value="all">all</option>` +
    COUNTRIES.map(c=>`<option>${c.name}</option>`).join("");

/* =========================
   CORE
========================= */

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function randomZip(){
    return Math.floor(10000 + Math.random()*90000);
}
function createUser(){

    const selected = select.value;

    const pool = selected === "all"
        ? COUNTRIES
        : COUNTRIES.filter(c => c.name === selected);

    const country = pick(pool);

    const first = pick(FIRST);
    const last = pick(LAST);

    const username = (first + last + Math.floor(Math.random()*9999)).toLowerCase();

    return {
        username,
        name: first + " " + last,
        email: username + "@gmail.com",
        phone: country.code + Math.floor(100000000 + Math.random()*900000000),
        country: country.name,
        city: pick(country.cities),
        address: "Street " + Math.floor(Math.random()*300),
        zip: randomZip()
    };
}

/* =========================
   FORMAT
========================= */

function format(u){
return `Username: ${u.username}
Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
Address: ${u.address}
ZIP: ${u.zip}`;
}

/* =========================
   RENDER
========================= */

const output = document.getElementById("output");
let lastData = [];

function render(text){
    output.textContent = text;
}

/* =========================
   ACTIONS
========================= */

function generate(){
    const u = createUser();
    lastData = [u];
    render(format(u));
}

function runBulk(){
    const count = Math.min(2000, parseInt(document.getElementById("bulkInput").value || 5));

    const arr = new Array(count);

    for(let i=0;i<count;i++){
        arr[i] = createUser();
    }

    lastData = arr;

    render(arr.map(format).join("\n\n"));
}

function copy(){
    navigator.clipboard.writeText(output.textContent);
}

function downloadJSON(){
    const blob = new Blob([JSON.stringify(lastData,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.json";
    a.click();
}

function downloadCSV(){
    const rows = ["Username,Name,Email,Phone,Country,City,Address,ZIP"];

    lastData.forEach(u=>{
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.address},${u.zip}`);
    });

    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();
}

</script>

</body>
</html>

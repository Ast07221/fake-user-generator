<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cyber User Generator Pro</title>

<link rel="stylesheet" href="style.css"/>

</head>

<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">CYBER USER GENERATOR</div>
    <div class="status">● ONLINE SYSTEM</div>
  </header>

  <!-- MAIN PANEL -->
  <section class="panel">

    <div class="title">
      Fake Data Engine v3
    </div>

    <div class="subtitle">
      High-performance user generator for testing, APIs, QA systems
    </div>

    <!-- OUTPUT -->
    <textarea id="userOut" readonly></textarea>

    <!-- CONTROLS -->
    <div class="controls">

      <button id="genBtn">Generate</button>

      <input id="bulkCount" type="number" value="50" min="1" max="10000"/>

      <button id="bulkBtn">Bulk</button>

      <button id="copyBtn">Copy</button>

      <button onclick="exportJSON()">JSON</button>

      <button onclick="exportCSV()">CSV</button>

    </div>

  </section>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>

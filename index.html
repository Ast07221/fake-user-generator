<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Generator Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, system-ui;
    background: #0b0b0b;
    color: #fff;
}

/* CENTER */
.wrapper {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 440px;
}

/* STATUS */
#status {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 10px;
}

/* OUTPUT */
#output {
    font-size: 15px;
    line-height: 1.6;
}

/* ROW */
.card {
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid #222;
}

.key {
    color: #888;
}

/* SELECT */
select {
    width: 100%;
    margin-bottom: 15px;
    background: #111;
    color: #fff;
    border: none;
    padding: 8px;
    border-radius: 8px;
}

/* ACTIONS */
.actions {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    font-size: 12px;
}

.actions span {
    cursor: pointer;
    padding: 6px 10px;
    background: #151515;
    border-radius: 8px;
}

/* INPUT */
#bulkInput {
    width: 50px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #fff;
    text-align: center;
}

/* DOTS */
.dots::after {
    content: "...";
    animation: blink 1.2s infinite;
}
@keyframes blink {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}
</style>
</head>

<body>

<div class="wrapper">

    <div id="status"><span class="dots">idle</span></div>

    <!-- FILTER -->
    <select id="countrySelect">
        <option value="random">🌍 Random Country</option>
    </select>

    <div id="output"></div>

</div>

<div class="actions">
    <span onclick="generate()">generate</span>

    <span>
        bulk <input id="bulkInput" type="number" value="5">
    </span>

    <span onclick="runBulk()">run</span>
    <span onclick="copy()">copy</span>
    <span onclick="downloadJSON()">json</span>
    <span onclick="downloadCSV()">csv</span>
</div>

<script>

/* ===== DATA ===== */

const countries = [
{country:"USA", city:"New York", zip:"10001", code:"+1"},
{country:"Germany", city:"Berlin", zip:"10115", code:"+49"},
{country:"France", city:"Paris", zip:"75001", code:"+33"},
{country:"UK", city:"London", zip:"EC1A", code:"+44"},
{country:"Italy", city:"Rome", zip:"00100", code:"+39"},
{country:"Spain", city:"Madrid", zip:"28001", code:"+34"},
{country:"Netherlands", city:"Amsterdam", zip:"1012", code:"+31"},
{country:"Canada", city:"Toronto", zip:"M5H", code:"+1"},
{country:"Japan", city:"Tokyo", zip:"100-0001", code:"+81"},
{country:"Australia", city:"Sydney", zip:"2000", code:"+61"}
];

const firstNames = ["John","Emma","Liam","Olivia","Noah","Ava","Lucas","Mia"];
const lastNames = ["Smith","Johnson","Brown","Taylor","Anderson","Thomas"];

/* ===== INIT SELECT ===== */

const select = document.getElementById("countrySelect");

countries.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.country;
    opt.textContent = c.country;
    select.appendChild(opt);
});

/* ===== CORE ===== */

function pick(arr) {
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateUser() {

    let loc;

    if (select.value === "random") {
        loc = pick(countries);
    } else {
        loc = countries.find(c => c.country === select.value);
    }

    const first = pick(firstNames);
    const last = pick(lastNames);

    const username = (first+last+Math.floor(Math.random()*999)).toLowerCase();

    return {
        username,
        name: first + " " + last,
        email: username + "@gmail.com",
        phone: loc.code + " " + Math.floor(100000000 + Math.random()*900000000),
        country: loc.country,
        city: loc.city,
        address: "Street " + Math.floor(Math.random()*200),
        zip: loc.zip
    };
}

/* ===== RENDER ===== */

const output = document.getElementById("output");
const statusEl = document.getElementById("status");
const bulkInput = document.getElementById("bulkInput");

let lastData = [];
let running = false;

async function render(arr) {
    output.innerHTML = "";

    for (let u of arr) {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
        <div><span class="key">Name:</span> ${u.name}</div>
        <div><span class="key">Email:</span> ${u.email}</div>
        <div><span class="key">Phone:</span> ${u.phone}</div>
        <div><span class="key">Country:</span> ${u.country}</div>
        <div><span class="key">City:</span> ${u.city}</div>
        <div><span class="key">ZIP:</span> ${u.zip}</div>
        `;

        output.appendChild(div);

        await new Promise(r => setTimeout(r, 20));
    }
}

/* ===== ACTIONS ===== */

async function generate() {
    if (running) return;
    running = true;

    statusEl.innerHTML = `<span class="dots">processing</span>`;

    const u = generateUser();
    lastData = [u];

    await render([u]);

    statusEl.innerHTML = `<span class="dots">idle</span>`;
    running = false;
}

async function runBulk() {
    if (running) return;
    running = true;

    statusEl.innerHTML = `<span class="dots">processing</span>`;

    const count = Math.min(50, parseInt(bulkInput.value || 5));
    const arr = [];

    for (let i = 0; i < count; i++) {
        arr.push(generateUser());
    }

    lastData = arr;

    await render(arr);

    statusEl.innerHTML = `<span class="dots">idle</span>`;
    running = false;
}

/* ===== EXPORT ===== */

function copy() {
    navigator.clipboard.writeText(JSON.stringify(lastData, null, 2));
}

function downloadJSON() {
    const blob = new Blob([JSON.stringify(lastData,null,2)]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.json";
    a.click();
}

function downloadCSV() {
    const rows = ["Name,Email,Phone,Country,City,ZIP"];

    lastData.forEach(u => {
        rows.push(`${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`);
    });

    const blob = new Blob([rows.join("\n")]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();
}

</script>

</body>
</html>

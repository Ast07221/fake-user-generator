<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeUserGeneratorPro SaaS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, system-ui;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
}

/* CENTER AREA */
.wrapper {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
}

/* OUTPUT */
#output {
    min-height: 220px;
    font-size: 15px;
    line-height: 1.75;
    font-weight: 300;
}

/* KEY */
.key {
    color: #8f8f8f;
    font-weight: 500;
}

/* DOTS */
#status {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 10px;
}

/* BOTTOM CONTROLS */
.actions {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    gap: 18px;
    font-size: 12px;
    letter-spacing: 1px;
}

.actions span {
    cursor: pointer;
}

/* INPUT */
#bulkInput {
    width: 55px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #fff;
    text-align: center;
}

/* DOTS ANIMATION */
.dots::after {
    content: "...";
    animation: blink 1.2s infinite;
}

@keyframes blink {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- 🔵  STATUS (три точки) -->
    <div id="status"><span class="dots">idle</span></div>

    <div id="output"></div>

</div>

<!-- BOTTOM BUTTONS -->
<div class="actions">
    <span onclick="generate()">generate</span>

    <span>
        bulk
        <input id="bulkInput" type="number" value="5" min="1" max="100">
    </span>

    <span onclick="runBulk()">run</span>
    <span onclick="copy()">copy</span>
    <span onclick="downloadJSON()">json</span>
    <span onclick="downloadCSV()">csv</span>
</div>

<script>

const output = document.getElementById("output");
const statusEl = document.getElementById("status");
const bulkInput = document.getElementById("bulkInput");

let running = false;
let lastData = [];

/* DATA */
const data = {
    USA: ["New York","Los Angeles","Chicago","Miami"],
    Germany: ["Berlin","Munich","Hamburg"],
    France: ["Paris","Lyon","Marseille"],
    UK: ["London","Manchester","Liverpool"],
    Italy: ["Rome","Milan","Naples"],
    Spain: ["Madrid","Barcelona","Valencia"]
};

const names = ["John Smith","Emma Brown","Liam Johnson","Olivia Davis","Noah Wilson","Ava Martinez"];

/* USER */
function createUser() {
    const countries = Object.keys(data);
    const country = countries[Math.floor(Math.random()*countries.length)];
    const city = data[country][Math.floor(Math.random()*data[country].length)];

    const name = names[Math.floor(Math.random()*names.length)];
    const username = name.toLowerCase().replace(" ","") + Math.floor(Math.random()*999);

    return {
        username,
        name,
        email: username + "@mail.com",
        phone: "+" + Math.floor(1000000000 + Math.random()*9000000000),
        country,
        city,
        address: "Street " + Math.floor(Math.random()*300),
        zip: Math.floor(10000 + Math.random()*90000)
    };
}

/* FORMAT */
function format(u) {
    return `Username: ${u.username}
Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
Address: ${u.address}
ZIP: ${u.zip}`;
}

/* 🔥  SLOW SaaS RENDER */
async function render(text) {
    output.innerHTML = "";

    const lines = text.split("\n");

    for (let i = 0; i < lines.length; i++) {

        const line = lines[i];
        const parts = line.split(":");

        const row = document.createElement("div");

        if (parts.length > 1) {
            const key = document.createElement("span");
            key.className = "key";
            key.textContent = parts[0] + ": ";

            const value = document.createElement("span");
            value.textContent = parts.slice(1).join(":");

            row.appendChild(key);
            row.appendChild(value);
        } else {
            row.textContent = line;
        }

        output.appendChild(row);

        // 🐢  медленнее теперь (фикс “слишком быстро”)
        await new Promise(r => setTimeout(r, 45));
    }
}

/* STATUS DOTS */
function setStatus(text) {
    statusEl.innerHTML = `<span class="dots">${text}</span>`;
}

/* GENERATE */
async function generate() {
    if (running) return;
    running = true;

    setStatus("processing");

    const u = createUser();
    lastData = [u];

    await render(format(u));

    setStatus("idle");
    running = false;
}

/* BULK */
async function runBulk() {
    if (running) return;
    running = true;

    setStatus("processing");

    const count = Math.min(100, Math.max(1, parseInt(bulkInput.value || 5)));

    const arr = [];

    for (let i = 0; i < count; i++) {
        arr.push(createUser());
    }

    lastData = arr;

    await render(arr.map(format).join("\n\n"));

    setStatus("idle");
    running = false;
}

/* COPY */
function copy() {
    navigator.clipboard.writeText(output.innerText);
}

/* JSON */
function downloadJSON() {
    const blob = new Blob([JSON.stringify(lastData,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.json";
    a.click();
}

/* CSV */
function downloadCSV() {
    const rows = ["Username,Name,Email,Phone,Country,City,Address,ZIP"];

    lastData.forEach(u =>
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.address},${u.zip}`)
    );

    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();
}

</script>

</body>
</html>

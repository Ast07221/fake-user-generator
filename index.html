<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeUserGeneratorPro SaaS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, system-ui;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
}

.wrapper {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
}

#output {
    min-height: 220px;
    font-size: 15px;
    line-height: 1.75;
    font-weight: 300;
}

.key {
    color: #8f8f8f;
    font-weight: 500;
}

#status {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 10px;
}

.actions {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    font-size: 12px;
    letter-spacing: 1px;
}

.actions span {
    cursor: pointer;
}

#bulkInput {
    width: 55px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #fff;
    text-align: center;
}

.dots::after {
    content: "...";
    animation: blink 1.2s infinite;
}

@keyframes blink {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="status"><span class="dots">idle</span></div>
    <div id="output"></div>
</div>

<div class="actions">
    <span onclick="generate()">generate</span>

    <span>
        bulk
        <input id="bulkInput" type="number" value="5" min="1" max="100">
    </span>

    <span onclick="runBulk()">run</span>
    <span onclick="copy()">copy</span>
    <span onclick="downloadJSON()">json</span>
    <span onclick="downloadCSV()">csv</span>

    <span onclick="toggleBackend()">api</span>
</div>

<script>

const API_BASE = "http://localhost:3000/api";
let useBackend = true;

const output = document.getElementById("output");
const statusEl = document.getElementById("status");
const bulkInput = document.getElementById("bulkInput");

let running = false;
let lastData = [];

function setStatus(t) {
    statusEl.innerHTML = `<span class="dots">${t}</span>`;
}

/* =========================
   CREATE USER (LOCAL + API)
========================= */

async function createUser() {

    if (useBackend) {
        const res = await fetch(API_BASE + "/user");
        return await res.json();
    }

    // fallback (если backend выключен)
    return {
        username: "local_user",
        name: "Local User",
        email: "local@mail.com",
        phone: "+0000000000",
        country: "Local",
        city: "Local",
        address: "Street 1",
        zip: "00000"
    };
}

/* =========================
   FORMAT
========================= */

function format(u) {
    return `Username: ${u.username}
Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
Address: ${u.address}
ZIP: ${u.zip}`;
}

/* =========================
   RENDER
========================= */

async function render(text) {
    output.innerHTML = "";

    const lines = text.split("\n");

    for (let i = 0; i < lines.length; i++) {

        const line = lines[i];
        const parts = line.split(":");

        const row = document.createElement("div");

        if (parts.length > 1) {
            const key = document.createElement("span");
            key.className = "key";
            key.textContent = parts[0] + ": ";

            const value = document.createElement("span");
            value.textContent = parts.slice(1).join(":");

            row.appendChild(key);
            row.appendChild(value);
        } else {
            row.textContent = line;
        }

        output.appendChild(row);

        await new Promise(r => setTimeout(r, 45));
    }
}

/* =========================
   SINGLE
========================= */

async function generate() {
    if (running) return;
    running = true;
    setStatus("processing");

    const u = await createUser();
    lastData = [u];

    await render(format(u));

    setStatus("idle");
    running = false;
}

/* =========================
   BULK SAFE
========================= */

async function runBulk() {
    if (running) return;
    running = true;

    setStatus("processing");

    const count = Math.min(100, Math.max(1, parseInt(bulkInput.value || 5)));

    const arr = [];

    for (let i = 0; i < count; i++) {
        arr.push(await createUser());
    }

    lastData = arr;

    await render(arr.map(format).join("\n\n"));

    setStatus("idle");
    running = false;
}

/* =========================
   EXPORT
========================= */

function copy() {
    navigator.clipboard.writeText(output.innerText);
}

function downloadJSON() {
    const blob = new Blob([JSON.stringify(lastData,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.json";
    a.click();
}

function downloadCSV() {
    const rows = ["Username,Name,Email,Phone,Country,City,Address,ZIP"];

    lastData.forEach(u =>
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.address},${u.zip}`)
    );

    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();
}

/* =========================
   BACKEND TOGGLE
========================= */

function toggleBackend() {
    useBackend = !useBackend;
    alert("API: " + (useBackend ? "ON" : "OFF"));
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator</title>

<style>
body{
    margin:0;
    font-family: ui-monospace, monospace;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden; /* 🚫  убрали лишнюю прокрутку */
}

/* 🎯  FIXED CENTER + COMPACT WIDTH */
.wrapper{
    width:100%;
    max-width:520px;   /* 🔥  СУЖЕНО */
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* OUTPUT */
.grid{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* CARD */
.card{
    width:100%;
    position:relative;
    padding:10px 12px;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:8px;
    background:rgba(255,255,255,0.02);
}

/* TEXT LINE */
.line{
    font-size:14px;
    line-height:1.3;
    display:flex;
    gap:6px; /* 🔥  УМЕНЬШЕН РАЗРЫВ */
}

.label{
    color:#8a8a8a;
    min-width:70px;
}

.value{
    color:#f2f2f2;
}

/* COPY BUTTON - ближе к тексту */
.copyBtn{
    position:absolute;
    right:8px;   /* 🔥  БЛИЖЕ */
    top:8px;
    font-size:11px;
    color:#888;
    cursor:pointer;
}
.copyBtn:hover{ color:#fff; }

/* TOPBAR */
.topbar{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    align-items:center;
    font-size:13px;
}

/* TEXT BUTTONS */
.btn{
    background:none;
    border:none;
    color:#aaa;
    cursor:pointer;
}
.btn:hover{ color:#fff; }

/* INPUT - узкий */
input{
    width:28px;   /* 🔥  СУЖЕНО */
    background:none;
    border:none;
    color:#fff;
    text-align:center;
}

/* SELECT */
select{
    background:#000;
    color:#fff;
    border:none;
    outline:none;
    padding:2px 6px;
}

/* LOADER FIX */
.loader{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    color:#777;
    letter-spacing:3px;
    display:none;
}

.dots span{
    animation:blink 1s infinite;
}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
    0%,100%{opacity:0;}
    50%{opacity:1;}
}
</style>
</head>

<body>

<div class="loader" id="loader">
    INITIALIZING ENGINE
    <span class="dots"><span>.</span><span>.</span><span>.</span></span>
</div>

<div class="wrapper">
    <div class="grid" id="output"></div>
</div>

<div class="topbar">
    <button class="btn" onclick="generate()">generate</button>
    <button class="btn" onclick="copyAll()">copy</button>
    <input id="count" type="number" value="1" min="1" max="50">
    <select id="country"></select>
</div>

<script>

/* ===== DATA ===== */
const DATA=[
{country:"USA",code:"+1",cities:["NY","LA","Chicago"],area:["201","305","312"],zip:()=>String(10000+Math.random()*89999|0)},
{country:"UK",code:"+44",cities:["London","Manchester"],area:["74","75","77"],zip:()=>["SW1A","EC1","W1"][Math.random()*3|0]},
{country:"Germany",code:"+49",cities:["Berlin","Munich"],area:["151","160"],zip:()=>String(10000+Math.random()*89999|0)},
{country:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"],area:["6","20"],zip:()=>String(1000+Math.random()*8999|0)},
{country:"Japan",code:"+81",cities:["Tokyo","Osaka"],area:["70","80"],zip:()=>String(1000000+Math.random()*8999999|0)}
];

const first=["Alex","John","Emma","Noah","Liam","Mia"];
const last=["Smith","Brown","Lee","Taylor","Wilson"];

const output=document.getElementById("output");
const loader=document.getElementById("loader");
const select=document.getElementById("country");

let last=[];

/* INIT */
function init(){
    select.innerHTML=`<option value="all">any country</option>`;
    DATA.forEach(d=>{
        let o=document.createElement("option");
        o.value=d.country;
        o.textContent=d.country;
        select.appendChild(o);
    });
}

/* PICK */
    function pick(a){return a[Math.random()*a.length|0];}

/* USER */
function user(){
    const d = select.value==="all"?pick(DATA):DATA.find(x=>x.country===select.value);

    const fn=pick(first);
    const ln=pick(last);

    const username=(fn+ln+(Math.random()*999|0)).toLowerCase();

    return{
        username,
        name:fn+" "+ln,
        email:username+"@gmail.com",
        phone:`${d.code} ${pick(d.area)} ${Math.random()*9000000|0+1000000}`,
        country:d.country,
        city:pick(d.cities),
        zip:d.zip()
    };
}

/* TYPE */
function typeLine(parent,label,value,cb){
    const row=document.createElement("div");
    row.className="line";

    const l=document.createElement("span");
    l.className="label";
    l.textContent=label;

    const v=document.createElement("span");
    v.className="value";

    row.appendChild(l);
    row.appendChild(v);
    parent.appendChild(row);

    let i=0;
    function t(){
        if(i<value.length){
            v.textContent+=value[i++];
            setTimeout(t,6); // 🔥  быстрее и ровно
        } else cb && cb();
    }
    t();
}

/* RENDER */
function render(arr){
    output.innerHTML="";

    arr.forEach((u,i)=>{
        const card=document.createElement("div");
        card.className="card";

        const copy=document.createElement("div");
        copy.className="copyBtn";
        copy.textContent="copy";
        copy.onclick=()=>navigator.clipboard.writeText(JSON.stringify(u,null,2));

        card.appendChild(copy);
        output.appendChild(card);

        setTimeout(()=>{
            const f=[
                ["User:",u.username],
                ["Name:",u.name],
                ["Email:",u.email],
                ["Phone:",u.phone],
                ["Country:",u.country],
                ["City:",u.city],
                ["ZIP:",u.zip]
            ];

            let i=0;
            function next(){
                if(i>=f.length) return;
                typeLine(card,f[i][0],f[i][1],()=>{
                    i++;
                    next();
                });
            }
            next();

        },i*30);
    });
}

/* GENERATE */
function generate(){
    loader.style.display="block";

    setTimeout(()=>{
        const n=Math.min(50,document.getElementById("count").value||1);
        last=Array.from({length:n},user);
        render(last);
        loader.style.display="none";
    },120); // 🔥  почти мгновенно
}

/* COPY */
function copyAll(){
    navigator.clipboard.writeText(JSON.stringify(last,null,2));
}

init();
window.onload=generate;

</script>

</body>
</html>

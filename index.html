<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Engine v2</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.wrapper{
    width:100%;
    max-width:900px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.grid{
    width:100%;
    max-width:720px;
    max-height:650px;
    overflow-y:auto;
}

.card{
    padding:14px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.line{
    font-size:15px;
    line-height:1.5;
}

.label{ color:#888; }
.value{ color:#f2f2f2; }

.topbar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button, select, input{
    background:#0b0b0b;
    border:none;
    color:#fff;
    font-size:14px;
    padding:6px 10px;
}

.loader{
    position:fixed;
    top:12px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:3px;
    color:#777;
}
</style>
</head>

<body>

<div class="loader" id="loader">INITIALIZING ENGINE</div>

<div class="wrapper">
    <div class="grid" id="output"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="more()">more</button>
    <button onclick="clearAll()">clear</button>
    <input id="count" type="number" value="10" min="1" max="500">
    <select id="country"></select>
</div>

<script>

/* =========================
   🌍 EXPANDED ENGINE (SAFE + REALISTIC)
========================= */

const ENGINE = [
{
country:"USA", code:"+1",
cities:["New York","Los Angeles","Chicago","Houston","Miami","Dallas","Boston","Seattle"],
streets:["Main St","Oak Ave","Pine Rd","Sunset Blvd","Broadway"],
zip:()=>String(10000 + Math.random()*89999|0),
area:["201","212","305","312","415","646","718"]
},
{
country:"UK", code:"+44",
cities:["London","Manchester","Birmingham","Liverpool","Leeds"],
streets:["High St","King Rd","Queen St","Oxford St"],
zip:()=>["SW1A","M1","L1","B1","EC1"][Math.random()*5|0],
area:["74","75","77","78"]
},
{
country:"Germany", code:"+49",
cities:["Berlin","Munich","Hamburg","Cologne","Frankfurt"],
streets:["Hauptstr","Bahnhofstr","Marktweg"],
zip:()=>String(10000 + Math.random()*89999|0),
area:["151","160","170","175"]
},
{
country:"France", code:"+33",
cities:["Paris","Lyon","Marseille","Nice"],
streets:["Rue Victor Hugo","Rue de Paris","Rue Lafayette"],
zip:()=>String(10000 + Math.random()*89999|0),
area:["6","7","1"]
},
{
country:"Netherlands", code:"+31",
cities:["Amsterdam","Rotterdam","Utrecht"],
streets:["Damrak","Leidsestraat","Herengracht"],
zip:()=>String(1000 + Math.random()*8999|0),
area:["6","20"]
},
{
country:"Japan", code:"+81",
cities:["Tokyo","Osaka","Kyoto"],
streets:["Shibuya","Ginza","Shinjuku"],
zip:()=>String(1000000 + Math.random()*8999999|0),
area:["70","80","90"]
}
];

/* ========================= */

const firstNames=["Alex","John","Michael","David","James","Emma","Olivia","Sophia","Liam","Noah"];
const lastNames=["Smith","Brown","Johnson","Taylor","Wilson","Clark","Walker","Hall"];

const output=document.getElementById("output");
const select=document.getElementById("country");
const loader=document.getElementById("loader");

let last=[];

/* SAFE INIT */
function init(){
    select.innerHTML=`<option value="all">any country</option>`;
    ENGINE.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        select.appendChild(o);
    });
}

/* SAFE PICK */
function pick(a){
    return a[Math.floor(Math.random()*a.length)];
}

/* PHONE (REALISTIC STYLE) */
function phone(d){
    return `${d.code} ${pick(d.area)} ${Math.floor(1000000 + Math.random()*9000000)}`;
}

/* EMAIL */
    function email(name){
    return name+"@"+pick(["gmail.com","outlook.com","yahoo.com","proton.me"]);
}

/* CORE SAFE GENERATOR */
function user(){
    const d = (select.value==="all")
        ? pick(ENGINE)
        : (ENGINE.find(x=>x.country===select.value) || pick(ENGINE));

    const first=pick(firstNames);
    const last=pick(lastNames);

    const username=(first+last+Math.floor(Math.random()*999)).toLowerCase();

    return{
        username,
        name:first+" "+last,
        email:email(username),
        phone:phone(d),
        country:d.country,
        city:pick(d.cities),
        street:pick(d.streets)+" "+Math.floor(Math.random()*200),
        zip:d.zip()
    };
}

/* RENDER (OPTIMIZED) */
function render(arr){
    output.innerHTML="";
    const frag=document.createDocumentFragment();

    arr.forEach((u,i)=>{
        const c=document.createElement("div");
        c.className="card";

        c.innerHTML=`
            <div class="line">User: ${u.username}</div>
            <div class="line">Name: ${u.name}</div>
            <div class="line">Email: ${u.email}</div>
            <div class="line">Phone: ${u.phone}</div>
            <div class="line">Country: ${u.country}</div>
            <div class="line">City: ${u.city}</div>
            <div class="line">Street: ${u.street}</div>
            <div class="line">ZIP: ${u.zip}</div>
        `;

        frag.appendChild(c);
    });

    output.appendChild(frag);
}

/* ACTIONS */
function generate(){
    loader.innerText="INITIALIZING ENGINE...";

    setTimeout(()=>{
        const n=Math.min(500,document.getElementById("count").value||10);
        last=Array.from({length:n},user);
        render(last);
    },300);
}

function more(){
    const extra=Array.from({length:10},user);
    last=last.concat(extra);
    render(last);
}

function clearAll(){
    output.innerHTML="";
    last=[];
}

/* START */
init();
window.onload=generate;

</script>

</body>
</html>

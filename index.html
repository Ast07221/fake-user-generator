<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Engine</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow-x:hidden;
}

.wrapper{
    width:100%;
    max-width:900px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.grid{
    width:100%;
    max-width:700px;
    max-height:650px;
    overflow-y:auto;
}

.card{
    padding:12px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
    cursor:pointer;
}

.card:hover{ opacity:.85; }

.line{
    font-size:15px;
    line-height:1.5;
}

.label{ color:#8a8a8a; }
.value{ color:#f2f2f2; }

.topbar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

button, select, input{
    background:#0b0b0b;
    border:none;
    color:#fff;
    font-size:14px;
    padding:6px 10px;
}

button:hover{ opacity:.7; }

.loader{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:4px;
    color:#777;
}

.cursor{
    display:inline-block;
    width:8px;
    height:14px;
    background:#777;
    margin-left:4px;
    animation:blink .8s infinite;
}

@keyframes blink{
    0%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>

<body>

<div class="loader" id="loader">INITIALIZING ENGINE</div>

<div class="wrapper">
    <div id="output" class="grid"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="more()">more</button>
    <button onclick="clearAll()">clear</button>
    <input id="count" type="number" value="10" min="1" max="200">
    <select id="country"></select>
    <button onclick="copyAll()">copy</button>
</div>

<script>

/* =========================
   🌍 DATA
========================= */

const ENGINE = [
{
country:"USA", code:"+1",
cities:["New York","Los Angeles","Chicago","Houston","Miami","Seattle","Dallas","Boston"],
streets:["Main St","Oak Ave","Pine Rd","Broadway","5th Avenue","Sunset Blvd"],
zip:()=>String(10000+Math.random()*89999|0),
area:["201","202","305","312","415","646","718"]
},
{
country:"UK", code:"+44",
cities:["London","Manchester","Birmingham","Liverpool","Leeds","Bristol"],
streets:["High St","King Rd","Queen St","Church Ln","Oxford St"],
zip:()=>["SW1A","M1","L1","B1","EC1","W1"][Math.random()*6|0],
area:["74","75","77","78","79"]
},
{
country:"Germany", code:"+49",
cities:["Berlin","Munich","Hamburg","Cologne","Frankfurt","Stuttgart"],
streets:["Hauptstr","Bahnhofstr","Alexanderplatz","Marktweg"],
zip:()=>String(10000+Math.random()*89999|0),
area:["151","160","170","175","176"]
},
{
country:"France", code:"+33",
cities:["Paris","Lyon","Marseille","Nice","Toulouse","Bordeaux"],
streets:["Rue Victor Hugo","Rue de Paris","Avenue République","Rue Lafayette"],
zip:()=>String(10000+Math.random()*89999|0),
area:["6","7","1","2"]
},
{
country:"Netherlands", code:"+31",
cities:["Amsterdam","Rotterdam","Utrecht","Eindhoven","The Hague"],
streets:["Damrak","Leidsestraat","Kalverstraat","Herengracht"],
zip:()=>String(1000+Math.random()*8999|0),
area:["6","20"]
},
{
country:"Japan", code:"+81",
cities:["Tokyo","Osaka","Kyoto","Nagoya","Yokohama"],
streets:["Shibuya","Ginza","Akihabara","Shinjuku"],
zip:()=>String(1000000+Math.random()*8999999|0),
area:["70","80","90"]
}
];

/* ========================= */

const firstNames=["Alex","John","Michael","David","James","Emma","Olivia","Sophia","Liam","Noah","Mia","Ava"];
const lastNames=["Smith","Brown","Johnson","Taylor","Wilson","Martin","Lee","Clark","Walker","Hall"];

const output=document.getElementById("output");
const select=document.getElementById("country");
    const loader=document.getElementById("loader");

let last=[];

/* INIT SAFE */
function init(){
    if(!select) return;

    select.innerHTML=`<option value="all">any country</option>`;
    ENGINE.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        select.appendChild(o);
    });
}

/* SAFE PICK */
function pick(a){
    return a[Math.floor(Math.random()*a.length)];
}

/* PHONE */
function phone(d){
    return `${d.code} ${pick(d.area)} ${Math.random()*9000000+1000000|0}`;
}

/* EMAIL */
function email(name){
    return name+"@"+pick(["gmail.com","outlook.com","yahoo.com"]);
}

/* FIXED USER GENERATOR */
function user(){
    const d = (select.value==="all")
        ? pick(ENGINE)
        : (ENGINE.find(x=>x.country===select.value) || pick(ENGINE));

    const first=pick(firstNames);
    const last=pick(lastNames);

    const username=(first+last+Math.random()*999|0).toLowerCase();

    return{
        username,
        name:first+" "+last,
        email:email(username),
        phone:phone(d),
        country:d.country,
        city:pick(d.cities),
        street:pick(d.streets)+" "+(Math.random()*200|0),
        zip:d.zip()
    };
}

/* RENDER */
function render(arr){
    output.innerHTML="";

    arr.forEach((u,i)=>{
        const c=document.createElement("div");
        c.className="card";
        output.appendChild(c);

        setTimeout(()=>{
            c.innerHTML=`
                <div class="line">User: ${u.username}</div>
                <div class="line">Name: ${u.name}</div>
                <div class="line">Email: ${u.email}</div>
                <div class="line">Phone: ${u.phone}</div>
                <div class="line">Country: ${u.country}</div>
                <div class="line">City: ${u.city}</div>
                <div class="line">Street: ${u.street}</div>
                <div class="line">ZIP: ${u.zip}</div>
            `;
        },i*20);
    });
}

/* ACTIONS */
function generate(){
    let txt="INITIALIZING ENGINE";
    loader.innerHTML="";
    let i=0;

    function type(){
        if(i<txt.length){
            loader.innerHTML+=txt[i++];
            setTimeout(type,35);
        }
    }

    type();

    setTimeout(()=>{
        const n=Math.min(200,document.getElementById("count").value||10);
        last=Array.from({length:n},user);
        render(last);
    },500);
}

function more(){
    const extra=Array.from({length:5},user);
    last=last.concat(extra);
    render(last);
}

function clearAll(){
    output.innerHTML="";
    last=[];
}

/* START */
init();
window.onload=generate;

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* 🔥  PERFECT CENTERING SYSTEM */
.wrapper{
    width:100%;
    max-width:900px;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:0 20px;
    box-sizing:border-box;
}

/* 🔥  OUTPUT AREA (NO OVERFLOW INTO BUTTONS) */
.grid{
    width:100%;
    max-width:680px;
    max-height:65vh;   /* CRITICAL FIX */
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    align-items:stretch;
    padding-bottom:20px;
}

/* CARD */
.card{
    width:100%;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

/* LINE */
.line{
    display:flex;
    gap:10px;
    font-size:14px;
    line-height:1.5;
}

/* LABEL */
.label{
    color:#777;
    min-width:90px;
}

/* VALUE */
.value{
    color:#f2f2f2;
}

/* 🔥  LOADER FIXED TOP */
.loader{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:4px;
    color:#777;
    font-family:monospace;
}

/* DOTS */
.dots span{
    animation:blink 1.2s infinite;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}

@keyframes blink{
    0%,100%{opacity:0}
    50%{opacity:1}
}

/* 🔥  TOP BAR FIXED */
.topbar{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:14px;
    align-items:center;
}

/* TEXT BUTTONS */
.btn{
    background:none;
    border:none;
    color:#fff;
    font-size:13px;
    cursor:pointer;
    opacity:.8;
}
.btn:hover{opacity:1}

/* 🔥  SMALL INPUT FIX */
input{
    width:26px;
    text-align:center;
    background:none;
    border:none;
    color:#fff;
    font-size:13px;
    outline:none;
}

select{
    background:none;
    border:none;
    color:#fff;
    font-size:13px;
    outline:none;
}
</style>
</head>

<body>

<!-- LOADER (ALWAYS ABOVE) -->
<div class="loader" id="loader">
    INITIALIZING ENGINE
    <span class="dots"><span>.</span><span>.</span><span>.</span></span>
</div>

<div class="wrapper">
    <div id="output" class="grid"></div>
</div>

<!-- CONTROLS -->
<div class="topbar">
    <button class="btn" onclick="generate()">generate</button>
    <input id="count" type="number" value="5" min="1" max="50">
    <select id="country"></select>
    <button class="btn" onclick="copyAll()">copy</button>
</div>

<script>

/* ================= DATA (SAFE + LOGICAL) ================= */

const DATA=[
{
country:"USA",code:"+1",
cities:["New York","Los Angeles","Chicago","Miami","Dallas"],
streets:["Main St","Oak Ave","Pine Rd","Sunset Blvd"],
area:["201","305","312","415","646"],
zip:()=>String(10000+Math.random()*89999|0)
},
{
country:"UK",code:"+44",
cities:["London","Manchester","Liverpool","Birmingham"],
streets:["High St","Oxford St","Queen St"],
area:["74","77","78"],
zip:()=>["SW1A","M1","L1","B1"][Math.random()*4|0]
},
{
country:"Germany",code:"+49",
cities:["Berlin","Munich","Hamburg","Frankfurt"],
streets:["Hauptstr","Bahnhofstr","Marktweg"],
area:["151","160","170"],
zip:()=>String(10000+Math.random()*89999|0)
},
{
country:"France",code:"+33",
cities:["Paris","Lyon","Marseille"],
streets:["Rue Victor Hugo","Rue Lafayette"],
area:["6","7"],
zip:()=>String(10000+Math.random()*89999|0)
},
{
country:"Netherlands",code:"+31",
cities:["Amsterdam","Rotterdam","Utrecht"],
streets:["Damrak","Kalverstraat"],
area:["6","20"],
zip:()=>String(1000+Math.random()*8999|0)
}
];

const FIRST=["Alex","John","Emma","Noah","Liam","Olivia","Mia","Sophia"];
    const LAST=["Smith","Brown","Johnson","Taylor","Lee","Walker"];

let output, select, last=[];

/* INIT */
function init(){
    output=document.getElementById("output");
    select=document.getElementById("country");

    select.innerHTML=`<option value="all">any country</option>`;
    DATA.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        select.appendChild(o);
    });
}

/* PICK */
const pick=a=>a[Math.random()*a.length|0];

/* USER */
function user(){
    const d = select.value==="all"
        ? pick(DATA)
        : DATA.find(x=>x.country===select.value) || pick(DATA);

    const first=pick(FIRST);
    const last=pick(LAST);

    const username=(first+last+(Math.random()*999|0)).toLowerCase();

    return{
        username,
        name:first+" "+last,
        email:username+"@gmail.com",
        phone:`${d.code} ${pick(d.area)} ${Math.random()*9000000|0+1000000}`,
        country:d.country,
        city:pick(d.cities),
        street:pick(d.streets)+" "+(Math.random()*200|0),
        zip:d.zip()
    };
}

/* TYPE */
function type(el,text,cb){
    let i=0;
    (function run(){
        if(i<text.length){
            el.textContent+=text[i++];
            setTimeout(run,10);
        } else cb && cb();
    })();
}

/* RENDER */
function render(arr){
    output.innerHTML="";

    arr.forEach((u,i)=>{
        const card=document.createElement("div");
        card.className="card";
        output.appendChild(card);

        const rows=[
            ["User",u.username],
            ["Name",u.name],
            ["Email",u.email],
            ["Phone",u.phone],
            ["Country",u.country],
            ["City",u.city],
            ["Street",u.street],
            ["ZIP",u.zip]
        ];

        let idx=0;

        function next(){
            if(idx>=rows.length) return;

            const [l,v]=rows[idx++];

            const row=document.createElement("div");
            row.className="line";

            const label=document.createElement("span");
            label.className="label";
            label.textContent=l+":";

            const value=document.createElement("span");
            value.className="value";

            row.appendChild(label);
            row.appendChild(value);
            card.appendChild(row);

            type(value,v,next);
        }

        setTimeout(next,i*25);
    });
}

/* GENERATE */
function generate(){
    const n=Math.min(50,parseInt(count.value||5));
    last=Array.from({length:n},user);
    render(last);
}

/* COPY */
function copyAll(){
    navigator.clipboard.writeText(JSON.stringify(last,null,2));
}

/* START */
init();
window.onload=generate;

</script>

</body>
</html>

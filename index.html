<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator PRO</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
    overflow: hidden;
}

/* центр */
.wrapper {
    position: absolute;
    top: 52%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    max-width: 900px;
    padding: 20px;
}

/* 🔥  loader выше */
.loaderWrap {
    position: absolute;
    top: 43%;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 900px;
    padding: 0 20px;
}

.loader {
    text-align:left;
    font-size:13px;
    opacity:0.4;
}
.loader::after {
    content:".";
    animation:dots 1.4s infinite;
}
@keyframes dots {
    0%{content:".";}
    33%{content:"..";}
    66%{content:"...";}
    100%{content:".";}
}

/* сетка */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:14px;
    text-align:left;
}

/* карточки */
.card {
    background: transparent;
    padding:12px 0;
    position:relative;
}

/* 🔥  белый текст */
.card div {
    font-size:14px;
    line-height:1.7;
    color:#fff;
}

/* copy */
.copyBtn {
    position:absolute;
    top:0;
    right:0;
    font-size:11px;
    opacity:0.5;
    cursor:pointer;
}

/* панель */
.topbar {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
}

/* кнопки */
button {
    background:none;
    border:none;
    color:#aaa;
    cursor:pointer;
    font-size:13px;
}
button:hover { color:#fff; }

/* input */
select, input {
    background:none;
    border:none;
    color:#fff;
    border-bottom:1px solid #333;
    padding:4px;
}

input {
    width:35px;
    text-align:center;
}
</style>
</head>

<body>

<!-- 🔥  loader отдельно -->
<div class="loaderWrap">
    <div id="loader" class="loader">...</div>
</div>

<div class="wrapper">
    <div id="output" class="grid"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="generateMore()">more</button>
    <button onclick="clearAll()">clear</button>
    <select id="countryFilter"></select>
    <input id="bulkInput" type="number" value="1" min="1" max="99">
    <button onclick="copyAll()">copy</button>
    <button onclick="downloadJSON()">json</button>
    <button onclick="downloadCSV()">csv</button>
</div>

<script>

/* 🔥  50+ COUNTRIES */
const DATA = {
US:{name:"United States",code:"+1",cities:["New York","Los Angeles","Chicago"]},
GB:{name:"United Kingdom",code:"+44",cities:["London","Manchester"]},
DE:{name:"Germany",code:"+49",cities:["Berlin","Munich"]},
FR:{name:"France",code:"+33",cities:["Paris","Lyon"]},
ES:{name:"Spain",code:"+34",cities:["Madrid","Barcelona"]},
IT:{name:"Italy",code:"+39",cities:["Rome","Milan"]},
NL:{name:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"]},
PL:{name:"Poland",code:"+48",cities:["Warsaw","Krakow"]},
UA:{name:"Ukraine",code:"+380",cities:["Kyiv","Lviv"]},
TR:{name:"Turkey",code:"+90",cities:["Istanbul","Ankara"]},
JP:{name:"Japan",code:"+81",cities:["Tokyo","Osaka"]},
CN:{name:"China",code:"+86",cities:["Beijing","Shanghai"]},
KR:{name:"South Korea",code:"+82",cities:["Seoul","Busan"]},
IN:{name:"India",code:"+91",cities:["Mumbai","Delhi"]},
BR:{name:"Brazil",code:"+55",cities:["Sao Paulo","Rio"]},
CA:{name:"Canada",code:"+1",cities:["Toronto","Vancouver"]},
AU:{name:"Australia",code:"+61",cities:["Sydney","Melbourne"]},
SE:{name:"Sweden",code:"+46",cities:["Stockholm","Gothenburg"]},
NO:{name:"Norway",code:"+47",cities:["Oslo","Bergen"]},
DK:{name:"Denmark",code:"+45",cities:["Copenhagen","Aarhus"]},
FI:{name:"Finland",code:"+358",cities:["Helsinki","Espoo"]},
CH:{name:"Switzerland",code:"+41",cities:["Zurich","Geneva"]},
AT:{name:"Austria",code:"+43",cities:["Vienna","Salzburg"]},
    BE:{name:"Belgium",code:"+32",cities:["Brussels","Antwerp"]},
PT:{name:"Portugal",code:"+351",cities:["Lisbon","Porto"]},
GR:{name:"Greece",code:"+30",cities:["Athens","Thessaloniki"]},
HU:{name:"Hungary",code:"+36",cities:["Budapest","Debrecen"]},
CZ:{name:"Czech Republic",code:"+420",cities:["Prague","Brno"]},
RO:{name:"Romania",code:"+40",cities:["Bucharest","Cluj"]},
BG:{name:"Bulgaria",code:"+359",cities:["Sofia","Varna"]},
SK:{name:"Slovakia",code:"+421",cities:["Bratislava","Kosice"]},
SI:{name:"Slovenia",code:"+386",cities:["Ljubljana","Maribor"]},
HR:{name:"Croatia",code:"+385",cities:["Zagreb","Split"]},
RS:{name:"Serbia",code:"+381",cities:["Belgrade","Novi Sad"]},
LT:{name:"Lithuania",code:"+370",cities:["Vilnius","Kaunas"]},
LV:{name:"Latvia",code:"+371",cities:["Riga","Daugavpils"]},
EE:{name:"Estonia",code:"+372",cities:["Tallinn","Tartu"]},
IS:{name:"Iceland",code:"+354",cities:["Reykjavik"]},
IE:{name:"Ireland",code:"+353",cities:["Dublin","Cork"]},
MX:{name:"Mexico",code:"+52",cities:["Mexico City","Guadalajara"]},
AR:{name:"Argentina",code:"+54",cities:["Buenos Aires","Cordoba"]},
CL:{name:"Chile",code:"+56",cities:["Santiago","Valparaiso"]},
CO:{name:"Colombia",code:"+57",cities:["Bogota","Medellin"]},
PE:{name:"Peru",code:"+51",cities:["Lima","Cusco"]},
ZA:{name:"South Africa",code:"+27",cities:["Johannesburg","Cape Town"]},
EG:{name:"Egypt",code:"+20",cities:["Cairo","Alexandria"]},
SA:{name:"Saudi Arabia",code:"+966",cities:["Riyadh","Jeddah"]},
AE:{name:"UAE",code:"+971",cities:["Dubai","Abu Dhabi"]}
};

/* names */
const firstNames=["Liam","Noah","Oliver","Emma","Ava","Sophia","James","Mia"];
const lastNames=["Smith","Johnson","Brown","Taylor","Wilson","Martin","Lee"];

const output=document.getElementById("output");
const loader=document.getElementById("loader");
const filter=document.getElementById("countryFilter");
const bulkInput=document.getElementById("bulkInput");

let lastData=[];

/* init */
function init(){
  Object.keys(DATA).forEach(k=>{
    const o=document.createElement("option");
    o.value=k;
    o.textContent=DATA[k].name;
    filter.appendChild(o);
  });
}
init();

/* utils */
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function zip(){return String(10000+Math.floor(Math.random()*89999));}

/* generator */
function generateUser(){
  const keys=Object.keys(DATA);
  const k=filter.value || pick(keys);
  const c=DATA[k];

  const f=pick(firstNames);
  const l=pick(lastNames);
  const username=(f+"."+l+Math.floor(Math.random()*999)).toLowerCase();

  return {
    username,
    name:`${f} ${l}`,
    email:`${username}@gmail.com`,
    phone:`${c.code} ${Math.floor(100000000+Math.random()*900000000)}`,
    country:c.name,
    city:pick(c.cities),
    zip:zip()
  };
}

/* render */
function render(list,append=false){
  loader.style.display="none";
  if(!append) output.innerHTML="";

  list.forEach(u=>{
    const card=document.createElement("div");
    card.className="card";

    const btn=document.createElement("div");
    btn.className="copyBtn";
    btn.innerText="copy";
    btn.onclick=()=>navigator.clipboard.writeText(JSON.stringify(u,null,2));

    const div=document.createElement("div");
    div.innerHTML=
`Username: ${u.username}<br>
Name: ${u.name}<br>
Email: ${u.email}<br>
Phone: ${u.phone}<br>
Country: ${u.country}<br>
City: ${u.city}<br>
ZIP: ${u.zip}`;

    card.appendChild(btn);
    card.appendChild(div);
    output.appendChild(card);
  });
}

/* actions */
function generate(){
  loader.style.display="block";
  output.innerHTML="";
  setTimeout(()=>{
    const n=parseInt(bulkInput.value||1);
    const arr=[];
    for(let i=0;i<n;i++) arr.push(generateUser());
    lastData=arr;
    render(arr,false);
  },300);
}

function generateMore(){
  const arr=[];
  for(let i=0;i<3;i++) arr.push(generateUser());
  lastData=lastData.concat(arr);
  render(arr,true);
}

function clearAll(){
  output.innerHTML="";
  loader.style.display="block";
  lastData=[];
}
    /* export */
function copyAll(){
  navigator.clipboard.writeText(JSON.stringify(lastData,null,2));
}
function downloadJSON(){
  const blob=new Blob([JSON.stringify(lastData,null,2)]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="users.json";
  a.click();
}
function downloadCSV(){
  const rows=["Username,Name,Email,Phone,Country,City,ZIP"];
  lastData.forEach(u=>{
    rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`);
  });
  const blob=new Blob([rows.join("\n")]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="users.csv";
  a.click();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeUserGeneratorPro</title>

<!-- изящный шрифт -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Inter", system-ui, sans-serif;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
}

/* центр */
.wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 390px;
}

/* output */
#output {
    white-space: pre-line;
    min-height: 200px;
    font-size: 14px;
    line-height: 1.7;
    font-weight: 300;
}

/* loader */
#loader {
    height: 20px;
    margin-bottom: 10px;
    opacity: 1;
    transition: 0.2s;
}

#loader.hidden {
    opacity: 0;
}

/* точки */
.dot {
    display: inline-block;
    animation: blink 1.8s infinite;
    font-size: 20px;
}

.dot:nth-child(2) { animation-delay: 0.25s; }
.dot:nth-child(3) { animation-delay: 0.5s; }

@keyframes blink {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* кнопки */
.actions {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
}

.actions span {
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 1.2px;
    text-transform: lowercase;
    transition: 0.2s;
    font-weight: 400;
}

.actions span:hover {
    opacity: 0.5;
}

/* курсор */
.cursor::after {
    content: "|";
    animation: blink 1s infinite;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- idle loader -->
    <div id="loader">
        <span class="dot">.</span>
        <span class="dot">.</span>
        <span class="dot">.</span>
    </div>

    <div id="output"></div>

    <div class="actions">
        <span onclick="generate()">generate</span>
        <span onclick="bulk()">bulk</span>
        <span onclick="copy()">copy</span>
        <span onclick="downloadJSON()">json</span>
        <span onclick="downloadCSV()">csv</span>
    </div>

</div>

<script>
const output = document.getElementById("output");
const loader = document.getElementById("loader");

let lastData = [];
let isRunning = false;

/* база */
const names = ["John Smith","Emma Brown","Liam Johnson","Olivia Davis","Noah Wilson","Ava Martinez"];
const streets = ["Main St","Oak Avenue","River Road","Sunset Blvd","Maple Street"];
const cities = ["New York","Berlin","Paris","Toronto","London","Rome","Madrid","Warsaw","Amsterdam","Stockholm"];
const countries = ["USA","Germany","France","Canada","UK","Italy","Spain","Poland","Netherlands","Sweden"];

/* user */
function createUser() {
    const name = names[Math.floor(Math.random()*names.length)];
    const country = countries[Math.floor(Math.random()*countries.length)];
    const city = cities[Math.floor(Math.random()*cities.length)];
    const street = streets[Math.floor(Math.random()*streets.length)];

    const username = name.toLowerCase().replace(" ","") + Math.floor(Math.random()*99);
    const address = street + " " + Math.floor(1 + Math.random()*200);

    return {
        username,
        name,
        email: username + "@mail.com",
        phone: "+" + Math.floor(1000000000 + Math.random()*9000000000),
        country,
        city,
        address,
        zip: Math.floor(10000 + Math.random()*90000)
    };
}

/* формат */
function format(u) {
    return `Username: ${u.username}
Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
Address: ${u.address}
ZIP: ${u.zip}`;
}

/* печать */
function print(text) {
    output.classList.remove("cursor");
    output.innerHTML = "";

    let i = 0;
    output.classList.add("cursor");

    function type() {
        if (i < text.length) {
            output.innerHTML += text[i++];
            setTimeout(type, 5);
        } else {
            output.classList.remove("cursor");
        }
    }

    type();
}

/* generate */
function generate() {
    if (isRunning) return;
    isRunning = true;

    loader.classList.add("hidden"); // точки исчезают во время генерации

    setTimeout(() => {
        const u = createUser();
        lastData = [u];

        print(format(u));

        loader.classList.remove("hidden"); // возвращаются после
        isRunning = false;
    }, 700);
}

/* bulk */
function bulk() {
    if (isRunning) return;
    isRunning = true;

    loader.classList.add("hidden");

    setTimeout(() => {
        const arr = [];
        for (let i = 0; i < 5; i++) arr.push(createUser());

        lastData = arr;

        print(arr.map(format).join("\n\n"));

        loader.classList.remove("hidden");
        isRunning = false;
    }, 700);
}

/* copy */
function copy() {
    navigator.clipboard.writeText(output.innerText);
}

/* json */
function downloadJSON() {
    const blob = new Blob([JSON.stringify(lastData,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.json";
    a.click();
}

/* csv */
function downloadCSV() {
    const rows = ["Username,Name,Email,Phone,Country,City,Address,ZIP"];
    lastData.forEach(u =>
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.address},${u.zip}`)
    );

    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();
}
</script>

</body>
</html>

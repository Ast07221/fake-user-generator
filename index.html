<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Generator Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, system-ui;
    background: #0b0b0b;
    color: #fff;
}

.wrapper {
    max-width: 1100px;
    margin: 40px auto;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
    gap: 14px;
}

/* CARD */
.card {
    background: #151515;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid #222;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-2px);
    border-color: #333;
}

.key {
    color: #888;
    font-size: 12px;
}

.bottomBar {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    background: rgba(20,20,20,0.9);
    padding: 10px;
    border-radius: 14px;
    backdrop-filter: blur(10px);
    border: 1px solid #222;
}

button {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    color: #fff;
    padding: 8px 12px;
    border-radius: 10px;
    font-family: Inter;
    font-size: 13px;
    cursor: pointer;
}

button:hover {
    background: #2a2a2a;
}

input {
    width: 60px;
    background: #111;
    border: 1px solid #222;
    color: #fff;
    border-radius: 8px;
    text-align: center;
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="output" class="grid"></div>
</div>

<div class="bottomBar">
    <button onclick="generate()">Generate</button>
    <button onclick="more()">More</button>
    <button onclick="clearAll()">Clear</button>
    <input id="count" type="number" value="6" min="1" max="50">
</div>

<script>

/* =========================
   REALISTIC GLOBAL DATA SET
========================= */

const data = [
{
country:"USA",code:"+1",
first:["James","John","Robert","Michael","William","Emma","Olivia","Sophia"],
last:["Smith","Johnson","Brown","Williams","Jones"],
city:["New York","Los Angeles","Chicago","Miami","Dallas"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"UK",code:"+44",
first:["Oliver","Harry","George","Jack","Emily","Amelia","Mia"],
last:["Smith","Taylor","Brown","Wilson","Evans"],
city:["London","Manchester","Birmingham","Liverpool"],
zip:()=> "SW" + Math.floor(1+Math.random()*99)
},
{
country:"Germany",code:"+49",
first:["Lukas","Leon","Finn","Paul","Anna","Marie","Emma"],
last:["Müller","Schmidt","Schneider","Fischer","Weber"],
city:["Berlin","Munich","Hamburg","Cologne"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"France",code:"+33",
first:["Louis","Lucas","Hugo","Emma","Chloe","Léa"],
last:["Martin","Bernard","Dubois","Moreau"],
city:["Paris","Lyon","Marseille","Nice"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"Spain",code:"+34",
first:["Mateo","Leo","Hugo","Lucia","Sofia","Martina"],
last:["Garcia","Martinez","Lopez","Sanchez"],
city:["Madrid","Barcelona","Valencia","Seville"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"Italy",code:"+39",
first:["Luca","Marco","Giulia","Sofia","Matteo"],
last:["Rossi","Russo","Ferrari","Bianchi"],
city:["Rome","Milan","Naples","Turin"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"Netherlands",code:"+31",
first:["Daan","Lars","Sophie","Emma","Noah"],
last:["de Jong","Jansen","Bakker","Visser"],
city:["Amsterdam","Rotterdam","Utrecht"],
zip:()=>Math.floor(1000+Math.random()*8999)
},
{
country:"Poland",code:"+48",
first:["Jan","Piotr","Kacper","Julia","Zofia"],
last:["Nowak","Kowalski","Wisniewski"],
city:["Warsaw","Krakow","Gdansk"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"Canada",code:"+1",
first:["Liam","Noah","Emma","Olivia","Ava"],
last:["Brown","Taylor","Martin","Lee"],
city:["Toronto","Vancouver","Montreal"],
   zip:()=> "M" + Math.floor(1+Math.random()*9)
},
{
country:"Japan",code:"+81",
first:["Haruto","Yuto","Sota","Yui","Aoi"],
last:["Sato","Suzuki","Takahashi","Tanaka"],
city:["Tokyo","Osaka","Kyoto"],
zip:()=>Math.floor(1000000+Math.random()*8999999)
}
];

/* ========================= */

const output = document.getElementById("output");
const count = document.getElementById("count");

let last = [];

/* ========================= */

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function gen(){

    const loc = pick(data);

    const first = pick(loc.first);
    const lastName = pick(loc.last);

    const city = pick(loc.city);

    const username = (first + lastName + Math.floor(Math.random()*999)).toLowerCase();

    return {
        username,
        name: first + " " + lastName,
        email: username + "@mail.com",
        phone: loc.code + Math.floor(100000000 + Math.random()*900000000),
        country: loc.country,
        city,
        address: "Street " + Math.floor(Math.random()*300),
        zip: loc.zip()
    };
}

/* ========================= */

function render(arr){
    output.innerHTML = "";

    arr.forEach(u=>{
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div><span class="key">Name:</span> ${u.name}</div>
            <div><span class="key">Email:</span> ${u.email}</div>
            <div><span class="key">Phone:</span> ${u.phone}</div>
            <div><span class="key">Country:</span> ${u.country}</div>
            <div><span class="key">City:</span> ${u.city}</div>
            <div><span class="key">ZIP:</span> ${u.zip}</div>
        `;

        output.appendChild(div);
    });
}

/* ========================= */

function generate(){
    const arr = [];
    const n = parseInt(count.value);

    for(let i=0;i<n;i++){
        arr.push(gen());
    }

    last = arr;
    render(arr);
}

function more(){
    const arr = [];

    for(let i=0;i<6;i++){
        arr.push(gen());
    }

    last = last.concat(arr);
    render(last);
}

function clearAll(){
    output.innerHTML = "";
    last = [];
}

</script>

</body>
</html>

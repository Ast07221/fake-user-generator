<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Fake Data Engine</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow-x:hidden;
}

.wrapper{
    width:100%;
    max-width:900px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.grid{
    width:100%;
    max-width:650px;
    max-height:600px;
    overflow-y:auto;
}

.card{
    padding:12px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
    cursor:pointer;
}

.card:hover{
    opacity:.85;
}

.line{
    font-size:15px;
    line-height:1.5;
}

.label{ color:#8a8a8a; }
.value{ color:#f2f2f2; }

.topbar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

button, select, input{
    background:#0b0b0b;
    border:none;
    color:#fff;
    font-size:14px;
    padding:6px 10px;
}

button:hover{ opacity:.7; }

.loader{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:11px;
    letter-spacing:4px;
    color:#777;
}
</style>

</head>
<body>

<div class="loader" id="loader">INITIALIZING ENGINE...</div>

<div class="wrapper">
    <div id="output" class="grid"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="more()">more</button>
    <button onclick="clearAll()">clear</button>
    <input id="count" type="number" value="10" min="1" max="200">
    <select id="country"></select>
    <button onclick="copyAll()">copy</button>
</div>

<script>

/* =========================
   🌍 GLOBAL DATA ENGINE
========================= */

const ENGINE = [
{
country:"USA", code:"+1",
cities:["New York","Los Angeles","Chicago","Houston","Miami","Dallas"],
streets:["Main St","Oak Ave","Pine Rd","Maple Dr","Broadway"],
domains:["gmail.com","yahoo.com","outlook.com"],
zip:()=>String(10000+Math.floor(Math.random()*89999)),
area:["201","202","305","312","415","646"]
},

{
country:"UK", code:"+44",
cities:["London","Manchester","Birmingham","Liverpool","Leeds"],
streets:["High St","King Rd","Queen St","Church Ln"],
domains:["gmail.com","hotmail.co.uk","outlook.com"],
zip:()=>["SW1A","M1","L1","B1","EC1"][Math.floor(Math.random()*5)],
area:["74","75","77","78"]
},

{
country:"Germany", code:"+49",
cities:["Berlin","Munich","Hamburg","Cologne","Frankfurt"],
streets:["Hauptstr","Bahnhofstr","Alexanderplatz","Marktweg"],
domains:["gmail.com","web.de","gmx.de"],
zip:()=>String(10000+Math.floor(Math.random()*89999)),
area:["151","160","170","175"]
},

{
country:"France", code:"+33",
cities:["Paris","Lyon","Marseille","Nice","Toulouse"],
streets:["Rue de Paris","Rue Victor Hugo","Avenue République"],
domains:["gmail.com","orange.fr","laposte.net"],
zip:()=>String(10000+Math.floor(Math.random()*89999)),
area:["6","7"]
},

{
country:"Netherlands", code:"+31",
cities:["Amsterdam","Rotterdam","Utrecht","Eindhoven"],
streets:["Damrak","Leidsestraat","Kalverstraat"],
domains:["gmail.com","ziggo.nl","outlook.com"],
zip:()=>String(1000+Math.floor(Math.random()*8999)),
area:["6"]
},

{
country:"Japan", code:"+81",
cities:["Tokyo","Osaka","Kyoto","Nagoya"],
streets:["Shibuya","Ginza","Akihabara","Umeda"],
domains:["gmail.com","yahoo.co.jp","icloud.com"],
zip:()=>String(1000000+Math.floor(Math.random()*8999999)),
area:["70","80","90"]
},

{
country:"Australia", code:"+61",
cities:["Sydney","Melbourne","Brisbane","Perth"],
streets:["George St","King St","Collins St"],
domains:["gmail.com","outlook.com","bigpond.com"],
zip:()=>String(2000+Math.floor(Math.random()*6000)),
area:["4"]
},

{
country:"Canada", code:"+1",
cities:["Toronto","Vancouver","Montreal","Calgary"],
    streets:["Bloor St","King St","Queen St"],
domains:["gmail.com","hotmail.ca","outlook.com"],
zip:()=> "M" + Math.floor(Math.random()*9),
area:["416","437","604","778"]
},

{
country:"Italy", code:"+39",
cities:["Rome","Milan","Naples","Turin"],
streets:["Via Roma","Via Milano","Corso Italia"],
domains:["gmail.com","libero.it","outlook.com"],
zip:()=>String(10000+Math.floor(Math.random()*89999)),
area:["3"]
},

{
country:"Spain", code:"+34",
cities:["Madrid","Barcelona","Valencia","Seville"],
streets:["Calle Mayor","Gran Via","Calle Real"],
domains:["gmail.com","hotmail.es","outlook.com"],
zip:()=>String(10000+Math.floor(Math.random()*89999)),
area:["6","7"]
},

{
country:"India", code:"+91",
cities:["Delhi","Mumbai","Bangalore","Pune"],
streets:["MG Road","Park Street","MG Marg"],
domains:["gmail.com","yahoo.in","outlook.com"],
zip:()=>String(100000+Math.floor(Math.random()*899999)),
area:["7","8","9"]
}

];

/* ========================= */

const firstNames=["Alex","John","Michael","David","James","Emma","Olivia","Sophia","Liam","Noah","Mia","Ava"];
const lastNames=["Smith","Brown","Johnson","Taylor","Wilson","Martin","Lee","Clark","Walker","Hall"];

const output=document.getElementById("output");
const select=document.getElementById("country");
const loader=document.getElementById("loader");
let last=[];

function pick(a){ return a[Math.floor(Math.random()*a.length)] }

/* init */
function init(){
    select.innerHTML=`<option value="all">any country</option>`;
    ENGINE.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        select.appendChild(o);
    });
}

/* engine core */
function phone(d){
    return `${d.code} ${pick(d.area)} ${Math.floor(1000000+Math.random()*8999999)}`;
}

function email(name,d){
    return name+"@"+pick(d.domains);
}

function user(){
    const d = select.value==="all"
        ? pick(ENGINE)
        : ENGINE.find(x=>x.country===select.value);

    const safe=d||ENGINE[0];

    const first=pick(firstNames);
    const last=pick(lastNames);

    const username=(first+last+Math.floor(Math.random()*999)).toLowerCase();

    return{
        username,
        name:first+" "+last,
        email:email(username,safe),
        phone:phone(safe),
        country:safe.country,
        city:pick(safe.cities),
        street:pick(safe.streets)+" "+Math.floor(Math.random()*200),
        zip:safe.zip()
    };
}

/* render */
function render(arr){
    output.innerHTML="";

    arr.forEach((u,i)=>{
        const c=document.createElement("div");
        c.className="card";

        c.onclick=()=>{
            navigator.clipboard.writeText(JSON.stringify(u,null,2));
        };

        output.appendChild(c);

        setTimeout(()=>{
            c.innerHTML=`
                <div class="line"><span class="label">User:</span> <span class="value">${u.username}</span></div>
                <div class="line"><span class="label">Name:</span> <span class="value">${u.name}</span></div>
                <div class="line"><span class="label">Email:</span> <span class="value">${u.email}</span></div>
                <div class="line"><span class="label">Phone:</span> <span class="value">${u.phone}</span></div>
                <div class="line"><span class="label">Country:</span> <span class="value">${u.country}</span></div>
                <div class="line"><span class="label">City:</span> <span class="value">${u.city}</span></div>
                <div class="line"><span class="label">Street:</span> <span class="value">${u.street}</span></div>
                <div class="line"><span class="label">ZIP:</span> <span class="value">${u.zip}</span></div>
            `;
        },i*30);
    });
}

/* actions */
function generate(){
    loader.style.display="block";

    setTimeout(()=>{
        const n=Math.min(200,parseInt(document.getElementById("count").value||10));
        last=Array.from({length:n},user);
        loader.style.display="none";
        render(last);
    },200);
}

function more(){
    const extra=Array.from({length:5},user);
    last=last.concat(extra);
    render(last);
}

function clearAll(){
    output.innerHTML="";
    last=[];
}

function copyAll(){
    navigator.clipboard.writeText(JSON.stringify(last,null,2));
}

/* start */
init();
window.onload=generate;

</script>

</body>
</html>

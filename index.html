<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
    overflow: hidden;
}

.wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    max-width: 900px; /* 🔥  чуть компактнее (премиум) */
    padding: 20px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:14px;
}

.card {
    background:#151515;
    padding:16px;
    border-radius:14px;
    position:relative;
}

/* 🔥  ПРЕМИУМ ТЕКСТ */
.card div {
    font-size: 13.5px;
    line-height: 1.65;
    letter-spacing: 0.3px;
}

/* 🔥  КЛЮЧИ */
.key {
    color:#8a8a8a;
}

/* 🔥  ЗНАЧЕНИЯ */
.value {
    color:#e6e6e6;
}

.copyBtn {
    position:absolute;
    top:10px;
    right:10px;
    font-size:11px;
    opacity:0.6;
    cursor:pointer;
}

.topbar {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    background: rgba(15,15,15,0.75);
    backdrop-filter: blur(10px);
    padding: 12px 18px;
    border-radius: 16px;
}

button {
    background:#1a1a1a;
    border:1px solid #2a2a2a;
    color:#fff;
    padding:10px 16px;
    cursor:pointer;
    border-radius:12px;
}

select, input {
    background:#111;
    color:#fff;
    border:1px solid #222;
    padding:8px;
    border-radius:8px;
}

/* LOADER */
.loader {
    text-align:center;
    font-size:18px;
    letter-spacing:6px;
    opacity:0.6;
}
.loader::after {
    content: ".";
    animation: dots 1.4s infinite;
}
@keyframes dots {
    0%{content:".";}
    33%{content:"..";}
    66%{content:"...";}
    100%{content:".";}
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="output" class="loader">...</div>
</div>

<div class="topbar">
    <button onclick="generate()">Generate</button>
    <button onclick="generateMore()">More</button>
    <button onclick="clearAll()">Clear</button>
    <select id="countryFilter"></select>
    <input id="bulkInput" type="number" value="5">
    <button onclick="copyAll()">Copy</button>
    <button onclick="downloadJSON()">JSON</button>
    <button onclick="downloadCSV()">CSV</button>
</div>

<script>

/* DATA */
const countries = [
{country:"United States",code:"+1",cities:["New York","Los Angeles","Chicago"],zips:["10001","90001","60601"]},
{country:"United Kingdom",code:"+44",cities:["London","Manchester"],zips:["SW1A","M1"]},
{country:"Germany",code:"+49",cities:["Berlin","Munich"],zips:["10115","80331"]},
{country:"France",code:"+33",cities:["Paris","Lyon"],zips:["75001","69001"]},
{country:"Spain",code:"+34",cities:["Madrid","Barcelona"],zips:["28001","08001"]},
{country:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"],zips:["1012","3011"]}
];

const firstNames = ["Liam","Noah","Oliver","Emma","Olivia","Ava","Sophia"];
const lastNames = ["Smith","Johnson","Brown","Taylor","Anderson"];

const output = document.getElementById("output");
const filter = document.getElementById("countryFilter");
const bulkInput = document.getElementById("bulkInput");

let lastData = [];

function init(){
    filter.innerHTML = `<option value="all">All</option>`;
    countries.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        filter.appendChild(o);
    });
}
init();

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateUser(){
    let pool = countries;
    if(filter.value !== "all"){
        pool = countries.filter(c=>c.country===filter.value);
    }

    const loc = pick(pool);
    const first = pick(firstNames);
    const last = pick(lastNames);
    const username = (first+"."+last+Math.floor(Math.random()*999)).toLowerCase();

    return {
        username,
        name: first+" "+last,
        email: username+"@gmail.com",
        phone: loc.code+" "+Math.floor(100000000+Math.random()*900000000),
        country: loc.country,
        city: pick(loc.cities),
        zip: pick(loc.zips)
    };
}

/* 🔥  РЕНДЕР С ПОДСВЕТКОЙ */
function render(list, append=false){
    if(!append) output.innerHTML = "";

    list.forEach(u=>{
        const card=document.createElement("div");
        card.className="card";

        const btn=document.createElement("div");
        btn.className="copyBtn";
        btn.innerText="copy";
        btn.onclick=()=>navigator.clipboard.writeText(JSON.stringify(u,null,2));

        const content=document.createElement("div");

        content.innerHTML = `
<span class="key">Username:</span> <span class="value">${u.username}</span><br>
<span class="key">Name:</span> <span class="value">${u.name}</span><br>
<span class="key">Email:</span> <span class="value">${u.email}</span><br>
<span class="key">Phone:</span> <span class="value">${u.phone}</span><br>
<span class="key">Country:</span> <span class="value">${u.country}</span><br>
<span class="key">City:</span> <span class="value">${u.city}</span><br>
<span class="key">ZIP:</span> <span class="value">${u.zip}</span>
`;

        card.appendChild(btn);
        card.appendChild(content);
        output.appendChild(card);
    });
}

/* ACTIONS */
function generate(){
    output.innerHTML = '<div class="loader">...</div>';

    setTimeout(()=>{
        const count=parseInt(bulkInput.value||5);
        const arr=[];
        for(let i=0;i<count;i++){
            arr.push(generateUser());
        }
        lastData=arr;
        render(arr,false);
    },400);
}

function generateMore(){
    const arr=[];
    for(let i=0;i<3;i++){
        arr.push(generateUser());
    }
    lastData=lastData.concat(arr);
    render(arr,true);
}

function clearAll(){
    output.innerHTML='<div class="loader">...</div>';
    lastData=[];
}

/* EXPORT */
function copyAll(){
    navigator.clipboard.writeText(JSON.stringify(lastData,null,2));
}

function downloadJSON(){
    const blob=new Blob([JSON.stringify(lastData,null,2)]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.json";
    a.click();
}

function downloadCSV(){
    const rows=["Username,Name,Email,Phone,Country,City,ZIP"];
    lastData.forEach(u=>{
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`);
    });
    const blob=new Blob([rows.join("\n")]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.csv";
    a.click();
}

</script>
</body>
</html>

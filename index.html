<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* CENTER */
.wrapper{
    width:100%;
    max-width:760px;
    height:100vh;
    padding:20px;
    box-sizing:border-box;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    position:relative;
}
/* OUTPUT */
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:2px;
    width:100%;
    max-width:520px;
    margin:auto;
    justify-items:start;
    text-align:left;
    max-height: calc(100vh - 160px);
    overflow-y:auto;
    padding-bottom:140px;
    box-sizing:border-box;
    align-content:start;
}

/* CARD */
.card{
    width:100%;
    background:transparent;
    padding:0;
    margin:0;
    min-height:170px;
}

/* TEXT */
.line{
    margin:1px 0;
    line-height:1.28;
    font-size:14px;
    letter-spacing:.1px;
}

.label{
    color:#6f6f6f;
}

.value{
    color:#fff;
}

/* PREMIUM DOTS */
.loader{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -120px);

    font-size:7px;
    color:#8a8a8a;
    letter-spacing:2px;
    opacity:.75;

    pointer-events:none;
}

.loader span{
    animation:pulse 1.6s infinite;
    filter:blur(.2px);
}

.loader span:nth-child(2){
    animation-delay:.2s;
}

.loader span:nth-child(3){
    animation-delay:.4s;
}

@keyframes pulse{
    0%{opacity:.2;}
    50%{opacity:1;}
    100%{opacity:.2;}
}

/* CONTROL PANEL */
.topbar{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:34px;
}

/* BUTTONS */
button{
    background:none;
    border:none;
    color:#fff;
    cursor:pointer;
    font-size:14px;
    font-weight:500;
    letter-spacing:.3px;
    padding:0;
}

button:hover{
    opacity:.7;
}

/* INPUT */
input{
    width:28px;
    background:none;
    border:none;
    color:#fff;
    text-align:center;
    outline:none;
    font-size:14px;
}

/* CURSOR */
.typingCursor{
    display:inline-block;
    width:1px;
    height:14px;
    background:#666;
    margin-left:2px;
    animation:blink .8s infinite;
}

@keyframes blink{
    0%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- PREMIUM DOTS -->
    <div class="loader" id="loader">
        <span>•</span>
        <span>•</span>
        <span>•</span>
    </div>

    <div id="output" class="grid"></div>
</div>

<!-- CONTROLS -->
<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="generateMore()">more</button>
    <button onclick="clearAll()">clear</button>

    <input id="bulkInput" type="number" value="1" min="1" max="99">

    <button onclick="copyAll()">copy</button>
    <button onclick="downloadJSON()">json</button>
    <button onclick="downloadCSV()">csv</button>
</div>

<script>

/* =========================

{country:"Croatia",code:"+385",cities:["Zagreb","Split"],zips:["10000","21000"]},
{country:"Serbia",code:"+381",cities:["Belgrade","Novi Sad"],zips:["11000","21000"]},
{country:"Turkey",code:"+90",cities:["Istanbul","Ankara"],zips:["34000","06000"]},
{country:"Israel",code:"+972",cities:["Tel Aviv","Jerusalem"],zips:["61000","91000"]},
{country:"UAE",code:"+971",cities:["Dubai","Abu Dhabi"],zips:["00000","00000"]},
{country:"Saudi Arabia",code:"+966",cities:["Riyadh","Jeddah"],zips:["11564","21442"]},
{country:"India",code:"+91",cities:["Delhi","Mumbai","Bangalore"],zips:["110001","400001","560001"]},

{country:"Malaysia",code:"+60",cities:["Kuala Lumpur","Johor Bahru"],zips:["50000","80000"]},
{country:"Singapore",code:"+65",cities:["Singapore"],zips:["018989"]},
{country:"Australia",code:"+61",cities:["Sydney","Melbourne","Brisbane"],zips:["2000","3000","4000"]},
{country:"New Zealand",code:"+64",cities:["Auckland","Wellington"],zips:["1010","6011"]},
{country:"Brazil",code:"+55",cities:["Sao Paulo","Rio"],zips:["01000","20000"]},
{country:"Argentina",code:"+54",cities:["Buenos Aires","Cordoba"],zips:["C1000","X5000"]},
{country:"Chile",code:"+56",cities:["Santiago","Valparaiso"],zips:["8320000","2340000"]},
{country:"Mexico",code:"+52",cities:["Mexico City","Guadalajara"],zips:["01000","44100"]},
{country:"South Africa",code:"+27",cities:["Cape Town","Johannesburg"],zips:["8000","2000"]}

];

/* NAMES */

const firstNames = [
"Noah","Liam","Oliver","James","Lucas","Henry","Leo","Daniel","Jack","Ethan",
"Emma","Olivia","Sophia","Ava","Mia","Charlotte","Emily","Amelia","Ella","Grace"
];

const lastNames = [
"Smith","Johnson","Brown","Taylor","Anderson","White","Harris","Martin",
"Jackson","Moore","Clark","Walker","Hall","Allen","Young","King","Wright"
];

/* DOM */

const output = document.getElementById("output");
const bulkInput = document.getElementById("bulkInput");
const loader = document.getElementById("loader");

let lastData = [];

/* HELPERS */

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* USER GENERATOR */

function generateUser(){

    const loc = pick(countries);

    const first = pick(firstNames);
    const last = pick(lastNames);

    const username =
        (first + last + Math.floor(Math.random()*999)).toLowerCase();

    return {
        username,
        name:first + " " + last,
        email:username + "@gmail.com",
        phone:loc.code + " " + Math.floor(100000000 + Math.random()*900000000),
        country:loc.country,
        city:pick(loc.cities),
        zip:pick(loc.zips)
    };
}

/* TYPE ENGINE */

function typeHTML(el, user){

    el.innerHTML = "";
    el.style.opacity = "0.95";
el.style.transform = "translateY(0px)";

    const rows = [
        ["Username", user.username],
        ["Name", user.name],
        ["Email", user.email],
        ["Phone", user.phone],
        ["Country", user.country],
        ["City", user.city],
        ["ZIP", user.zip]
    ];

    let rowIndex = 0;

    function typeRow(){

        if(rowIndex >= rows.length) return;

        const [label, value] = rows[rowIndex++];

        const line = document.createElement("div");
        line.className = "line";

        const labelSpan = document.createElement("span");
        labelSpan.className = "label";
        labelSpan.textContent = label + ": ";

        const valueSpan = document.createElement("span");
        valueSpan.className = "value";

        line.appendChild(labelSpan);
        line.appendChild(valueSpan);

        const cursor = document.createElement("span");
        cursor.className = "typingCursor";

        line.appendChild(cursor);

        el.appendChild(line);

        let i = 0;

        function typeChar(){

            if(i < value.length){

                valueSpan.textContent += value[i++];
                setTimeout(typeChar, 12);

            } else {

                cursor.remove();
                requestAnimationFrame(() => {
    setTimeout(typeRow, 18);
});

            }
        }

        typeChar();
    }

    typeRow();
}

/* RENDER */

function render(list){

    output.sHTML = "";

    list.forEach((u,index)=>{

        const card = document.createElement("div");
        card.className = "card";

        output.appendChild(card);

        setTimeout(()=>{
            typeHTML(card,u);
        }, index * 120);

    });
}

/* ACTIONS */

function generate(){

    loader.style.display = "flex";

    const count = parseInt(bulkInput.value || 1);

    const arr = [];

    for(let i=0;i<count;i++){
        arr.push(generateUser());
    }

    lastData = arr;

    render(arr);
    loader.style.display = "none";
}

function generateMore(){

    const arr = [];

    for(let i=0;i<2;i++){
        arr.push(generateUser());
    }

    lastData = lastData.concat(arr);

    render(lastData);
}

function clearAll(){

    output.innerHTML = "";

    lastData = [];

    loader.style.display = "block";
}

/* EXPORT */

function copyAll(){

    navigator.clipboard.writeText(
        JSON.stringify(lastData,null,2)
    );
}

function downloadJSON(){

    const blob = new Blob(
        [JSON.stringify(lastData,null,2)],
        {type:"application/json"}
    );

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "users.json";

    a.click();
}

function downloadCSV(){

    const rows = [
        "Username,Name,Email,Phone,Country,City,ZIP"
    ];

    lastData.forEach(u=>{

        rows.push(
`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`
        );

    });

    const blob = new Blob(
        [rows.join("\n")],
        {type:"text/csv"}
    );

    const a = document.createElement("a");

    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";

    a.click();
}

</script>

</html>

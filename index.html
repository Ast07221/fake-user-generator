<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Engine</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow-x:hidden;
}

.wrapper{
    width:100%;
    max-width:900px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.grid{
    width:100%;
    max-width:700px;
    max-height:650px;
    overflow-y:auto;
}

.card{
    padding:12px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
    cursor:pointer;
}

.card:hover{ opacity:.85; }

.line{
    font-size:15px;
    line-height:1.5;
}

.label{ color:#8a8a8a; font-family:monospace; }
.value{ color:#f2f2f2; font-family:monospace; }

.topbar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

button, select, input{
    background:#0b0b0b;
    border:none;
    color:#fff;
    font-size:14px;
    padding:6px 10px;
}

button:hover{ opacity:.7; }

.loader{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:4px;
    color:#777;
    font-family:monospace;
    transition:opacity .3s ease;
}

.dots span{
    animation:blinkDots 1.2s infinite;
}

.dots span:nth-child(2){ animation-delay:0.2s; }
.dots span:nth-child(3){ animation-delay:0.4s; }

@keyframes blinkDots{
    0%,20%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>

<body>

<div class="loader" id="loader">
    <span id="loaderText"></span>
    <span class="dots"><span>.</span><span>.</span><span>.</span></span>
</div>

<div class="wrapper">
    <div id="output" class="grid"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="more()">more</button>
    <button onclick="clearAll()">clear</button>
    <input id="count" type="number" value="10" min="1" max="200">
    <select id="country"></select>
    <button onclick="copyAll()">copy</button>
</div>

<script>

/* =========================
   SAFE ENGINE (NO CRASH VERSION)
========================= */

const ENGINE = [
{
country:"USA", code:"+1",
cities:["New York","Los Angeles","Chicago","Houston","Miami","Seattle","Dallas"],
streets:["Main St","Oak Ave","Pine Rd","Broadway","5th Ave","Sunset Blvd"],
zip:()=>String(10000+Math.random()*89999|0),
area:["201","202","305","312","415","646"]
},
{
country:"UK", code:"+44",
cities:["London","Manchester","Birmingham","Liverpool","Leeds"],
streets:["High St","King Rd","Queen St","Oxford St"],
zip:()=>["SW1A","M1","L1","B1","EC1"][Math.random()*5|0],
area:["74","75","77","78"]
},
{
country:"Germany", code:"+49",
cities:["Berlin","Munich","Hamburg","Cologne","Frankfurt"],
streets:["Hauptstr","Bahnhofstr","Marktweg"],
zip:()=>String(10000+Math.random()*89999|0),
area:["151","160","170"]
},
{
country:"France", code:"+33",
cities:["Paris","Lyon","Marseille","Nice"],
streets:["Rue Victor Hugo","Rue Lafayette","Avenue Republique"],
zip:()=>String(10000+Math.random()*89999|0),
area:["6","7","1"]
},
{
country:"Netherlands", code:"+31",
cities:["Amsterdam","Rotterdam","Utrecht"],
streets:["Damrak","Leidsestraat","Kalverstraat"],
zip:()=>String(1000+Math.random()*8999|0),
area:["6","20"]
},
{
country:"Japan", code:"+81",
cities:["Tokyo","Osaka","Kyoto","Nagoya"],
streets:["Shibuya","Ginza","Akihabara"],
zip:()=>String(1000000+Math.random()*8999999|0),
area:["70","80","90"]
}
];

const firstNames=["Alex","John","Michael","David","James","Emma","Olivia","Sophia","Liam","Noah","Mia","Ava"];
const lastNames=["Smith","Brown","Johnson","Taylor","Wilson","Martin","Lee","Clark"];

const output=document.getElementById("output");
const select=document.getElementById("country");
const loader=document.getElementById("loader");

let last=[];
    /* INIT SAFE */
function init(){
    if(!select) return;

    select.innerHTML=`<option value="all">any country</option>`;
    ENGINE.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        select.appendChild(o);
    });
}

/* SAFE PICK */
function pick(a){
    return a[Math.floor(Math.random()*a.length)];
}

/* USER GEN */
function user(){
    const d = (!select || select.value==="all")
        ? pick(ENGINE)
        : ENGINE.find(x=>x.country===select.value) || pick(ENGINE);

    const first = pick(firstNames);
    const last = pick(lastNames);

    const username = (first + last + (Math.random()*999|0)).toLowerCase();

    return {
        username,
        name: first + " " + last,
        email: username + "@" + pick(["gmail.com","outlook.com","proton.me"]),
        phone: `${d.code} ${pick(d.area)} ${Math.floor(1000000 + Math.random()*9000000)}`,
        country: d.country,
        city: pick(d.cities),
        street: pick(d.streets) + " " + (Math.floor(Math.random()*200)),
        zip: d.zip()
    };
}

/* RENDER SAFE */
function render(arr){
    if(!output) return;

    output.innerHTML = "";

    arr.forEach((u,i)=>{
        const c = document.createElement("div");
        c.className = "card";

        output.appendChild(c);

        setTimeout(()=>{
            c.innerHTML = `
                <div class="line"><span class="label">User:</span> <span class="value">${u.username}</span></div>
                <div class="line"><span class="label">Name:</span> <span class="value">${u.name}</span></div>
                <div class="line"><span class="label">Email:</span> <span class="value">${u.email}</span></div>
                <div class="line"><span class="label">Phone:</span> <span class="value">${u.phone}</span></div>
                <div class="line"><span class="label">Country:</span> <span class="value">${u.country}</span></div>
                <div class="line"><span class="label">City:</span> <span class="value">${u.city}</span></div>
                <div class="line"><span class="label">Street:</span> <span class="value">${u.street}</span></div>
                <div class="line"><span class="label">ZIP:</span> <span class="value">${u.zip}</span></div>
            `;
        }, i * 20);
    });
}

/* LOADER SAFE (USED WITH showLoader/hideLoader) */
function typeLoader(){
    const el = loader;
    if(!el) return;

    const text = "INITIALIZING ENGINE...";
    let i = 0;

    el.innerHTML = "";

    const t = setInterval(()=>{
        if(i >= text.length){
            clearInterval(t);
            return;
        }
        el.innerHTML += text[i++];
    }, 35);
}

/* ACTIONS */
function generate(){
    showLoader();

    setTimeout(()=>{
        const n = Math.min(
            200,
            parseInt((document.getElementById("count") || {}).value || 10)
        );

        last = Array.from({length:n}, user);
        render(last);

        hideLoader();
    }, 500);
}

function more(){
    const extra = Array.from({length:5}, user);
    last = last.concat(extra);
    render(last);
}

function clearAll(){
    if(output) output.innerHTML = "";
    last = [];
}

/* START SAFE */
init();
window.onload=generate;

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Generator V2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, system-ui;
    background: #0b0b0b;
    color: #fff;

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
}

/* CENTER LAYOUT */
.wrapper {
    width: 540px;
    text-align: center;
}

#status {
    font-size: 12px;
    opacity: 0.6;
}

/* OUTPUT */
#output {
    margin-top: 20px;
    display: grid;
    gap: 12px;
}

.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px;
    text-align: left;
}

/* DOCK */
.bottomBar {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    gap: 10px;
    align-items: center;

    padding: 10px 14px;

    background: rgba(20,20,20,0.6);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;

    backdrop-filter: blur(16px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* BUTTONS */
button {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);

    color: #eaeaea;
    padding: 9px 14px;
    border-radius: 12px;

    font-size: 13px;
    font-weight: 500;

    cursor: pointer;
    transition: 0.18s;
}

button:hover {
    background: rgba(255,255,255,0.1);
    transform: translateY(-1px);
}

input {
    width: 60px;
    background: #111;
    border: 1px solid #222;
    color: #fff;
    border-radius: 10px;
    text-align: center;
    padding: 6px;
}

.key {
    color: #888;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="status">ready</div>
    <div id="output"></div>
</div>

<div class="bottomBar">
    <button onclick="generate()">Generate</button>
    <button onclick="more()">More</button>
    <button onclick="clearAll()">Clear</button>
    <input id="count" type="number" value="6" min="1" max="50">
</div>

<script>

/* =========================
   REALISTIC GLOBAL DATA (50+ COUNTRIES READY STRUCTURE)
========================= */

const data = [
{
country:"USA",code:"+1",
first:["James","John","Robert","Michael","Emma","Olivia","Sophia","David","Daniel"],
last:["Smith","Johnson","Brown","Williams","Jones","Miller"],
city:["New York","Los Angeles","Chicago","Miami","Dallas"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"UK",code:"+44",
first:["Oliver","Harry","George","Jack","Emily","Amelia","Isla"],
last:["Smith","Taylor","Brown","Wilson","Evans"],
city:["London","Manchester","Liverpool","Birmingham"],
zip:()=> "SW"+Math.floor(10+Math.random()*90)
},
{
country:"Germany",code:"+49",
first:["Lukas","Leon","Finn","Paul","Anna","Marie","Sophia"],
last:["Müller","Schmidt","Weber","Fischer","Klein"],
city:["Berlin","Munich","Hamburg","Cologne"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"France",code:"+33",
first:["Louis","Lucas","Hugo","Emma","Chloe","Léa"],
last:["Martin","Bernard","Dubois","Moreau"],
city:["Paris","Lyon","Marseille","Nice"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"Spain",code:"+34",
first:["Mateo","Leo","Hugo","Lucia","Sofia","Martina"],
last:["Garcia","Lopez","Martinez","Sanchez"],
city:["Madrid","Barcelona","Valencia","Seville"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"Italy",code:"+39",
first:["Luca","Marco","Giulia","Sofia","Matteo"],
last:["Rossi","Ferrari","Bianchi","Romano"],
city:["Rome","Milan","Naples","Turin"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"Netherlands",code:"+31",
first:["Daan","Lars","Sophie","Emma","Noah"],
last:["de Jong","Jansen","Visser","Bakker"],
city:["Amsterdam","Rotterdam","Utrecht"],
zip:()=>Math.floor(1000+Math.random()*8999)
},
{
    country:"Canada",code:"+1",
first:["Liam","Noah","Emma","Ava","Mason"],
last:["Brown","Martin","Lee","Wilson"],
city:["Toronto","Vancouver","Montreal"],
zip:()=> "M"+Math.floor(1+Math.random()*9)
},
{
country:"Japan",code:"+81",
first:["Haruto","Yuto","Sota","Yui","Aoi"],
last:["Sato","Suzuki","Tanaka","Kobayashi"],
city:["Tokyo","Osaka","Kyoto"],
zip:()=>Math.floor(1000000+Math.random()*8999999)
}
];

/* ========================= */

const output = document.getElementById("output");
const count = document.getElementById("count");

let last = [];

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* CORE GENERATOR */
function gen(){

    const loc = pick(data);

    const first = pick(loc.first);
    const lastName = pick(loc.last);
    const city = pick(loc.city);

    const username = (first + lastName + Math.floor(Math.random()*999)).toLowerCase();

    return {
        username,
        name: first + " " + lastName,
        email: username + "@mail.com",
        phone: loc.code + Math.floor(100000000 + Math.random()*900000000),
        country: loc.country,
        city,
        address: "Street " + Math.floor(Math.random()*300),
        zip: loc.zip()
    };
}

/* RENDER */
function render(arr){
    output.innerHTML = "";

    arr.forEach(u=>{
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div><span class="key">Name:</span> ${u.name}</div>
            <div><span class="key">Email:</span> ${u.email}</div>
            <div><span class="key">Phone:</span> ${u.phone}</div>
            <div><span class="key">Country:</span> ${u.country}</div>
            <div><span class="key">City:</span> ${u.city}</div>
            <div><span class="key">ZIP:</span> ${u.zip}</div>
        `;

        output.appendChild(div);
    });
}

/* ACTIONS */
function generate(){
    const arr = [];
    const n = parseInt(count.value);

    for(let i=0;i<n;i++){
        arr.push(gen());
    }

    last = arr;
    render(arr);
}

function more(){
    const arr = [];

    for(let i=0;i<6;i++){
        arr.push(gen());
    }

    last = last.concat(arr);
    render(last);
}

function clearAll(){
    output.innerHTML = "";
    last = [];
}

</script>

</body>
</html>

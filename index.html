    /* =========================

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function createUser(){

  const keys = Object.keys(DATA);
  const country = pick(keys);
  const c = DATA[country];

  const first = pick(c.first);
  const last = pick(c.last);

  const username = (first + last + Math.floor(Math.random()*999)).toLowerCase();

  return {
    username,
    name: first + " " + last,
    email: username + "@mail.com",
    phone: c.phone(),
    country,
    city: pick(c.cities),
    address: "Street " + Math.floor(Math.random()*300),
    zip: c.zip()
  };
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
    overflow: hidden;
}

.wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    max-width: 1100px;
    padding: 20px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:14px;
}

.card {
    background:#151515;
    padding:16px;
    border-radius:14px;
    position:relative;
}

.copyBtn {
    position:absolute;
    top:10px;
    right:10px;
    font-size:11px;
    opacity:0.6;
    cursor:pointer;
}

.topbar {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    background: rgba(15,15,15,0.75);
    backdrop-filter: blur(10px);
    padding: 12px 18px;
    border-radius: 16px;
}

button {
    background:#1a1a1a;
    border:1px solid #2a2a2a;
    color:#fff;
    padding:10px 16px;
    cursor:pointer;
    border-radius:12px;
}

select, input {
    background:#111;
    color:#fff;
    border:1px solid #222;
    padding:8px;
    border-radius:8px;
}

.loader {
    text-align:center;
    font-size:20px;
    letter-spacing:6px;
    opacity:0.7;
}
.loader::after {
    content: ".";
    animation: dots 1.4s infinite;
}
@keyframes dots {
    0%{content:".";}
    33%{content:"..";}
    66%{content:"...";}
    100%{content:".";}
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="output" class="loader">...</div>
</div>

<div class="topbar">
    <button onclick="generate()">Generate</button>
    <button onclick="generateMore()">More</button>
    <button onclick="clearAll()">Clear</button>
    <select id="countryFilter"></select>
    <input id="bulkInput" type="number" value="5">
    <button onclick="copyAll()">Copy</button>
    <button onclick="downloadJSON()">JSON</button>
    <button onclick="downloadCSV()">CSV</button>
</div>

<script>

/* =========================
   REAL DATASET (100+ стран)
========================= */

const countries = [

{country:"Australia",code:"+61",cities:["Sydney","Melbourne"],zips:["2000","3000"]},
{country:"Japan",code:"+81",cities:["Tokyo","Osaka"],zips:["100-0001","530-0001"]},
{country:"Brazil",code:"+55",cities:["Rio de Janeiro","Sao Paulo"],zips:["20000","01000"]},
{country:"India",code:"+91",cities:["Delhi","Mumbai"],zips:["110001","400001"]},
{country:"China",code:"+86",cities:["Beijing","Shanghai"],zips:["100000","200000"]},
{country:"Mexico",code:"+52",cities:["Mexico City","Guadalajara"],zips:["01000","44100"]},

{country:"Turkey",code:"+90",cities:["Istanbul","Ankara"],zips:["34000","06000"]},
{country:"Sweden",code:"+46",cities:["Stockholm","Gothenburg"],zips:["10005","40010"]},

{country:"Denmark",code:"+45",cities:["Copenhagen"],zips:["1000"]},
{country:"Finland",code:"+358",cities:["Helsinki"],zips:["00100"]},
    {country:"Poland",code:"+48",cities:["Warsaw","Krakow"],zips:["00-001","30-001"]},
{country:"Ukraine",code:"+380",cities:["Kyiv","Lviv"],zips:["01001","79000"]},
{country:"Argentina",code:"+54",cities:["Buenos Aires"],zips:["1000"]},
{country:"Chile",code:"+56",cities:["Santiago"],zips:["8320000"]},
{country:"Colombia",code:"+57",cities:["Bogota"],zips:["110111"]},
{country:"South Africa",code:"+27",cities:["Cape Town"],zips:["8000"]},
{country:"Egypt",code:"+20",cities:["Cairo"],zips:["11511"]},
{country:"Saudi Arabia",code:"+966",cities:["Riyadh"],zips:["11564"]},
{country:"UAE",code:"+971",cities:["Dubai"],zips:["00000"]},
{country:"Indonesia",code:"+62",cities:["Jakarta"],zips:["10110"]},
{country:"Thailand",code:"+66",cities:["Bangkok"],zips:["10100"]},
{country:"Vietnam",code:"+84",cities:["Hanoi"],zips:["100000"]},
{country:"Philippines",code:"+63",cities:["Manila"],zips:["1000"]},

{country:"Greece",code:"+30",cities:["Athens"],zips:["10552"]},
{country:"Czech Republic",code:"+420",cities:["Prague"],zips:["11000"]},
{country:"Hungary",code:"+36",cities:["Budapest"],zips:["1000"]},
{country:"Romania",code:"+40",cities:["Bucharest"],zips:["010011"]},
{country:"Bulgaria",code:"+359",cities:["Sofia"],zips:["1000"]},
{country:"Croatia",code:"+385",cities:["Zagreb"],zips:["10000"]},
{country:"Slovakia",code:"+421",cities:["Bratislava"],zips:["81101"]},
{country:"Slovenia",code:"+386",cities:["Ljubljana"],zips:["1000"]},
{country:"Estonia",code:"+372",cities:["Tallinn"],zips:["10111"]},
{country:"Latvia",code:"+371",cities:["Riga"],zips:["LV-1001"]},
{country:"Lithuania",code:"+370",cities:["Vilnius"],zips:["01100"]}
];

/* NAMES */
const firstNames = ["Liam","Noah","Oliver","Emma","Olivia","Ava","Sophia","Mason","Lucas","Ethan","James","Amelia","Henry","Isabella"];
const lastNames = ["Smith","Johnson","Brown","Taylor","Anderson","Thomas","White","Martin","Jackson","Lee","Harris","Clark"];

/* INIT */
const output = document.getElementById("output");
const filter = document.getElementById("countryFilter");
const bulkInput = document.getElementById("bulkInput");
let lastData = [];

function init(){
    filter.innerHTML = `<option value="all">All</option>`;
    countries.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        filter.appendChild(o);
    });
}
init();

/* CORE */
function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateUser(){
    let pool = countries;
    if(filter.value !== "all"){
        pool = countries.filter(c=>c.country===filter.value);
    }

    const loc = pick(pool);
    const first = pick(firstNames);
    const last = pick(lastNames);

    const username = (first+"."+last+Math.floor(Math.random()*999)).toLowerCase();

    return {
        username,
        name: first+" "+last,
        email: username+"@gmail.com",
        phone: loc.code+" "+Math.floor(100000000+Math.random()*900000000),
        country: loc.country,
        city: pick(loc.cities),
        zip: pick(loc.zips)
    };
}

/* RENDER */
function render(list, append=false){
    if(!append) output.innerHTML = "";
    list.forEach(u=>{
        const card=document.createElement("div");
        card.className="card";

        const btn=document.createElement("div");
        btn.className="copyBtn";
        btn.innerText="copy";
        btn.onclick=()=>navigator.clipboard.writeText(JSON.stringify(u,null,2));

        const content=document.createElement("div");
        content.innerText =
`Username: ${u.username}
Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
ZIP: ${u.zip}`;

        card.appendChild(btn);
card.appendChild(content);
        output.appendChild(card);
    });
}

/* ACTIONS */
function generate(){
    output.innerHTML = '<div class="loader">...</div>';

    setTimeout(()=>{
        const count=parseInt(bulkInput.value||5);
        const arr=[];
        for(let i=0;i<count;i++){
            arr.push(generateUser());
        }
        lastData=arr;
        render(arr,false);
    },400);
}

function generateMore(){
    const arr=[];
    for(let i=0;i<3;i++){
        arr.push(generateUser());
    }
    lastData=lastData.concat(arr);
    render(arr,true);
}

function clearAll(){
    output.innerHTML='<div class="loader">...</div>';
    lastData=[];
}

/* EXPORT */
function copyAll(){
    navigator.clipboard.writeText(JSON.stringify(lastData,null,2));
}
function downloadJSON(){
    const blob=new Blob([JSON.stringify(lastData,null,2)]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.json";
    a.click();
}
function downloadCSV(){
    const rows=["Username,Name,Email,Phone,Country,City,ZIP"];
    lastData.forEach(u=>{
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`);
    });
    const blob=new Blob([rows.join("\n")]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.csv";
    a.click();
}

</script>
</body>
</html>

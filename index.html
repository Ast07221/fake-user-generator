<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family: ui-monospace, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CENTER WRAPPER */
.wrapper{
    width:100%;
    max-width:520px;
}

/* OUTPUT */
.grid{
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* ❌ REMOVED BORDERS (as requested) */
.card{
    position:relative;
    padding:8px 12px;
    background:transparent; /* единый фон */
}

/* LINES */
.line{
    display:flex;
    gap:6px;
    font-size:14px;
    line-height:1.3;
}

.label{
    color:#8a8a8a;
    min-width:70px;
}

.value{
    color:#fff;
}

/* COPY */
.copy{
    position:absolute;
    right:6px;   /* 🔥  было дальше — теперь ближе */
    top:6px;
    font-size:11px;
    color:#777;
    cursor:pointer;
}
.copy:hover{
    color:#fff;
    transform:scale(1.05);
}

/* TOPBAR */
.topbar{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    align-items:center;
}

/* BUTTON STYLE */
button{
    background:none;
    border:none;
    color:#aaa;
    cursor:pointer;
}
button:hover{ color:#fff; }

input{
    width:30px;
    background:none;
    border:none;
    color:#fff;
    text-align:center;
}

select{
    background:#000;
    color:#fff;
    border:none;
}

/* LOADER */
.loader{
    width:100%;
    text-align:center;
    margin-bottom:10px;   /* 🔥  теперь он прямо над генерацией */
    font-size:12px;
    color:#777;
    display:none;
}

/* DOT ANIMATION */
.dots span{
    animation:blink 1s infinite;
}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
    0%,100%{opacity:0;}
    50%{opacity:1;}
}
</style>
</head>

<body>

<div class="loader" id="loader">
    INITIALIZING ENGINE
    <span class="dots"><span>.</span><span>.</span><span>.</span></span>
</div>

<div class="wrapper">

    <div class="loader" id="loader">
        INITIALIZING ENGINE
        <span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </div>

    <div class="grid" id="out"></div>

</div>

    <div class="grid" id="out"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <input id="count" type="number" value="1" min="1" max="50">
    <select id="country"></select>
</div>

<script>

/* 🌍 LOGICALLY CONNECTED DATA */
const DATA = [
{c:"USA",code:"+1",cities:["New York","Los Angeles","Chicago"],area:["201","305","312"]},
{c:"UK",code:"+44",cities:["London","Manchester"],area:["74","75"]},
{c:"Germany",code:"+49",cities:["Berlin","Munich"],area:["151","160"]},
{c:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"],area:["6","20"]},
{c:"Japan",code:"+81",cities:["Tokyo","Osaka"],area:["70","80"]},
{c:"France",code:"+33",cities:["Paris","Lyon"],area:["6","7"]}
];

const first=["Alex","John","Emma","Noah","Liam","Mia"];
const last=["Smith","Brown","Lee","Taylor","Wilson"];

const out=document.getElementById("out");
const loader=document.getElementById("loader");
const sel=document.getElementById("country");

let cache=[];

/* INIT */
function init(){
    sel.innerHTML=`<option value="all">any country</option>`;
    DATA.forEach(d=>{
        let o=document.createElement("option");
        o.value=d.c;
        o.textContent=d.c;
        sel.appendChild(o);
    });
}

/* PICK */
function pick(a){
    return a[Math.floor(Math.random()*a.length)];
}

/* USER (LOGICALLY CONNECTED) */
function user(){
    const d = sel.value==="all"
        ? pick(DATA)
        : DATA.find(x=>x.c===sel.value) || pick(DATA);

    const fn=pick(first);
    const ln=pick(last);

    const username=(fn+ln+(Math.random()*999|0)).toLowerCase();

    return{
        username,
        name:fn+" "+ln,
        email:username+"@mail.com",
        phone:`${d.code} ${pick(d.area)} ${Math.floor(Math.random()*9000000+1000000)}`,
        country:d.c,
        city:pick(d.cities)
    };
}

/* ⌨️  TYPE EFFECT (FIXED + CENTER SAFE) */
function typeLine(parent,label,value,cb){
    const row=document.createElement("div");
    row.className="line";

    const l=document.createElement("span");
    l.className="label";
    l.textContent=label;

    const v=document.createElement("span");
    v.className="value";

    row.appendChild(l);
    row.appendChild(v);
    parent.appendChild(row);

    let i=0;
    function t(){
        if(i<value.length){
            v.textContent+=value[i++];
            setTimeout(t,10);
        } else cb && cb();
    }
    t();
}

/* RENDER */
function render(arr){
    out.innerHTML="";

    arr.forEach((u,i)=>{
        const card=document.createElement("div");
        card.className="card";

        const copy=document.createElement("div");
        copy.className="copy";
        copy.textContent="copy";
        copy.onclick=()=>navigator.clipboard.writeText(JSON.stringify(u,null,2));

        card.appendChild(copy);
        out.appendChild(card);

        setTimeout(()=>{
            const fields=[
                ["User:",u.username],
                ["Name:",u.name],
                ["Email:",u.email],
                ["Phone:",u.phone],
                ["Country:",u.country],
                ["City:",u.city]
            ];

            let i=0;
            function next(){
                if(i>=fields.length) return;
                typeLine(card,fields[i][0],fields[i][1],()=>{
                    i++;
                    next();
                });
            }
            next();

        },i*25);
    });
}

/* LOADER */
function showLoader(){
    loader.style.display="block";
}
function hideLoader(){
    loader.style.display="none";
}

/* GENERATE */
function generate(){
    showLoader();

    setTimeout(()=>{
        const n=Math.max(1,Math.min(50,parseInt(selCount()||1)));
        cache=Array.from({length:n},user);
        render(cache);
        hideLoader();
    },150);
}

/* SAFE COUNT */
function selCount(){
    const el=document.getElementById("count");
    return el?el.value:1;
}

/* START */
init();
window.onload=generate;

</script>

</body>
</html>

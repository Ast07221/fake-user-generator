<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeUserGeneratorPro</title>

<style>
body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: #0a0a0a;
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Title */
#app-title {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 26px;
    opacity: 0;
    transition: opacity 0.8s ease;
}

#app-title.visible {
    opacity: 1;
}

/* Layout */
#generator {
    width: 340px;
}

/* Actions */
.actions {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.actions span {
    cursor: pointer;
    color: #fff;
}

.actions span:hover {
    opacity: 0.5;
}

/* Select */
select {
    width: 100%;
    background: transparent;
    border: none;
    color: #888;
    margin-bottom: 15px;
    outline: none;
}

/* Output */
#output {
    white-space: pre-line;
    min-height: 160px;
    font-size: 14px;
    line-height: 1.6;
}

/* Cursor */
.cursor::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* Dots */
#dots {
    opacity: 0;
    margin-bottom: 10px;
}

#dots.active {
    opacity: 1;
}

#dots::after {
    content: '...';
    animation: blink 1.2s infinite;
}

/* Status */
#status {
    font-size: 12px;
    color: #777;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.3s;
}

#status.show {
    opacity: 1;
}
</style>
</head>
<body>

<div id="app-title">FakeUserGeneratorPro</div>

<div id="generator">

    <div class="actions">
        <span onclick="generateUser()">Generate</span>
        <span onclick="generateBulk()">Bulk</span>
        <span onclick="copyText()">Copy</span>
        <span onclick="exportCSV()">Export</span>
    </div>

    <select id="country">
        <option value="">Random Country</option>
        <option value="us">USA</option>
        <option value="de">Germany</option>
        <option value="fr">France</option>
        <option value="ca">Canada</option>
    </select>

    <div id="dots"></div>
    <div id="output"></div>
    <div id="status">Done</div>

</div>

<script>
const title = document.getElementById("app-title");
const output = document.getElementById("output");
const dots = document.getElementById("dots");
const status = document.getElementById("status");
const country = document.getElementById("country");

let lastData = [];

setTimeout(() => title.classList.add("visible"), 500);

/* Fetch user */
async function fetchUsers(count = 1) {
    const nat = country.value;
    const url = `https://randomuser.me/api/?results=${count}${nat ? "&nat=" + nat : ""}`;
    
    const res = await fetch(url);
    const data = await res.json();

    return data.results.map(u => ({
        name: u.name.first + " " + u.name.last,
        email: u.email,
        phone: u.phone,
        country: u.location.country,
        city: u.location.city,
        zip: u.location.postcode
    }));
}

/* Format */
function formatUser(u) {
    return `Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
ZIP: ${u.zip}`;
}

/* Typing */
function typeText(text, speed = 8) {
    output.innerHTML = "";
    output.classList.add("cursor");

    let i = 0;
    function typing() {
        if (i < text.length) {
            output.innerHTML += text[i++];
            setTimeout(typing, speed);
        } else {
            output.classList.remove("cursor");
        }
    }
    typing();
}

/* Generate one */
async function generateUser() {
    dots.classList.add("active");
    output.innerHTML = "";

    const users = await fetchUsers(1);
    lastData = users;

    dots.classList.remove("active");
    typeText(formatUser(users[0]));
}

/* Bulk */
async function generateBulk() {
    dots.classList.add("active");
    output.innerHTML = "";

    const users = await fetchUsers(5);
    lastData = users;

    dots.classList.remove("active");

    const text = users.map(formatUser).join("\\n\\n");
    typeText(text, 4);
}

/* Copy */
function copyText() {
    navigator.clipboard.writeText(output.innerText);
    showStatus("Copied");
}

/* Export CSV */
function exportCSV() {
    if (!lastData.length) return;

    const rows = ["Name,Email,Phone,Country,City,ZIP"];
    lastData.forEach(u => {
        rows.push(`${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`);
    });

    const blob = new Blob([rows.join("\\n")], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();

    showStatus("Exported");
}

/* Status */
function showStatus(text) {
    status.innerText = text;
    status.classList.add("show");

    setTimeout(() => status.classList.remove("show"), 1200);
}
</script>

</body>
</html>

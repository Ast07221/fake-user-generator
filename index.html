<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeUserGeneratorPro</title>

<style>
body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
}

/* центр */
.wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 380px;
    text-align: center;
}

/* output */
#output {
    white-space: pre-line;
    min-height: 180px;
    font-size: 14px;
    line-height: 1.6;
    text-align: left;
}

/* loader */
#loader {
    opacity: 0;
    height: 20px;
    margin-bottom: 10px;
}

#loader.active {
    opacity: 1;
}

.dot {
    display: inline-block;
    animation: blink 1.4s infinite;
    font-size: 20px;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* кнопки снизу */
.actions {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
    gap: 20px;
}

.actions span {
    cursor: pointer;
    color: #fff;
    font-size: 14px;
}

.actions span:hover {
    opacity: 0.5;
}

/* курсор */
.cursor::after {
    content: "|";
    animation: blink 1s infinite;
}
</style>
</head>

<body>

<div class="wrapper">

    <div id="loader">
        <span class="dot">.</span>
        <span class="dot">.</span>
        <span class="dot">.</span>
    </div>

    <div id="output"></div>

    <div class="actions">
        <span onclick="generate()">Generate</span>
        <span onclick="bulk()">Bulk</span>
        <span onclick="copy()">Copy</span>
        <span onclick="downloadJSON()">JSON</span>
        <span onclick="downloadCSV()">CSV</span>
    </div>

</div>

<script>
const output = document.getElementById("output");
const loader = document.getElementById("loader");

let lastData = [];
let isRunning = false;

/* база */
const names = ["John Smith","Emma Brown","Liam Johnson","Olivia Davis","Noah Wilson","Ava Martinez"];
const countries = ["USA","Germany","France","Canada","UK","Italy","Spain","Poland","Netherlands","Sweden"];
const cities = ["New York","Berlin","Paris","Toronto","London","Rome","Madrid","Warsaw","Amsterdam","Stockholm"];

/* user */
function createUser() {
    const name = names[Math.floor(Math.random()*names.length)];
    const country = countries[Math.floor(Math.random()*countries.length)];
    const city = cities[Math.floor(Math.random()*cities.length)];

    return {
        name,
        email: name.toLowerCase().replace(" ","") + "@mail.com",
        phone: "+" + Math.floor(1000000000 + Math.random()*9000000000),
        country,
        city,
        zip: Math.floor(10000 + Math.random()*90000)
    };
}

/* формат */
function format(u) {
    return `Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
ZIP: ${u.zip}`;
}

/* печать (жёсткий reset чтобы не накладывалось) */
function print(text) {
    output.classList.remove("cursor");
    output.innerHTML = "";

    let i = 0;
    output.classList.add("cursor");

    function type() {
        if (i < text.length) {
            output.innerHTML += text[i++];
            setTimeout(type, 6);
        } else {
            output.classList.remove("cursor");
        }
    }

    type();
}

/* loader */
function showLoader(state) {
    loader.classList.toggle("active", state);
}

/* generate */
function generate() {
    if (isRunning) return;
    isRunning = true;

    showLoader(true);
    output.innerHTML = "";

    setTimeout(() => {
        const u = createUser();
        lastData = [u];

        showLoader(false);
        print(format(u));

        isRunning = false;
    }, 900);
}

/* bulk */
function bulk() {
    if (isRunning) return;
    isRunning = true;

    showLoader(true);
    output.innerHTML = "";

    setTimeout(() => {
        const arr = [];
        for (let i = 0; i < 5; i++) arr.push(createUser());

        lastData = arr;

        showLoader(false);
        print(arr.map(format).join("\n\n"));

        isRunning = false;
    }, 900);
}

/* copy */
function copy() {
    navigator.clipboard.writeText(output.innerText);
}

/* JSON */
function downloadJSON() {
    const blob = new Blob([JSON.stringify(lastData,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.json";
    a.click();
}

/* CSV */
function downloadCSV() {
    const rows = ["Name,Email,Phone,Country,City,ZIP"];
    lastData.forEach(u =>
        rows.push(`${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`)
    );

    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();
}
</script>

</body>
</html>

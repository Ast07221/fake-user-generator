<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeUserGeneratorPro</title>

<style>
body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
    overflow: hidden;
}

/* Центр экрана */
.wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* Title */
#app-title {
    position: absolute;
    top: 25px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    opacity: 1;
}

/* Actions */
.actions {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-bottom: 18px;
    flex-wrap: wrap;
}

.actions span {
    cursor: pointer;
    color: #fff;
    font-size: 14px;
}

.actions span:hover {
    opacity: 0.5;
}

/* Output */
#output {
    white-space: pre-line;
    min-height: 180px;
    font-size: 14px;
    line-height: 1.6;
    text-align: left;
    width: 360px;
}

/* Cursor */
.cursor::after {
    content: "|";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<div id="app-title">FakeUserGeneratorPro</div>

<div class="wrapper">

    <div class="actions">
        <span onclick="generate()">Generate</span>
        <span onclick="bulk()">Bulk</span>
        <span onclick="copy()">Copy</span>
        <span onclick="downloadJSON()">JSON</span>
        <span onclick="downloadCSV()">CSV</span>
    </div>

    <div id="output"></div>

</div>

<script>
const output = document.getElementById("output");

let lastData = [];
let lock = false;

/* 100+ базовых данных */
const names = [
"John Smith","Emma Brown","Liam Johnson","Olivia Davis","Noah Wilson","Ava Martinez",
"James Anderson","Sophia Taylor","Benjamin Thomas","Mia Hernandez","Lucas Moore",
"Amelia Martin","Henry Lee","Evelyn Perez","Alexander White","Abigail Harris",
"Michael Clark","Emily Lewis","Daniel Walker","Harper Young"
];

const countries = [
"USA","Germany","France","Canada","UK","Italy","Spain","Poland","Netherlands","Sweden"
];

const cities = [
"New York","Berlin","Paris","Toronto","London","Rome","Madrid","Warsaw","Amsterdam","Stockholm"
];

/* генерация пользователя */
function createUser() {
    const name = names[Math.floor(Math.random() * names.length)];
    const country = countries[Math.floor(Math.random() * countries.length)];
    const city = cities[Math.floor(Math.random() * cities.length)];

    const email = name.toLowerCase().replace(" ","") + "@mail.com";
    const phone = "+" + Math.floor(1000000000 + Math.random()*9000000000);
    const zip = Math.floor(10000 + Math.random()*90000);

    return {
        name,
        email,
        phone,
        country,
        city,
        zip
    };
}

/* формат */
function format(u) {
    return `Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
ZIP: ${u.zip}`;
}

/* печать */
function print(text) {
    output.innerHTML = "";
    output.classList.add("cursor");

    let i = 0;
    function type() {
        if (i < text.length) {
            output.innerHTML += text[i++];
            setTimeout(type, 6);
        } else {
            output.classList.remove("cursor");
        }
    }
    type();
}

/* generate */
function generate() {
    if (lock) return;
    lock = true;

    const u = createUser();
    lastData = [u];

    print(format(u));

    setTimeout(() => lock = false, 500);
}

/* bulk */
function bulk() {
    if (lock) return;
    lock = true;

    const arr = [];
    for (let i = 0; i < 5; i++) arr.push(createUser());

    lastData = arr;

    print(arr.map(format).join("\n\n"));

    setTimeout(() => lock = false, 500);
}

/* copy */
function copy() {
    navigator.clipboard.writeText(output.innerText);
}

/* JSON */
function downloadJSON() {
    const blob = new Blob([JSON.stringify(lastData,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.json";
    a.click();
}

/* CSV */
function downloadCSV() {
    const rows = ["Name,Email,Phone,Country,City,ZIP"];
    lastData.forEach(u => {
        rows.push(`${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`);
    });

    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();
}
</script>

</body>
</html>

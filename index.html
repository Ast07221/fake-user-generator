<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator</title>

<style>
body{
    margin:0;
    font-family:system-ui, monospace;
    background:#0b0b0b;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CENTER CONTAINER */
.wrapper{
    width:100%;
    max-width:900px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin:0 auto;
}

.grid{
    width:100%;
    max-width:700px;
    max-height:650px;
    overflow-y:auto;

    display:flex;
    flex-direction:column;
    align-items:center;   /* 🔥  центр карточек */
    margin:0 auto;
}

/* CARD */
.card{
    width:100%;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

/* LINE STYLE */
.line{
    font-size:15px;
    line-height:1.4;
    display:flex;
    gap:6px;
}

/* LABELS */
.label{
    color:#777;
    min-width:80px;
}

/* VALUES */
.value{
    color:#f2f2f2;
}

/* LOADER TOP */
.loader{
    position:fixed;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:4px;
    color:#777;
    font-family:monospace;
}

/* DOTS ANIMATION */
.dots span{
    animation:blink 1.2s infinite;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}

@keyframes blink{
    0%,100%{opacity:0}
    50%{opacity:1}
}

/* TOPBAR */
.topbar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    align-items:center;
}

button,select,input{
    background:#0b0b0b;
    border:1px solid rgba(255,255,255,0.08);
    color:#fff;
    padding:6px 10px;
    font-size:13px;
}

button:hover{opacity:.7}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
    INITIALIZING ENGINE
    <span class="dots"><span>.</span><span>.</span><span>.</span></span>
</div>

<div class="wrapper">
    <div id="output" class="grid"></div>
</div>

<!-- CONTROLS -->
<div class="topbar">
    <button onclick="generate()">generate</button>
    <input id="count" type="number" value="5" min="1" max="100">
    <select id="country"></select>
    <button onclick="copyAll()">copy</button>
</div>

<script>

/* ========= SAFE DATA ========= */
const DATA=[
{
country:"USA",code:"+1",
cities:["New York","Los Angeles","Chicago","Miami","Dallas"],
streets:["Main St","Oak Ave","Pine Rd","5th Ave","Sunset Blvd"],
zip:()=>String(10000+Math.random()*89999|0),
area:["201","305","312","415","646"]
},
{
country:"UK",code:"+44",
cities:["London","Manchester","Liverpool","Leeds"],
streets:["High St","King Rd","Queen St","Oxford St"],
zip:()=>["SW1A","M1","L1","B1"][Math.random()*4|0],
area:["74","75","77","78"]
},
{
country:"Germany",code:"+49",
cities:["Berlin","Munich","Hamburg","Frankfurt"],
streets:["Hauptstr","Bahnhofstr","Marktweg"],
zip:()=>String(10000+Math.random()*89999|0),
area:["151","160","170"]
},
{
country:"France",code:"+33",
cities:["Paris","Lyon","Marseille"],
streets:["Rue Victor Hugo","Rue Lafayette","Avenue Republique"],
zip:()=>String(10000+Math.random()*89999|0),
area:["6","7","1"]
},
{
country:"Netherlands",code:"+31",
cities:["Amsterdam","Rotterdam","Utrecht"],
streets:["Damrak","Kalverstraat","Leidsestraat"],
zip:()=>String(1000+Math.random()*8999|0),
area:["6","20"]
}
];

const FIRST=["Alex","John","Mike","Emma","Olivia","Liam","Noah","Sophia"];
const LAST=["Smith","Brown","Johnson","Taylor","Wilson","Martin","Lee"];

const output=document.getElementById("output");
const loader=document.getElementById("loader");
const select=document.getElementById("country");

let last=[];

/* INIT */
function init(){
    select.innerHTML=`<option value="all">any country</option>`;
    DATA.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        select.appendChild(o);
    });
}

/* PICK */
const pick=a=>a[Math.random()*a.length|0];

/* USER */
function user(){
    const d = select.value==="all"
        ? pick(DATA)
        : DATA.find(x=>x.country===select.value) || pick(DATA);

    const first=pick(FIRST);
    const last=pick(LAST);

    const username=(first+last+(Math.random()*999|0)).toLowerCase();

    return{
        username,
        name:first+" "+last,
        email:username+"@gmail.com",
        phone:`${d.code} ${pick(d.area)} ${Math.random()*9000000|0+1000000}`,
        country:d.country,
        city:pick(d.cities),
        street:pick(d.streets)+" "+(Math.random()*200|0),
        zip:d.zip()
    };
}

/* TYPE EFFECT */
function type(el,text,cb){
    let i=0;
    function run(){
        if(i<text.length){
            el.textContent+=text[i++];
            setTimeout(run,8);
        } else if(cb) cb();
    }
    run();
}

/* RENDER */
function render(arr){
    output.innerHTML="";

    arr.forEach((u,i)=>{
        const card=document.createElement("div");
        card.className="card";
        output.appendChild(card);

        const lines=[
            ["User",u.username],
            ["Name",u.name],
            ["Email",u.email],
            ["Phone",u.phone],
            ["Country",u.country],
            ["City",u.city],
            ["Street",u.street],
            ["ZIP",u.zip]
        ];

        let idx=0;

        function next(){
            if(idx>=lines.length) return;

            const [label,value]=lines[idx++];

            const row=document.createElement("div");
            row.className="line";

            const l=document.createElement("span");
            l.className="label";
            l.textContent=label+":";

            const v=document.createElement("span");
            v.className="value";

            row.appendChild(l);
            row.appendChild(v);
            card.appendChild(row);

            type(v,value,next);
        }

        setTimeout(next,i*30);
    });
}

/* GENERATE (FAST) */
function generate(){
    loader.style.display="block";

    setTimeout(()=>{
        const n=Math.min(50,parseInt(count.value||5));
        last=Array.from({length:n},user);
        render(last);
        loader.style.display="none";
    },200);
}

/* COPY ALL */
function copyAll(){
    navigator.clipboard.writeText(JSON.stringify(last,null,2));
}

/* START */
init();
window.onload=generate;

</script>
</body>
</html>

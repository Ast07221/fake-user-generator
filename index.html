<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Generator Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, system-ui;
    background: #0a0a0a;
    color: #fff;
    height: 100vh;
    overflow: hidden;
}

/* CENTER */
.wrapper {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
}

/* OUTPUT */
#output {
    font-size: 15px;
    line-height: 1.8;
    font-weight: 300;
    min-height: 220px;
}

.key {
    color: #777;
    font-weight: 500;
}

/* STATUS */
#status {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 12px;
}

/* DOTS */
.dots::after {
    content: "...";
    animation: blink 1.2s infinite;
}
@keyframes blink {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* BOTTOM BAR */
.actions {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    font-size: 12px;
    letter-spacing: 1px;
}

.actions span {
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    background: #111;
    transition: 0.2s;
}

.actions span:hover {
    background: #1c1c1c;
}

/* INPUT */
#bulkInput {
    width: 50px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #fff;
    text-align: center;
}
</style>
</head>

<body>

<div class="wrapper">

    <div id="status"><span class="dots">idle</span></div>

    <div id="output"></div>

</div>

<div class="actions">
    <span onclick="generate()">generate</span>

    <span>
        bulk <input id="bulkInput" type="number" value="5" min="1" max="50">
    </span>

    <span onclick="runBulk()">run</span>
    <span onclick="copy()">copy</span>
    <span onclick="downloadJSON()">json</span>
    <span onclick="downloadCSV()">csv</span>
</div>

<script>

const output = document.getElementById("output");
const statusEl = document.getElementById("status");
const bulkInput = document.getElementById("bulkInput");

let running = false;
let lastData = [];

/* =========================
   DATA (50+ стран)
========================= */

const locations = [
{country:"USA",capital:"Washington",code:"+1",zips:["10001","90001","60601"]},
{country:"UK",capital:"London",code:"+44",zips:["SW1A","M1","L1"]},
{country:"Germany",capital:"Berlin",code:"+49",zips:["10115","80331"]},
{country:"France",capital:"Paris",code:"+33",zips:["75001","69001"]},
{country:"Spain",capital:"Madrid",code:"+34",zips:["28001","08001"]},
{country:"Italy",capital:"Rome",code:"+39",zips:["00100","20100"]},
{country:"Netherlands",capital:"Amsterdam",code:"+31",zips:["1012","3011"]},
{country:"Poland",capital:"Warsaw",code:"+48",zips:["00-001","30-001"]},
{country:"Hungary",capital:"Budapest",code:"+36",zips:["1011","4024"]},
{country:"Czech Republic",capital:"Prague",code:"+420",zips:["11000"]},
{country:"Sweden",capital:"Stockholm",code:"+46",zips:["11120"]},
{country:"Norway",capital:"Oslo",code:"+47",zips:["0001"]},
{country:"Denmark",capital:"Copenhagen",code:"+45",zips:["1000"]},
{country:"Finland",capital:"Helsinki",code:"+358",zips:["00100"]},
{country:"Canada",capital:"Ottawa",code:"+1",zips:["K1A"]},
{country:"Australia",capital:"Canberra",code:"+61",zips:["2600"]},
{country:"Brazil",capital:"Brasilia",code:"+55",zips:["70000"]},
{country:"Japan",capital:"Tokyo",code:"+81",zips:["100-0001"]},
{country:"India",capital:"New Delhi",code:"+91",zips:["110001"]},
{country:"China",capital:"Beijing",code:"+86",zips:["100000"]},
{country:"Mexico",capital:"Mexico City",code:"+52",zips:["01000"]},
{country:"Turkey",capital:"Ankara",code:"+90",zips:["06000"]},
{country:"UAE",capital:"Abu Dhabi",code:"+971",zips:["00000"]},
{country:"South Africa",capital:"Pretoria",code:"+27",zips:["0002"]},
    {country:"Argentina",capital:"Buenos Aires",code:"+54",zips:["C1000"]},
{country:"Indonesia",capital:"Jakarta",code:"+62",zips:["10110"]},
{country:"Thailand",capital:"Bangkok",code:"+66",zips:["10100"]},
{country:"Vietnam",capital:"Hanoi",code:"+84",zips:["100000"]},
{country:"South Korea",capital:"Seoul",code:"+82",zips:["03000"]},
{country:"Saudi Arabia",capital:"Riyadh",code:"+966",zips:["11461"]}
];

/* имена */
const firstNames = ["Liam","Noah","Oliver","James","Lucas","Henry","Emma","Olivia","Ava","Sophia","Mia","Isabella"];
const lastNames = ["Smith","Johnson","Brown","Taylor","Anderson","Thomas","Jackson","White","Harris","Martin"];

/* ========================= */

function pick(arr) {
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateUser() {

    const loc = pick(locations);
    const first = pick(firstNames);
    const last = pick(lastNames);

    const username = (first + last + Math.floor(Math.random()*1000)).toLowerCase();

    return {
        username,
        name: first + " " + last,
        email: username + "@gmail.com",
        phone: loc.code + Math.floor(100000000 + Math.random()*900000000),
        country: loc.country,
        capital: loc.capital,
        address: "Street " + Math.floor(Math.random()*200),
        zip: pick(loc.zips)
    };
}

/* ========================= */

function format(u) {
    return `Username: ${u.username}
Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
Capital: ${u.capital}
Address: ${u.address}
ZIP: ${u.zip}`;
}

/* ========================= */

async function render(text) {
    output.innerHTML = "";

    const lines = text.split("\n");

    for (let line of lines) {

        const parts = line.split(":");

        const row = document.createElement("div");

        if (parts.length > 1) {
            row.innerHTML = `<span class="key">${parts[0]}:</span>${parts.slice(1).join(":")}`;
        } else {
            row.textContent = line;
        }

        output.appendChild(row);

        await new Promise(r => setTimeout(r, 25));
    }
}

/* ========================= */

function setStatus(t) {
    statusEl.innerHTML = `<span class="dots">${t}</span>`;
}

/* ========================= */

async function generate() {
    if (running) return;
    running = true;

    setStatus("processing");

    const u = generateUser();
    lastData = [u];

    await render(format(u));

    setStatus("idle");
    running = false;
}

/* ========================= */

async function runBulk() {
    if (running) return;
    running = true;

    setStatus("processing");

    const count = Math.min(50, Math.max(1, parseInt(bulkInput.value)));

    const arr = [];

    for (let i = 0; i < count; i++) {
        arr.push(generateUser());
    }

    lastData = arr;

    await render(arr.map(format).join("\n\n"));

    setStatus("idle");
    running = false;
}

/* ========================= */

function copy() {
    navigator.clipboard.writeText(output.innerText);
}

function downloadJSON() {
    const blob = new Blob([JSON.stringify(lastData,null,2)]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.json";
    a.click();
}

function downloadCSV() {
    const rows = ["Username,Name,Email,Phone,Country,Capital,Address,ZIP"];

    lastData.forEach(u=>{
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.capital},${u.address},${u.zip}`);
    });

    const blob = new Blob([rows.join("\n")]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();
}

</script>

</body>
</html>

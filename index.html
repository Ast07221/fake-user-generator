<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: #fff;
}

/* CENTER BLOCK */
.wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
}

/* OUTPUT */
#output {
    font-size: 16px;
    line-height: 1.8;
    font-weight: 300;
    letter-spacing: 0.2px;
    white-space: pre-line;
}

/* KEY STYLE */
.key {
    color: #8f8f8f;
    font-weight: 500;
}

/* BOTTOM ACTIONS */
.actions {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
}

/* PREMIUM BUTTONS */
button {
    background: #151515;
    border: 1px solid #222;
    color: #fff;
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 1px;
}

button:hover {
    background: #222;
}

/* INPUT */
#bulkInput {
    width: 50px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #fff;
    text-align: center;
}

/* PREMIUM LOADER */
.loader {
    text-align: center;
    font-size: 18px;
    letter-spacing: 4px;
    opacity: 0.8;
}

.loader::after {
    content: ".";
    animation: dots 1.4s infinite;
}

@keyframes dots {
    0% { content: "."; }
    33% { content: ".."; }
    66% { content: "..."; }
    100% { content: "."; }
}

/* TYPE EFFECT */
.typing {
    border-right: 2px solid #888;
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="output" class="loader">...</div>
</div>

<div class="actions">
    <button onclick="generate()">generate</button>
    <input id="bulkInput" type="number" value="1" min="1" max="50">
    <button onclick="runBulk()">bulk</button>
    <button onclick="copy()">copy</button>
    <button onclick="downloadJSON()">json</button>
    <button onclick="downloadCSV()">csv</button>
</div>

<script>

/* =========================
   DATA ENGINE (логика связана)
========================= */

const countries = [
{country:"USA",code:"+1",cities:["New York","Los Angeles","Chicago"],zips:["10001","90001","60601"]},
{country:"UK",code:"+44",cities:["London","Manchester"],zips:["SW1A","M1"]},
{country:"Germany",code:"+49",cities:["Berlin","Munich"],zips:["10115","80331"]},
{country:"France",code:"+33",cities:["Paris","Lyon"],zips:["75001","69001"]},
{country:"Spain",code:"+34",cities:["Madrid","Barcelona"],zips:["28001","08001"]},
{country:"Italy",code:"+39",cities:["Rome","Milan"],zips:["00100","20100"]},
{country:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"],zips:["1012","3011"]},
{country:"Canada",code:"+1",cities:["Toronto","Vancouver"],zips:["M5H","V5K"]},
{country:"Australia",code:"+61",cities:["Sydney","Melbourne"],zips:["2000","3000"]},
{country:"Japan",code:"+81",cities:["Tokyo","Osaka"],zips:["100-0001","530-0001"]}
];

const firstNames = ["Liam","Noah","Oliver","James","Lucas","Emma","Olivia","Ava","Sophia","Mia"];
const lastNames = ["Smith","Johnson","Brown","Taylor","Anderson","Thomas","Jackson","White","Harris"];

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* =========================
   GENERATOR
========================= */

function generateUser(){
    const loc = pick(countries);
    const first = pick(firstNames);
    const last = pick(lastNames);

    const username = (first + "." + last + Math.floor(Math.random()*999)).toLowerCase();

    return {
        username,
        name: first + " " + last,
        email: username + "@gmail.com",
        phone: loc.code + " " + Math.floor(100000000 + Math.random()*900000000),
        country: loc.country,
        city: pick(loc.cities),
        zip: pick(loc.zips)
    };
}

/* =========================
   TYPE EFFECT
========================= */

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
    }

async function typeText(text){
    const el = document.getElementById("output");
    el.innerHTML = "";
    el.classList.add("typing");

    for(let i=0;i<text.length;i++){
        el.innerHTML += text[i];

        let delay = 10;
        if(text[i] === "\n") delay = 60;
        if(text[i] === ":") delay = 30;

        await sleep(delay);
    }

    el.classList.remove("typing");
}

/* =========================
   FORMAT (структура норм)
========================= */

function format(u){
return `Username: ${u.username}
Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
ZIP: ${u.zip}`;
}

/* =========================
   ACTIONS
========================= */

let lastData = [];

async function generate(){
    const u = generateUser();
    lastData = [u];

    document.getElementById("output").innerHTML = '<div class="loader">...</div>';

    await sleep(400);

    await typeText(format(u));
}

async function runBulk(){
    const count = parseInt(document.getElementById("bulkInput").value || 1);

    document.getElementById("output").innerHTML = '<div class="loader">...</div>';

    await sleep(400);

    const arr = [];

    for(let i=0;i<count;i++){
        arr.push(generateUser());
    }

    lastData = arr;

    const text = arr.map(format).join("\n\n");

    await typeText(text);
}

/* =========================
   EXPORT
========================= */

function copy(){
    navigator.clipboard.writeText(JSON.stringify(lastData,null,2));
}

function downloadJSON(){
    const blob=new Blob([JSON.stringify(lastData,null,2)]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.json";
    a.click();
}

function downloadCSV(){
    const rows=["Username,Name,Email,Phone,Country,City,ZIP"];
    lastData.forEach(u=>{
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`);
    });
    const blob=new Blob([rows.join("\n")]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.csv";
    a.click();
}

</script>
</body>
</html>

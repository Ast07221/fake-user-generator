<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Engine</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CENTER WRAPPER */
.wrapper{
    width:100%;
    max-width:900px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* OUTPUT */
.grid{
    width:100%;
    max-width:700px;
    max-height:650px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* CARD */
.card{
    width:100%;
    padding:14px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

/* ROW */
.line{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:monospace;
    font-size:15px;
    line-height:1.6;
}

.label{ color:#777; }
.value{ color:#f2f2f2; }

.copy{
    font-size:11px;
    color:#777;
    cursor:pointer;
    margin-left:10px;
}
.copy:hover{ color:#fff; }

/* LOADER (FIXED TOP) */
.loader{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:4px;
    color:#777;
    font-family:monospace;
    z-index:999;
}

/* DOTS */
.dots span{
    animation:blink 1.2s infinite;
}
.dots span:nth-child(2){ animation-delay:0.2s; }
.dots span:nth-child(3){ animation-delay:0.4s; }

@keyframes blink{
    0%,20%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}

/* TOPBAR */
.topbar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}

button, select, input{
    background:#0b0b0b;
    border:none;
    color:#fff;
    font-size:14px;
    padding:6px 10px;
}
</style>
</head>

<body>

<!-- LOADER (SAFE + ALWAYS ON TOP) -->
<div class="loader" id="loader">
    INITIALIZING ENGINE <span class="dots"><span>.</span><span>.</span><span>.</span></span>
</div>

<div class="wrapper">
    <div id="output" class="grid"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="more()">more</button>
    <input id="count" type="number" value="1" min="1" max="100">
    <select id="country"></select>
</div>

<script>

"use strict";

/* ================= SAFE DATA ================= */

const ENGINE = [
{country:"USA",code:"+1",cities:["New York","Los Angeles","Chicago","Houston","Miami"],streets:["Main St","Oak Ave","Sunset Blvd"],area:["201","305","312"]},
{country:"UK",code:"+44",cities:["London","Manchester","Liverpool"],streets:["High St","Oxford St"],area:["74","77","78"]},
{country:"Germany",code:"+49",cities:["Berlin","Munich","Hamburg"],streets:["Hauptstr","Bahnhofstr"],area:["151","160"]},
{country:"France",code:"+33",cities:["Paris","Lyon","Nice"],streets:["Rue Victor Hugo","Rue Lafayette"],area:["6","7"]},
{country:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam","Utrecht"],streets:["Damrak","Kalverstraat"],area:["6","20"]},
{country:"Japan",code:"+81",cities:["Tokyo","Osaka","Kyoto"],streets:["Shibuya","Ginza"],area:["70","80"]},
{country:"Italy",code:"+39",cities:["Rome","Milan"],streets:["Via Roma","Corso Italia"],area:["3","6"]},
{country:"Spain",code:"+34",cities:["Madrid","Barcelona"],streets:["Gran Via","Calle Mayor"],area:["6","7"]}
];

const firstNames=["Alex","John","Emma","Noah","Liam","Mia","Olivia","Sophia"];
const lastNames=["Smith","Brown","Johnson","Taylor","Lee","Walker","Martin"];

let output, select, loader;
let last = [];

/* ================= INIT ================= */

function safeInit(){
    output = document.getElementById("output");
    select = document.getElementById("country");
    loader = document.getElementById("loader");

    if(!output || !select || !loader) return;

    select.innerHTML=`<option value="all">any country</option>`;
    ENGINE.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        select.appendChild(o);
    });
}

/* ================= CORE ================= */

function pick(a){
    return a[Math.floor(Math.random()*a.length)];
}

function user(){
    const d = (!select || select.value==="all")
        ? pick(ENGINE)
        : ENGINE.find(x=>x.country===select.value) || pick(ENGINE);

    const first=pick(firstNames);
    const last=pick(lastNames);

    const username=(first+last+(Math.random()*999|0)).toLowerCase();

    return{
        username,
        name:first+" "+last,
        email:username+"@gmail.com",
        phone:`${d.code} ${pick(d.area)} ${Math.floor(1000000+Math.random()*9000000)}`,
        country:d.country,
        city:pick(d.cities),
        street:pick(d.streets)+" "+(Math.floor(Math.random()*200))
    };
}

/* ================= TYPE EFFECT ================= */

function type(el,text,cb){
    let i=0;
    function step(){
        if(i<text.length){
            el.textContent+=text[i++];
            setTimeout(step,14);
        } else if(cb) cb();
    }
    step();
}

/* ================= RENDER ================= */

function render(arr){
    if(!output) return;
    output.innerHTML="";

    arr.forEach((u,i)=>{
        const c=document.createElement("div");
        c.className="card";
        output.appendChild(c);

        const lines=[
            ["User",u.username],
            ["Name",u.name],
            ["Email",u.email],
            ["Phone",u.phone],
            ["Country",u.country],
            ["City",u.city],
            ["Street",u.street]
        ];

        let idx=0;

        function next(){
            if(idx>=lines.length) return;

            const [l,v]=lines[idx++];

            const row=document.createElement("div");
            row.className="line";

            const label=document.createElement("span");
            label.className="label";
            label.textContent=l+": ";

            const value=document.createElement("span");
            value.className="value";

            const copy=document.createElement("span");
            copy.className="copy";
            copy.textContent="copy";
            copy.onclick=()=>navigator.clipboard.writeText(v);

            row.appendChild(label);
            row.appendChild(value);
            row.appendChild(copy);

            c.appendChild(row);

            type(value,v,next);
        }

        setTimeout(next,i*30);
    });
}

/* ================= ACTIONS ================= */

function generate(){
    try{
        if(loader) loader.style.display="block";

        const n=Math.min(100,parseInt((document.getElementById("count")||{}).value||1));

        last=Array.from({length:n},user);

        render(last);

        setTimeout(()=>{
            if(loader) loader.style.display="none";
        },300);

    } catch(e){
        console.error("GEN ERROR:",e);
    }
}

function more(){
    const extra=Array.from({length:3},user);
    last=last.concat(extra);
    render(last);
}

/* ================= BOOT ================= */

window.onload=function(){
    safeInit();
    generate();
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeUserGeneratorPro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Заголовок */
#app-title {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
    pointer-events: none;
    z-index: 10;
}

#app-title.visible {
    opacity: 1;
}

/* Генератор */
#generator {
    background: transparent;
    border: none;
    box-shadow: none;
    text-align: center;
}

/* Кнопка — только текст */
button {
    background: none;
    border: none;
    padding: 0;
    font-size: 18px;
    color: #fff;
    cursor: pointer;
}

button:hover {
    opacity: 0.6;
}

/* Вывод */
#output {
    margin-top: 20px;
    white-space: pre-line;
    min-height: 60px;
}

/* Точки */
#dots {
    margin-top: 20px;
    font-size: 22px;
    opacity: 0;
}

#dots.active {
    opacity: 1;
}

#dots::after {
    content: '...';
    animation: blink 1.2s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
}
</style>
</head>
<body>

<div id="app-title">FakeUserGeneratorPro</div>

<div id="generator">
    <button onclick="generateUser()">Generate User</button>
    <div id="dots"></div>
    <div id="output"></div>
</div>

<script>
const title = document.getElementById("app-title");
const output = document.getElementById("output");
const dots = document.getElementById("dots");

/* Плавное появление заголовка */
setTimeout(() => {
    title.classList.add("visible");
}, 500);

/* Печать текста */
function typeText(element, text, speed = 25) {
    element.innerHTML = "";
    let i = 0;

    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }

    typing();
}

/* Генерация */
function generateUser() {
    dots.classList.add("active");
    output.innerHTML = "";

    setTimeout(() => {
        dots.classList.remove("active");

        const users = [
            "Name: John Doe\nEmail: john@example.com",
            "Name: Alice Smith\nEmail: alice@example.com",
            "Name: Mark Johnson\nEmail: mark@example.com"
        ];

        const randomUser = users[Math.floor(Math.random() * users.length)];

        typeText(output, randomUser);
    }, 1500);
}
</script>

</body>
</html>

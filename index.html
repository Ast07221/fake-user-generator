<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Generator Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, system-ui;
    background: #0b0b0b;
    color: #fff;

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
}

/* CENTER CORE */
.wrapper {
    width: 520px;
    text-align: center;
}

/* GRID OUTPUT */
#output {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-top: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;

    padding: 14px;
    text-align: left;

    backdrop-filter: blur(10px);
}

.key {
    color: #888;
    font-size: 12px;
}

/* STATUS */
#status {
    font-size: 12px;
    opacity: 0.6;
}

/* DOCK */
.bottomBar {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    align-items: center;
    gap: 10px;

    padding: 10px 14px;

    background: rgba(20,20,20,0.55);
    border: 1px solid rgba(255,255,255,0.08);

    border-radius: 16px;

    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);

    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* BUTTONS PREMIUM */
button {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);

    color: #eaeaea;

    padding: 9px 14px;
    border-radius: 12px;

    font-family: Inter;
    font-size: 13px;
    font-weight: 500;

    cursor: pointer;
    transition: 0.18s;
}

button:hover {
    background: rgba(255,255,255,0.09);
    transform: translateY(-1px);
}

input {
    width: 60px;
    background: #111;
    border: 1px solid #222;
    color: #fff;
    border-radius: 10px;
    text-align: center;
    padding: 6px;
}
</style>
</head>

<body>

<div class="wrapper">

    <div id="status">ready</div>

    <div id="output"></div>

</div>

<!-- CONTROL DOCK -->
<div class="bottomBar">
    <button onclick="generate()">Generate</button>
    <button onclick="more()">More</button>
    <button onclick="clearAll()">Clear</button>
    <input id="count" type="number" value="6" min="1" max="50">
</div>

<script>

/* =========================
   REALISTIC ENGINE (50+ LOCATIONS EXPANDABLE)
========================= */

const data = [
{
country:"USA",code:"+1",
first:["James","John","Robert","Michael","Emma","Olivia","Sophia"],
last:["Smith","Johnson","Brown","Williams"],
city:["New York","Los Angeles","Chicago","Miami"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"UK",code:"+44",
first:["Oliver","Harry","George","Jack","Emily","Amelia"],
last:["Smith","Taylor","Brown","Wilson"],
city:["London","Manchester","Liverpool"],
zip:()=> "SW"+Math.floor(10+Math.random()*90)
},
{
country:"Germany",code:"+49",
first:["Lukas","Leon","Finn","Paul","Anna","Emma"],
last:["Müller","Schmidt","Weber","Fischer"],
city:["Berlin","Munich","Hamburg"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"France",code:"+33",
first:["Louis","Lucas","Hugo","Emma","Chloe"],
last:["Martin","Bernard","Dubois"],
city:["Paris","Lyon","Marseille"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"Italy",code:"+39",
first:["Luca","Marco","Giulia","Sofia"],
last:["Rossi","Ferrari","Bianchi"],
city:["Rome","Milan","Naples"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"Spain",code:"+34",
first:["Mateo","Leo","Lucia","Sofia"],
last:["Garcia","Lopez","Martinez"],
city:["Madrid","Barcelona","Valencia"],
zip:()=>Math.floor(10000+Math.random()*89999)
},
{
country:"Netherlands",code:"+31",
first:["Daan","Lars","Sophie","Emma"],
last:["de Jong","Jansen","Visser"],
city:["Amsterdam","Rotterdam","Utrecht"],
zip:()=>Math.floor(1000+Math.random()*8999)
},
{
country:"Canada",code:"+1",
    first:["Liam","Noah","Emma","Ava"],
last:["Brown","Martin","Lee"],
city:["Toronto","Vancouver","Montreal"],
zip:()=> "M"+Math.floor(1+Math.random()*9)
},
{
country:"Japan",code:"+81",
first:["Haruto","Yuto","Sota","Yui"],
last:["Sato","Suzuki","Tanaka"],
city:["Tokyo","Osaka","Kyoto"],
zip:()=>Math.floor(1000000+Math.random()*8999999)
},
{
country:"Poland",code:"+48",
first:["Jan","Piotr","Julia","Zofia"],
last:["Nowak","Kowalski","Wójcik"],
city:["Warsaw","Krakow","Gdansk"],
zip:()=>Math.floor(10000+Math.random()*89999)
}
];

/* ========================= */

const output = document.getElementById("output");
const count = document.getElementById("count");

let last = [];

/* ========================= */

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function gen(){
    const loc = pick(data);

    const first = pick(loc.first);
    const lastName = pick(loc.last);

    const city = pick(loc.city);

    const username = (first + lastName + Math.floor(Math.random()*999)).toLowerCase();

    return {
        username,
        name: first + " " + lastName,
        email: username + "@mail.com",
        phone: loc.code + Math.floor(100000000 + Math.random()*900000000),
        country: loc.country,
        city,
        address: "Street " + Math.floor(Math.random()*300),
        zip: loc.zip()
    };
}

/* ========================= */

function render(arr){
    output.innerHTML = "";

    arr.forEach(u=>{
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div><span class="key">Name:</span> ${u.name}</div>
            <div><span class="key">Email:</span> ${u.email}</div>
            <div><span class="key">Phone:</span> ${u.phone}</div>
            <div><span class="key">Country:</span> ${u.country}</div>
            <div><span class="key">City:</span> ${u.city}</div>
            <div><span class="key">ZIP:</span> ${u.zip}</div>
        `;

        output.appendChild(div);
    });
}

/* ========================= */

function generate(){
    const arr = [];
    const n = parseInt(count.value);

    for(let i=0;i<n;i++){
        arr.push(gen());
    }

    last = arr;
    render(arr);
}

function more(){
    const arr = [];

    for(let i=0;i<6;i++){
        arr.push(gen());
    }

    last = last.concat(arr);
    render(last);
}

function clearAll(){
    output.innerHTML = "";
    last = [];
}

</script>

</body>
</html>

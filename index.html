<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family: ui-monospace, monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CENTER STABLE */
.wrapper{
    width:100%;
    max-width:520px;
}

/* OUTPUT */
.grid{
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* CARD */
.card{
    position:relative;
    padding:10px 12px;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:8px;
    background:rgba(255,255,255,0.02);
}

/* LINES */
.line{
    font-size:14px;
    display:flex;
    gap:6px;
    line-height:1.3;
}

.label{ color:#8a8a8a; min-width:70px; }
.value{ color:#fff; }

/* COPY */
.copy{
    position:absolute;
    right:8px;
    top:8px;
    font-size:11px;
    color:#777;
    cursor:pointer;
}
.copy:hover{ color:#fff; }

/* TOPBAR */
.topbar{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    align-items:center;
}

/* BUTTON TEXT STYLE */
button{
    background:none;
    border:none;
    color:#aaa;
    cursor:pointer;
}
button:hover{ color:#fff; }

input{
    width:30px;
    background:none;
    border:none;
    color:#fff;
    text-align:center;
}

select{
    background:#000;
    color:#fff;
    border:none;
}

/* LOADER */
.loader{
    position:fixed;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    color:#777;
    display:none;
}
</style>
</head>

<body>

<div class="loader" id="loader">INITIALIZING...</div>

<div class="wrapper">
    <div class="grid" id="out"></div>
</div>

<div class="topbar">
    <button onclick="gen()">generate</button>
    <input id="count" value="1" type="number" min="1" max="50">
    <select id="country"></select>
</div>

<script>

const DATA = [
{c:"USA",code:"+1",cities:["NY","LA","Chicago"],area:["201","305","312"]},
{c:"UK",code:"+44",cities:["London","Manchester"],area:["74","75"]},
{c:"Germany",code:"+49",cities:["Berlin","Munich"],area:["151","160"]},
{c:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"],area:["6","20"]},
{c:"Japan",code:"+81",cities:["Tokyo","Osaka"],area:["70","80"]}
];

const first=["Alex","John","Emma","Noah","Liam"];
const last=["Smith","Brown","Lee","Taylor"];

const out = document.getElementById("out");
const loader = document.getElementById("loader");
const sel = document.getElementById("country");

let cache = [];

/* SAFE INIT */
function init(){
    try{
        sel.innerHTML = `<option value="all">any country</option>`;
        DATA.forEach(d=>{
            const o=document.createElement("option");
            o.value=d.c;
            o.textContent=d.c;
            sel.appendChild(o);
        });
    }catch(e){
        console.log("init error",e);
    }
}

/* SAFE PICK */
function pick(a){
    return a[Math.floor(Math.random()*a.length)];
}

/* USER SAFE */
function user(){
    const d = (sel && sel.value!=="all")
        ? DATA.find(x=>x.c===sel.value)
        : pick(DATA);

    const fn = pick(first);
    const ln = pick(last);

    const u = (fn+ln+(Math.random()*999|0)).toLowerCase();

    return {
        username:u,
        name:fn+" "+ln,
        email:u+"@mail.com",
        phone:`${d.code} ${pick(d.area)} ${Math.floor(Math.random()*9000000+1000000)}`,
        country:d.c,
        city:pick(d.cities)
    };
}

/* RENDER SAFE */
function render(list){
    out.innerHTML="";

    list.forEach((u,i)=>{
        const card=document.createElement("div");
        card.className="card";

        const cp=document.createElement("div");
        cp.className="copy";
        cp.textContent="copy";
        cp.onclick=()=>{
            navigator.clipboard.writeText(JSON.stringify(u,null,2));
        };

        card.appendChild(cp);
        out.appendChild(card);
        setTimeout(()=>{
            card.innerHTML += `
                <div class="line"><span class="label">User:</span><span class="value">${u.username}</span></div>
                <div class="line"><span class="label">Name:</span><span class="value">${u.name}</span></div>
                <div class="line"><span class="label">Email:</span><span class="value">${u.email}</span></div>
                <div class="line"><span class="label">Phone:</span><span class="value">${u.phone}</span></div>
                <div class="line"><span class="label">Country:</span><span class="value">${u.country}</span></div>
                <div class="line"><span class="label">City:</span><span class="value">${u.city}</span></div>
            `;
        }, i*20);
    });
}

/* GENERATE SAFE */
function gen(){
    try{
        loader.style.display="block";

        setTimeout(()=>{
            const n = Math.max(1, Math.min(50, parseInt(selCount()||1)));
            cache = Array.from({length:n}, user);
            render(cache);
            loader.style.display="none";
        },120);

    }catch(e){
        console.log("gen error",e);
        loader.style.display="none";
    }
}

/* SAFE INPUT */
function selCount(){
    const el=document.getElementById("count");
    return el ? el.value : 1;
}

/* START */
init();
window.onload = gen;

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Engine v3</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* WRAPPER */
.wrapper{
    width:100%;
    max-width:900px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.grid{
    width:100%;
    max-width:720px;
    max-height:650px;
    overflow-y:auto;
}

/* CARD */
.card{
    padding:14px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

/* TEXT */
.line{
    font-size:15px;
    line-height:1.6;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.label{
    color:#777;
    letter-spacing:0.5px;
    margin-right:6px;
}

.value{
    color:#f2f2f2;
}

/* TOPBAR */
.topbar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button, select, input{
    background:#0b0b0b;
    border:none;
    color:#fff;
    font-size:14px;
    padding:6px 10px;
}

/* LOADER */
.loader{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:3px;
    color:#777;
    font-family: ui-monospace, monospace;
    display:flex;
    align-items:center;
    gap:6px;
}

/* DOTS */
.dots span{
    animation:blink 1.2s infinite;
}

.dots span:nth-child(2){ animation-delay:0.2s; }
.dots span:nth-child(3){ animation-delay:0.4s; }

@keyframes blink{
    0%,20%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}

</style>
</head>

<body>

<div class="loader" id="loader">
    INITIALIZING ENGINE
    <span class="dots">
        <span>.</span><span>.</span><span>.</span>
    </span>
</div>

<div class="wrapper">
    <div class="grid" id="output"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="more()">more</button>
    <button onclick="clearAll()">clear</button>
    <input id="count" type="number" value="10" min="1" max="500">
    <select id="country"></select>
</div>

<script>

/* ================= DATA ================= */

const ENGINE = [
{country:"USA", code:"+1", cities:["New York","Los Angeles","Chicago"], streets:["Main St","Oak Ave"], zip:()=>String(10000+Math.random()*89999|0), area:["201","305","312"]},
{country:"UK", code:"+44", cities:["London","Manchester"], streets:["High St","Queen St"], zip:()=>["SW1A","M1","L1"][Math.random()*3|0], area:["74","75"]},
{country:"Germany", code:"+49", cities:["Berlin","Munich"], streets:["Hauptstr","Bahnhofstr"], zip:()=>String(10000+Math.random()*89999|0), area:["151","160"]},
{country:"France", code:"+33", cities:["Paris","Lyon"], streets:["Rue Victor Hugo","Rue de Paris"], zip:()=>String(10000+Math.random()*89999|0), area:["6","7"]},
{country:"Netherlands", code:"+31", cities:["Amsterdam","Rotterdam"], streets:["Damrak","Herengracht"], zip:()=>String(1000+Math.random()*8999|0), area:["6"]},
];

const firstNames=["Alex","John","Emma","Olivia","Liam","Noah","Mia","Ava"];
const lastNames=["Smith","Brown","Johnson","Taylor","Wilson","Clark","Walker"];

const output=document.getElementById("output");
const select=document.getElementById("country");
const loader=document.getElementById("loader");

let last=[];

/* INIT */
function init(){
    select.innerHTML=`<option value="all">any country</option>`;
    ENGINE.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        select.appendChild(o);
    });
}

/* PICK */
function pick(a){ return a[Math.floor(Math.random()*a.length)] }

/* USER */
function user(){
    const d = (select.value==="all")
        ? pick(ENGINE)
        : ENGINE.find(x=>x.country===select.value) || pick(ENGINE);

    const first=pick(firstNames);
    const last=pick(lastNames);
    const username=(first+last+Math.random()*999|0).toLowerCase();

    return {
        username,
        email: username+"@"+pick(["gmail.com","outlook.com","proton.me"]),
        phone: `${d.code} ${pick(d.area)} ${Math.random()*9000000+1000000|0}`,
        country: d.country,
        city: pick(d.cities),
        street: pick(d.streets)+" "+(Math.random()*200|0),
        zip: d.zip()
    };
}

/* TYPE EFFECT */
function typeLine(el, label, value, cb){
    const line=document.createElement("div");
    line.className="line";

    const l=document.createElement("span");
    l.className="label";
    const v=document.createElement("span");
    v.className="value";

    line.appendChild(l);
    line.appendChild(v);
    el.appendChild(line);

    let i=0;
    function type(){
        if(i<label.length){
            l.textContent+=label[i++];
            setTimeout(type,10);
        } else {
            let j=0;
            function typeVal(){
                if(j<value.length){
                    v.textContent+=value[j++];
                    setTimeout(typeVal,10);
                } else {
                    cb && cb();
                }
            }
            typeVal();
        }
    }
    type();
}

/* RENDER */
function render(arr){
    output.innerHTML="";

    arr.forEach((u,i)=>{
        const card=document.createElement("div");
        card.className="card";
        output.appendChild(card);

        setTimeout(()=>{
            const fields=[
                ["Username: ",u.username],
                ["Email: ",u.email],
                ["Phone: ",u.phone],
                ["Country: ",u.country],
                ["City: ",u.city],
                ["Street: ",u.street],
                ["ZIP: ",u.zip]
            ];

            let k=0;
            function next(){
                if(k<fields.length){
                    typeLine(card,fields[k][0],fields[k][1],()=>{
                        k++;
                        next();
                    });
                }
            }
            next();
        },i*60);
    });
}

/* GENERATE */
function generate(){
    loader.style.display="flex";

    setTimeout(()=>{
        const n=Math.min(500,document.getElementById("count").value||10);
        last=Array.from({length:n},user);
        loader.style.display="none";
        render(last);
    },900);
}

function more(){
    const extra=Array.from({length:10},user);
    last=last.concat(extra);
    render(last);
}

function clearAll(){
    output.innerHTML="";
    last=[];
}

/* START */
init();
window.onload=generate;

</script>

</body>
</html>

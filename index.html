<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeUserGenerator SaaS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter, system-ui;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
}
.wrapper {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
}
#output {
    min-height: 220px;
    font-size: 15px;
    line-height: 1.75;
    font-weight: 300;
}
.key {
    color: #8f8f8f;
    font-weight: 500;
}
#status {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 10px;
}
.actions {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    font-size: 12px;
}
.actions span {
    cursor: pointer;
}
#bulkInput {
    width: 55px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #fff;
    text-align: center;
}
.dots::after {
    content: "...";
    animation: blink 1.2s infinite;
}
@keyframes blink {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="status"><span class="dots">idle</span></div>
    <div id="output"></div>
</div>

<div class="actions">
    <span onclick="generate()">generate</span>
    <span>
        bulk
        <input id="bulkInput" type="number" value="5" min="1" max="100">
    </span>
    <span onclick="runBulk()">run</span>
    <span onclick="copy()">copy</span>
</div>

<script>

const API_BASE = "https://fake-user-generator-l0m7.onrender.com/api";
const API_KEY = "PASTE_YOUR_RENDER_API_KEY_HERE";

const output = document.getElementById("output");
const statusEl = document.getElementById("status");
const bulkInput = document.getElementById("bulkInput");

let running = false;
let lastData = [];

function setStatus(t) {
    statusEl.innerHTML = `<span class="dots">${t}</span>`;
}

/* =========================
   API CALL (FIXED)
========================= */

async function createUser() {
    try {
        const res = await fetch(API_BASE + "/generate?type=user", {
            headers: {
                "x-api-key": API_KEY
            }
        });

        if (!res.ok) throw new Error("API error");

        return await res.json();

    } catch (e) {
        console.log("API fallback");

        return {
            username: "offline_user",
            name: "Offline User",
            email: "offline@mail.com",
            phone: "+0000000000",
            country: "Offline",
            city: "Offline",
            address: "N/A",
            zip: "00000"
        };
    }
}

/* =========================
   FORMAT
========================= */

function format(u) {
    return `Username: ${u.username}
Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
Address: ${u.address}
ZIP: ${u.zip}`;
}

/* =========================
   RENDER
========================= */

async function render(text) {
    output.innerHTML = "";

    const lines = text.split("\n");

    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const parts = line.split(":");

        const row = document.createElement("div");

        if (parts.length > 1) {
            const key = document.createElement("span");
            key.className = "key";
            key.textContent = parts[0] + ": ";

            const value = document.createElement("span");
            value.textContent = parts.slice(1).join(":");

            row.appendChild(key);
            row.appendChild(value);
        } else {
            row.textContent = line;
        }

        output.appendChild(row);
        await new Promise(r => setTimeout(r, 30));
    }
}

/* =========================
   SINGLE
========================= */

async function generate() {
    if (running) return;
    running = true;

    setStatus("processing");

    const u = await createUser();
    lastData = [u];

    await render(format(u));

    setStatus("idle");
    running = false;
}

/* =========================
   BULK
========================= */

async function runBulk() {
    if (running) return;
    running = true;

    setStatus("processing");

    const count = Math.min(100, Math.max(1, parseInt(bulkInput.value || 5)));

    const arr = [];

    output.innerHTML = "";

    for (let i = 0; i < count; i++) {
        const u = await createUser();
        arr.push(u);

        const block = document.createElement("div");
        block.style.marginBottom = "10px";
        block.innerHTML = `
            <div><span class="key">Name:</span> ${u.name}</div>
            <div><span class="key">Country:</span> ${u.country}</div>
            <div><span class="key">City:</span> ${u.city}</div>
        `;

        output.appendChild(block);

        await new Promise(r => setTimeout(r, 20));
    }

    lastData = arr;

    setStatus("idle");
    running = false;
}

/* =========================
   COPY
========================= */

function copy() {
    navigator.clipboard.writeText(JSON.stringify(lastData, null, 2));
}

</script>

</body>
</html>

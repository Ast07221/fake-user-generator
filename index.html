<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator Pro</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: #fff;
}

.wrapper {
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
}

.topbar {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
}

button {
    background: #222;
    color: #fff;
    border: none;
    padding: 8px 14px;
    cursor: pointer;
}
button:hover { background:#333; }

select, input {
    background:#111;
    color:#fff;
    border:none;
    padding:6px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:15px;
}

.card {
    background:#151515;
    padding:15px;
    border-radius:10px;
    position:relative;
}

.key { color:#888; font-size:12px; }

.copyBtn {
    position:absolute;
    top:10px;
    right:10px;
    font-size:11px;
    cursor:pointer;
    color:#888;
}

/* typing cursor */
.typing {
    border-right:2px solid #888;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
    <div>
        <button onclick="generate()">Generate</button>
        <button onclick="generateMore()">More</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <div>
        <select id="countryFilter"></select>
        <input id="bulkInput" type="number" value="5">
    </div>

    <div>
        <button onclick="copyAll()">Copy All</button>
        <button onclick="downloadJSON()">JSON</button>
        <button onclick="downloadCSV()">CSV</button>
    </div>
</div>

<div id="output" class="grid"></div>

</div>

<script>

/* =========================
   DATA
========================= */

const countries = [
{country:"USA",code:"+1",cities:["New York","Los Angeles","Chicago"],zips:["10001","90001","60601"]},
{country:"UK",code:"+44",cities:["London","Manchester"],zips:["SW1A","M1"]},
{country:"Germany",code:"+49",cities:["Berlin","Munich"],zips:["10115","80331"]},
{country:"France",code:"+33",cities:["Paris","Lyon"],zips:["75001","69001"]},
{country:"Spain",code:"+34",cities:["Madrid","Barcelona"],zips:["28001","08001"]},
{country:"Italy",code:"+39",cities:["Rome","Milan"],zips:["00100","20100"]},
{country:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"],zips:["1012","3011"]},
{country:"Canada",code:"+1",cities:["Toronto","Vancouver"],zips:["M5H","V5K"]},
{country:"Australia",code:"+61",cities:["Sydney","Melbourne"],zips:["2000","3000"]},
{country:"Japan",code:"+81",cities:["Tokyo","Osaka"],zips:["100-0001","530-0001"]}
];

const firstNames = ["Liam","Noah","Oliver","James","Lucas","Emma","Olivia","Ava","Sophia","Mia","Ethan","Isabella"];
const lastNames = ["Smith","Johnson","Brown","Taylor","Anderson","Thomas","Jackson","White","Harris","Martin"];

const output = document.getElementById("output");
const bulkInput = document.getElementById("bulkInput");
const filter = document.getElementById("countryFilter");

let lastData = [];

/* ========================= */

function initFilter(){
    filter.innerHTML = `<option value="all">All</option>`;
    countries.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        filter.appendChild(o);
    });
}
initFilter();

/* ========================= */

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateUser(){

    let pool = countries;
    if(filter.value !== "all"){
        pool = countries.filter(c=>c.country === filter.value);
    }

    const loc = pick(pool);
    const first = pick(firstNames);
    const last = pick(lastNames);

    const username = (first+last+Math.floor(Math.random()*999)).toLowerCase();

    return {
        username,
        name: first+" "+last,
        email: username+"@gmail.com",
        phone: loc.code + Math.floor(100000000 + Math.random()*900000000),
        country: loc.country,
        city: pick(loc.cities),
        address: "Street "+Math.floor(Math.random()*200),
        zip: pick(loc.zips)
    };
}

/* =========================
   🔥  FIXED TYPING EFFECT
========================= */

async function typeText(el, text){
    el.innerHTML = "";
    el.classList.add("typing");

    // small delay before start (feels like server thinking)
    await new Promise(r => setTimeout(r, 180));

    for(let i=0;i<text.length;i++){
        el.innerHTML += text[i];

        let delay = 6;

        if(text[i] === "\n") delay = 60;
        if(text[i] === ":") delay = 35;
        if(text[i] === " ") delay = 10;

        await new Promise(r => setTimeout(r, delay));
    }

    await new Promise(r => setTimeout(r, 120));

    el.classList.remove("typing");
}

/* ========================= */

async function render(data, append=false){

    if(!append) output.innerHTML = "";

    for(const u of data){

        const card = document.createElement("div");
        card.className="card";

        const content = document.createElement("div");

        card.innerHTML = `<div class="copyBtn" onclick='copyOne(${JSON.stringify(u)})'>copy</div>`;
        card.appendChild(content);
        output.appendChild(card);

        const text =
`Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
ZIP: ${u.zip}`;

        await typeText(content, text);
    }
}

/* ========================= */

function generate(){
    const arr=[];
    const count=parseInt(bulkInput.value);

    for(let i=0;i<count;i++){
        arr.push(generateUser());
    }

    lastData = arr;
    render(arr);
}

function generateMore(){
    const arr=[];
    for(let i=0;i<3;i++){
        arr.push(generateUser());
    }

    lastData = lastData.concat(arr);
    render(arr,true);
}

function clearAll(){
    output.innerHTML="";
    lastData=[];
}

/* ========================= */

function copyOne(u){
    navigator.clipboard.writeText(JSON.stringify(u,null,2));
}

function copyAll(){
    navigator.clipboard.writeText(JSON.stringify(lastData,null,2));
}

function downloadJSON(){
    const blob=new Blob([JSON.stringify(lastData,null,2)]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.json";
    a.click();
}

function downloadCSV(){
    const rows=["Username,Name,Email,Phone,Country,City,Address,ZIP"];
    lastData.forEach(u=>{
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.address},${u.zip}`);
    });
    const blob=new Blob([rows.join("\n")]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.csv";
    a.click();
}

</script>

</body>
</html>

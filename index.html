<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeUserGeneratorPro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Inter", system-ui, sans-serif;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
}

.wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
}

/* output */
#output {
    white-space: pre-line;
    min-height: 200px;
    font-size: 15px;
    line-height: 1.75;
    font-weight: 300;
}

/* 🔥  выделение меток */
.label {
    color: #888;
    font-weight: 500;
}

/* loader */
#loader {
    height: 20px;
    margin-bottom: 10px;
}

#loader.hidden {
    opacity: 0;
}

.dot {
    display: inline-block;
    animation: blink 1.8s infinite;
    font-size: 20px;
}

.dot:nth-child(2) { animation-delay: 0.25s; }
.dot:nth-child(3) { animation-delay: 0.5s; }

@keyframes blink {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* actions — 🔽  СПУСТИЛ НИЖЕ */
.actions {
    display: flex;
    justify-content: space-between;
    margin-top: 45px; /* ↑ было меньше */
    gap: 18px;
}

.actions span {
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 1.2px;
    text-transform: lowercase;
}

/* bulk input */
#bulkInput {
    width: 60px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #fff;
    outline: none;
    text-align: center;
    margin-left: 6px;
}
</style>
</head>

<body>

<div class="wrapper">

    <div id="loader">
        <span class="dot">.</span>
        <span class="dot">.</span>
        <span class="dot">.</span>
    </div>

    <div id="output"></div>

    <div class="actions">
        <span onclick="generate()">generate</span>

        <span>
            bulk
            <input id="bulkInput" type="number" min="1" max="50" value="5">
        </span>

        <span onclick="bulk()">run</span>
        <span onclick="copy()">copy</span>
        <span onclick="downloadJSON()">json</span>
        <span onclick="downloadCSV()">csv</span>
    </div>

</div>

<script>
const output = document.getElementById("output");
const loader = document.getElementById("loader");
const bulkInput = document.getElementById("bulkInput");

let lastData = [];
let renderToken = 0;
let isRunning = false;

/* data */
const names = ["John Smith","Emma Brown","Liam Johnson","Olivia Davis","Noah Wilson","Ava Martinez"];
const cities = ["New York","Berlin","Paris","Toronto","London","Rome","Madrid","Warsaw","Amsterdam","Stockholm"];
const countries = ["USA","Germany","France","Canada","UK","Italy","Spain","Poland","Netherlands","Sweden"];

/* user */
function createUser() {
    const name = names[Math.floor(Math.random()*names.length)];
    const country = countries[Math.floor(Math.random()*countries.length)];
    const city = cities[Math.floor(Math.random()*cities.length)];

    const username = name.toLowerCase().replace(" ","") + Math.floor(Math.random()*99);

    return {
        username,
        name,
        email: username + "@mail.com",
        phone: "+" + Math.floor(1000000000 + Math.random()*9000000000),
        country,
        city,
        address: "Street " + Math.floor(1 + Math.random()*200),
        zip: Math.floor(10000 + Math.random()*90000)
    };
}

/* format — 🔥  выделяем label */
function format(u) {
    return `<span class="label">Username:</span> ${u.username}
<span class="label">Name:</span> ${u.name}
<span class="label">Email:</span> ${u.email}
<span class="label">Phone:</span> ${u.phone}
<span class="label">Country:</span> ${u.country}
<span class="label">City:</span> ${u.city}
<span class="label">Address:</span> ${u.address}
<span class="label">ZIP:</span> ${u.zip}`;
}

/* print safe */
function print(text) {
    const myToken = ++renderToken;
    output.classList.remove("cursor");
    output.innerHTML = "";

    let i = 0;
    output.classList.add("cursor");

    function type() {
        if (myToken !== renderToken) return;

        if (i < text.length) {
            output.innerHTML += text[i++];
            setTimeout(type, 5);
        } else {
            output.classList.remove("cursor");
        }
    }

    type();
}

/* generate */
function generate() {
    if (isRunning) return;
    isRunning = true;

    loader.classList.add("hidden");

    setTimeout(() => {
        const u = createUser();
        lastData = [u];

        print(format(u));

        loader.classList.remove("hidden");
        isRunning = false;
    }, 500);
}

/* bulk */
function bulk() {
    if (isRunning) return;
    isRunning = true;

    loader.classList.add("hidden");

    const count = Math.min(50, Math.max(1, parseInt(bulkInput.value || 5)));

    setTimeout(() => {
        const arr = [];

        for (let i = 0; i < count; i++) {
            arr.push(createUser());
        }

        lastData = arr;

        print(arr.map(format).join("\n\n"));

        loader.classList.remove("hidden");
        isRunning = false;
    }, 500);
}

/* copy */
function copy() {
    navigator.clipboard.writeText(output.innerText);
}

/* json */
function downloadJSON() {
    const blob = new Blob([JSON.stringify(lastData,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.json";
    a.click();
}

/* csv */
function downloadCSV() {
    const rows = ["Username,Name,Email,Phone,Country,City,Address,ZIP"];
    lastData.forEach(u =>
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.address},${u.zip}`)
    );

    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();
}
</script>

</body>
</html>

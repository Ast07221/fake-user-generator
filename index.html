<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator Pro</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: #fff;
}

.wrapper {
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
}

.topbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
}

button {
    background: #222;
    color: #fff;
    border: none;
    padding: 8px 14px;
    cursor: pointer;
}
button:hover { background: #333; }

select, input {
    background: #111;
    color: #fff;
    border: none;
    padding: 6px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
    gap: 15px;
}

.card {
    background: #151515;
    padding: 15px;
    border-radius: 10px;
    position: relative;
}

.copyBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 11px;
    cursor: pointer;
    color: #888;
}

.key {
    color: #888;
    font-size: 12px;
}

/* skeleton */
.skeleton {
    background: #1a1a1a;
    height: 120px;
    border-radius: 10px;
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% {opacity:0.5}
    50% {opacity:1}
    100% {opacity:0.5}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
    <div>
        <button onclick="generate()">Generate</button>
        <button onclick="generateMore()">More</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <div>
        <select id="countryFilter"></select>
        <input id="bulkInput" type="number" value="6" min="1" max="50">
    </div>

    <div>
        <button onclick="copyAll()">Copy All</button>
        <button onclick="downloadJSON()">JSON</button>
        <button onclick="downloadCSV()">CSV</button>
    </div>
</div>

<div id="output" class="grid"></div>

</div>

<script>

/* =========================
   DATA
========================= */

const countries = [
{country:"USA",code:"+1",cities:["New York","LA","Chicago"],zips:["10001","90001","60601"]},
{country:"UK",code:"+44",cities:["London","Manchester"],zips:["SW1A","M1"]},
{country:"Germany",code:"+49",cities:["Berlin","Munich"],zips:["10115","80331"]},
{country:"France",code:"+33",cities:["Paris","Lyon"],zips:["75001","69001"]},
{country:"Spain",code:"+34",cities:["Madrid","Barcelona"],zips:["28001","08001"]},
{country:"Italy",code:"+39",cities:["Rome","Milan"],zips:["00100","20100"]},
{country:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"],zips:["1012","3011"]},
{country:"Poland",code:"+48",cities:["Warsaw","Krakow"],zips:["00-001","30-001"]},
{country:"Hungary",code:"+36",cities:["Budapest","Debrecen"],zips:["1011","4024"]},
{country:"Canada",code:"+1",cities:["Toronto","Vancouver"],zips:["M5H","V5K"]}
];

const firstNames = ["Liam","Noah","Oliver","James","Lucas","Emma","Olivia","Ava","Sophia","Mia"];
const lastNames = ["Smith","Johnson","Brown","Taylor","Anderson","Thomas","Jackson","White"];

/* ========================= */

const output = document.getElementById("output");
const bulkInput = document.getElementById("bulkInput");
const filter = document.getElementById("countryFilter");

let lastData = [];

/* ========================= */

function initFilter(){
    filter.innerHTML = `<option value="all">All Countries</option>`;
    countries.forEach(c=>{
        const opt = document.createElement("option");
        opt.value = c.country;
        opt.textContent = c.country;
        filter.appendChild(opt);
    });
}
initFilter();

/* ========================= */

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateUser(){

    let pool = countries;

    if(filter.value !== "all"){
        pool = countries.filter(c=>c.country === filter.value);
    }

    const loc = pick(pool);

    const first = pick(firstNames);
    const last = pick(lastNames);

    const city = pick(loc.cities);
    const zip = pick(loc.zips);

    const username = (first + last + Math.floor(Math.random()*1000)).toLowerCase();

    return {
        username,
        name: first + " " + last,
        email: username + "@gmail.com",
        phone: loc.code + Math.floor(100000000 + Math.random()*900000000),
        country: loc.country,
        city,
        address: "Street " + Math.floor(Math.random()*200),
        zip
    };
}

/* =========================
   UI
========================= */

function skeleton(){
    output.innerHTML = "";
    for(let i=0;i<6;i++){
        const s = document.createElement("div");
        s.className = "skeleton";
        output.appendChild(s);
    }
}

function render(data, append=false){

    if(!append) output.innerHTML = "";

    data.forEach(u=>{

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="copyBtn" onclick='copyOne(${JSON.stringify(u)})'>copy</div>
            <div><span class="key">Name:</span> ${u.name}</div>
            <div><span class="key">Email:</span> ${u.email}</div>
            <div><span class="key">Phone:</span> ${u.phone}</div>
            <div><span class="key">Country:</span> ${u.country}</div>
            <div><span class="key">City:</span> ${u.city}</div>
            <div><span class="key">ZIP:</span> ${u.zip}</div>
        `;

        output.appendChild(card);
    });
}

/* ========================= */

function generate(){
    skeleton();

    setTimeout(()=>{
        const arr = [];
        const count = parseInt(bulkInput.value);

        for(let i=0;i<count;i++){
            arr.push(generateUser());
        }

        lastData = arr;
        render(arr);
    }, 300);
}

function generateMore(){
    const arr = [];

    for(let i=0;i<5;i++){
        arr.push(generateUser());
    }

    lastData = lastData.concat(arr);
    render(arr, true);
}

function clearAll(){
    output.innerHTML = "";
    lastData = [];
}

/* ========================= */

function copyOne(u){
    navigator.clipboard.writeText(JSON.stringify(u,null,2));
}

function copyAll(){
    navigator.clipboard.writeText(JSON.stringify(lastData,null,2));
}

function downloadJSON(){
    const blob = new Blob([JSON.stringify(lastData,null,2)]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.json";
    a.click();
}

function downloadCSV(){
    const rows = ["Username,Name,Email,Phone,Country,City,Address,ZIP"];
    lastData.forEach(u=>{
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.address},${u.zip}`);
    });
    const blob = new Blob([rows.join("\n")]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();
}

</script>

</body>
</html>

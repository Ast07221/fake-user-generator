<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator PRO</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
    overflow: hidden;
}

/* центр */
.wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    max-width: 900px;
    padding: 20px;
}

/* сетка */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:14px;
    text-align:left;
}

/* карточки */
.card {
    background: transparent; /* 🔥 убрали фон */
    padding:12px 0;
    border-radius:0;
    position:relative;
}

/* текст */
.card div {
    font-size: 14px;
    line-height: 1.7;
}

/* copy */
.copyBtn {
    position:absolute;
    top:0;
    right:0;
    font-size:11px;
    opacity:0.5;
    cursor:pointer;
}

/* панель */
.topbar {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
}

/* 🔥 кнопки как текст */
button {
    background: none;
    border: none;
    color: #aaa;
    padding: 0;
    cursor:pointer;
    font-size:13px;
}

button:hover {
    color:#fff;
}

/* 🔥 инпут */
select, input {
    background: none;
    border: none;
    color:#fff;
    border-bottom:1px solid #333;
    padding:4px;
}

/* 🔥 короткое поле */
input {
    width: 35px;
    text-align:center;
}

/* loader */
.loader {
    text-align:left;
    font-size:14px;
    opacity:0.5;
}
.loader::after {
    content:".";
    animation:dots 1.4s infinite;
}
@keyframes dots {
    0%{content:".";}
    33%{content:"..";}
    66%{content:"...";}
    100%{content:".";}
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="output" class="loader">...</div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="generateMore()">more</button>
    <button onclick="clearAll()">clear</button>
    <select id="countryFilter"></select>
    <input id="bulkInput" type="number" value="1" min="1" max="99">
    <button onclick="copyAll()">copy</button>
    <button onclick="downloadJSON()">json</button>
    <button onclick="downloadCSV()">csv</button>
</div>

<script>

/* DATA */
const DATA = {
  US:{name:"United States",code:"+1",cities:["New York","Los Angeles","Chicago"]},
  GB:{name:"United Kingdom",code:"+44",cities:["London","Manchester"]},
  DE:{name:"Germany",code:"+49",cities:["Berlin","Munich"]},
  FR:{name:"France",code:"+33",cities:["Paris","Lyon"]},
  ES:{name:"Spain",code:"+34",cities:["Madrid","Barcelona"]},
  NL:{name:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"]}
};

/* names */
const firstNames=["Liam","Noah","Oliver","Emma","Ava","Sophia"];
const lastNames=["Smith","Johnson","Brown","Taylor","Wilson"];

const output=document.getElementById("output");
const filter=document.getElementById("countryFilter");
const bulkInput=document.getElementById("bulkInput");

let lastData=[];

/* init */
function init(){
  filter.innerHTML=`<option value="all">all</option>`;
  Object.keys(DATA).forEach(k=>{
    const o=document.createElement("option");
    o.value=k;
    o.textContent=DATA[k].name;
    filter.appendChild(o);
  });
}
init();

/* utils */
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function zip(){return String(10000+Math.floor(Math.random()*89999));}

/* generator */
function generateUser(){
  const keys=Object.keys(DATA);
  const k=filter.value==="all"?pick(keys):filter.value;
  const c=DATA[k];

  const f=pick(firstNames);
  const l=pick(lastNames);
  const username=(f+"."+l+Math.floor(Math.random()*999)).toLowerCase();

  return {
    username,
    name:`${f} ${l}`,
    email:`${username}@gmail.com`,
    phone:`${c.code} ${Math.floor(100000000+Math.random()*900000000)}`,
    country:c.name,
    city:pick(c.cities),
    zip:zip()
  };
}
    /* render */
function render(list,append=false){
  if(!append) output.innerHTML="";

  list.forEach(u=>{
    const card=document.createElement("div");
    card.className="card";

    const btn=document.createElement("div");
    btn.className="copyBtn";
    btn.innerText="copy";
    btn.onclick=()=>navigator.clipboard.writeText(JSON.stringify(u,null,2));

    const div=document.createElement("div");
    div.innerHTML=
`Username: ${u.username}<br>
Name: ${u.name}<br>
Email: ${u.email}<br>
Phone: ${u.phone}<br>
Country: ${u.country}<br>
City: ${u.city}<br>
ZIP: ${u.zip}`;

    card.appendChild(btn);
    card.appendChild(div);
    output.appendChild(card);
  });
}

/* actions */
function generate(){
  const n=parseInt(bulkInput.value||1);
  const arr=[];
  for(let i=0;i<n;i++) arr.push(generateUser());
  lastData=arr;
  render(arr,false);
}

function generateMore(){
  const arr=[];
  for(let i=0;i<3;i++) arr.push(generateUser());
  lastData=lastData.concat(arr);
  render(arr,true);
}

function clearAll(){
  output.innerHTML="...";
  lastData=[];
}

/* export */
function copyAll(){
  navigator.clipboard.writeText(JSON.stringify(lastData,null,2));
}

function downloadJSON(){
  const blob=new Blob([JSON.stringify(lastData,null,2)]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="users.json";
  a.click();
}

function downloadCSV(){
  const rows=["Username,Name,Email,Phone,Country,City,ZIP"];
  lastData.forEach(u=>{
    rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`);
  });
  const blob=new Blob([rows.join("\n")]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="users.csv";
  a.click();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator PRO</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
    overflow: hidden;
}

.wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    max-width: 900px;
    padding: 20px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:14px;
}

.card {
    background:#151515;
    padding:16px;
    border-radius:14px;
    position:relative;
}

/* TEXT */
.card div {
    font-size: 14px;
    line-height: 1.7;
}

/* COPY */
.copyBtn {
    position:absolute;
    top:10px;
    right:10px;
    font-size:11px;
    opacity:0.6;
    cursor:pointer;
}

/* TOPBAR */
.topbar {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    background: rgba(15,15,15,0.75);
    backdrop-filter: blur(10px);
    padding: 12px 18px;
    border-radius: 16px;
}

button {
    background:#1a1a1a;
    border:1px solid #2a2a2a;
    color:#fff;
    padding:10px 16px;
    cursor:pointer;
    border-radius:12px;
}

select, input {
    background:#111;
    color:#fff;
    border:1px solid #222;
    padding:8px;
    border-radius:8px;
}

.loader {
    text-align:center;
    font-size:14px;
    opacity:0.6;
}
.loader::after {
    content:"...";
    animation: dots 1.4s infinite;
}
@keyframes dots {
    0%{content:".";}
    33%{content:"..";}
    66%{content:"...";}
    100%{content:".";}
}
</style>
</head>

<body>

<div class="wrapper">
    <div id="output" class="loader">...</div>
</div>

<div class="topbar">
    <button onclick="generate()">Generate</button>
    <button onclick="generateMore()">More</button>
    <button onclick="clearAll()">Clear</button>
    <select id="countryFilter"></select>
    <input id="bulkInput" type="number" value="5">
    <button onclick="copyAll()">Copy</button>
    <button onclick="downloadJSON()">JSON</button>
    <button onclick="downloadCSV()">CSV</button>
</div>

<script>

/* =========================
   PRO ENGINE (SCALABLE 100+ COUNTRIES)
========================= */

const DATA = {
  US:{name:"United States",code:"+1",cities:["New York","Los Angeles","Chicago","Houston","Miami"]},
  GB:{name:"United Kingdom",code:"+44",cities:["London","Manchester","Birmingham"]},
  DE:{name:"Germany",code:"+49",cities:["Berlin","Munich","Hamburg"]},
  FR:{name:"France",code:"+33",cities:["Paris","Lyon","Marseille"]},
  ES:{name:"Spain",code:"+34",cities:["Madrid","Barcelona","Valencia"]},
  IT:{name:"Italy",code:"+39",cities:["Rome","Milan","Naples"]},
  NL:{name:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam","Utrecht"]},
  PL:{name:"Poland",code:"+48",cities:["Warsaw","Krakow","Gdansk"]},
  UA:{name:"Ukraine",code:"+380",cities:["Kyiv","Lviv","Odesa"]},
  TR:{name:"Turkey",code:"+90",cities:["Istanbul","Ankara","Izmir"]},
  JP:{name:"Japan",code:"+81",cities:["Tokyo","Osaka","Kyoto"]},
  CN:{name:"China",code:"+86",cities:["Beijing","Shanghai","Shenzhen"]},
  KR:{name:"South Korea",code:"+82",cities:["Seoul","Busan","Incheon"]},
  IN:{name:"India",code:"+91",cities:["Mumbai","Delhi","Bangalore"]},
  BR:{name:"Brazil",code:"+55",cities:["São Paulo","Rio","Brasília"]},
  CA:{name:"Canada",code:"+1",cities:["Toronto","Vancouver","Montreal"]},
  AU:{name:"Australia",code:"+61",cities:["Sydney","Melbourne","Brisbane"]}
};

/* names */
const firstNames=["Liam","Noah","Oliver","Emma","Ava","Sophia","James","Mia"];
const lastNames=["Smith","Johnson","Brown","Taylor","Wilson","Martin","Lee"];

const output=document.getElementById("output");
const filter=document.getElementById("countryFilter");
const bulkInput=document.getElementById("bulkInput");

let lastData=[];

/* init */
    function init(){
  filter.innerHTML=`<option value="all">All</option>`;
  Object.keys(DATA).forEach(k=>{
    const o=document.createElement("option");
    o.value=k;
    o.textContent=DATA[k].name;
    filter.appendChild(o);
  });
}
init();

/* utils */
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function zip(){return String(10000+Math.floor(Math.random()*89999));}

/* generator */
function generateUser(){
  const keys=Object.keys(DATA);
  const k=filter.value==="all"?pick(keys):filter.value;
  const c=DATA[k];

  const f=pick(firstNames);
  const l=pick(lastNames);
  const username=(f+"."+l+Math.floor(Math.random()*999)).toLowerCase();

  return {
    username,
    name:`${f} ${l}`,
    email:`${username}@gmail.com`,
    phone:`${c.code} ${Math.floor(100000000+Math.random()*900000000)}`,
    country:c.name,
    city:pick(c.cities),
    zip:zip()
  };
}

/* render */
function render(list,append=false){
  if(!append) output.innerHTML="";

  list.forEach(u=>{
    const card=document.createElement("div");
    card.className="card";

    const btn=document.createElement("div");
    btn.className="copyBtn";
    btn.innerText="copy";
    btn.onclick=()=>navigator.clipboard.writeText(JSON.stringify(u,null,2));

    const div=document.createElement("div");
    div.innerHTML=
`Username: ${u.username}<br>
Name: ${u.name}<br>
Email: ${u.email}<br>
Phone: ${u.phone}<br>
Country: ${u.country}<br>
City: ${u.city}<br>
ZIP: ${u.zip}`;

    card.appendChild(btn);
    card.appendChild(div);
    output.appendChild(card);
  });
}

/* actions */
function generate(){
  const n=parseInt(bulkInput.value||5);
  const arr=[];
  for(let i=0;i<n;i++) arr.push(generateUser());
  lastData=arr;
  render(arr,false);
}

function generateMore(){
  const arr=[];
  for(let i=0;i<3;i++) arr.push(generateUser());
  lastData=lastData.concat(arr);
  render(arr,true);
}

function clearAll(){
  output.innerHTML="...";
  lastData=[];
}

/* export */
function copyAll(){
  navigator.clipboard.writeText(JSON.stringify(lastData,null,2));
}

function downloadJSON(){
  const blob=new Blob([JSON.stringify(lastData,null,2)]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="users.json";
  a.click();
}

function downloadCSV(){
  const rows=["Username,Name,Email,Phone,Country,City,ZIP"];
  lastData.forEach(u=>{
    rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`);
  });
  const blob=new Blob([rows.join("\n")]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="users.csv";
  a.click();
}

</script>

</body>
</html>

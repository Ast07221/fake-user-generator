<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator v6 Premium</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: #fff;
}

.wrapper {
    max-width: 1100px;
    margin: 40px auto;
    padding: 20px;
}

.topbar {
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    gap:10px;
    margin-bottom:20px;
}

button {
    background:#1f1f1f;
    border:0;
    color:#fff;
    padding:8px 14px;
    cursor:pointer;
}
button:hover { background:#333; }

select, input {
    background:#111;
    color:#fff;
    border:0;
    padding:6px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:12px;
}

.card {
    background:#151515;
    padding:14px;
    border-radius:10px;
    position:relative;
    min-height:120px;
}

.copyBtn {
    position:absolute;
    top:10px;
    right:10px;
    font-size:11px;
    opacity:0.6;
    cursor:pointer;
}

/* BIG PREMIUM TEXT */
#output {
    font-size: 20px;
    line-height: 1.9;
    font-weight: 300;
    letter-spacing: 0.2px;
}

/* typing cursor */
.typing {
    border-right:2px solid #888;
    white-space:pre-wrap;
}

/* PREMIUM LOADER */
.premium-dots {
    font-size: 16px;
    letter-spacing: 2px;
    opacity: 0.8;
}

.premium-dots::after {
    content: ".";
    animation: dots 1.2s infinite;
}

@keyframes dots {
    0%   { content: "."; }
    33%  { content: ".."; }
    66%  { content: "..."; }
    100% { content: "."; }
}

</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
    <div>
        <button onclick="generate()">Generate</button>
        <button onclick="generateMore()">More</button>
        <button onclick="clearAll()">Clear</button>
    </div>

    <div>
        <select id="countryFilter"></select>
        <input id="bulkInput" type="number" value="5">
    </div>

    <div>
        <button onclick="copyAll()">Copy</button>
        <button onclick="downloadJSON()">JSON</button>
        <button onclick="downloadCSV()">CSV</button>
    </div>
</div>

<div id="output" class="grid"></div>

</div>

<script>

/* =========================
   DATA ENGINE
========================= */

const countries = [
{country:"USA",code:"+1",cities:["New York","Los Angeles","Chicago","Houston"],zips:["10001","90001","60601","77001"]},
{country:"UK",code:"+44",cities:["London","Manchester","Birmingham"],zips:["SW1A","M1","B1"]},
{country:"Germany",code:"+49",cities:["Berlin","Munich","Hamburg"],zips:["10115","80331","20095"]},
{country:"France",code:"+33",cities:["Paris","Lyon","Marseille"],zips:["75001","69001","13001"]},
{country:"Spain",code:"+34",cities:["Madrid","Barcelona","Valencia"],zips:["28001","08001","46001"]},
{country:"Italy",code:"+39",cities:["Rome","Milan","Naples"],zips:["00100","20100","80100"]},
{country:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam","Utrecht"],zips:["1012","3011","3511"]},
{country:"Canada",code:"+1",cities:["Toronto","Vancouver","Montreal"],zips:["M5H","V5K","H2X"]},
{country:"Australia",code:"+61",cities:["Sydney","Melbourne","Brisbane"],zips:["2000","3000","4000"]},
{country:"Japan",code:"+81",cities:["Tokyo","Osaka","Kyoto"],zips:["100-0001","530-0001","600-0001"]}
];

const firstNames = ["Liam","Noah","Oliver","James","Lucas","Emma","Olivia","Ava","Sophia","Mia","Ethan","Isabella","William","Henry"];
const lastNames = ["Smith","Johnson","Brown","Taylor","Anderson","Thomas","Jackson","White","Harris","Martin","Garcia","Wilson"];

const output = document.getElementById("output");
const filter = document.getElementById("countryFilter");
const bulkInput = document.getElementById("bulkInput");

let lastData = [];

/* INIT FILTER */
function init(){
    filter.innerHTML = `<option value="all">All</option>`;
    countries.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        filter.appendChild(o);
    });
}
init();

/* ========================= */

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* REAL ENGINE */
function generateUser(){

    let pool = countries;
    if(filter.value !== "all"){
        pool = countries.filter(c=>c.country===filter.value);
    }

    const loc = pick(pool);
    const first = pick(firstNames);
    const last = pick(lastNames);

    const username = (first + "." + last + Math.floor(Math.random()*999)).toLowerCase();

    return {
        username,
        name: first + " " + last,
        email: username + "@gmail.com",
        phone: loc.code + " " + Math.floor(100000000 + Math.random()*900000000),
        country: loc.country,
        city: pick(loc.cities),
        address: "Street " + Math.floor(Math.random()*500),
        zip: pick(loc.zips)
    };
}

/* =========================
   UTIL
========================= */

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

/* =========================
   🔥  REAL TYPE EFFECT FIXED
========================= */

async function typeText(el, text){

    el.innerHTML = "";
    el.classList.add("typing");

    await sleep(160);

    for(let i=0;i<text.length;i++){

        el.innerHTML += text[i];

        let delay = 10;

        if(text[i] === "\n") delay = 70;
        if(text[i] === ":") delay = 35;
        if(text[i] === " ") delay = 12;

        delay += Math.random()*3;

        await sleep(delay);
    }

    await sleep(160);

    el.classList.remove("typing");
}

/* ========================= */

async function render(list, append=false){

    if(!append) output.innerHTML = "";

    for(const u of list){

        const card = document.createElement("div");
        card.className = "card";

        const btn = document.createElement("div");
        btn.className = "copyBtn";
        btn.innerText = "copy";
        btn.onclick = () => navigator.clipboard.writeText(JSON.stringify(u,null,2));

        const content = document.createElement("div");

        card.appendChild(btn);
        card.appendChild(content);
        output.appendChild(card);

        const text =
`Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
ZIP: ${u.zip}`;

        await typeText(content, text);
    }
}

/* ========================= */

function generate(){

    const count = parseInt(bulkInput.value || 5);

    output.innerHTML = `<div class="premium-dots">Generating users</div>`;

    setTimeout(() => {

        const arr = [];
        for(let i=0;i<count;i++){
            arr.push(generateUser());
        }

        lastData = arr;
        render(arr,false);

    }, 350);
}

function generateMore(){
    const arr=[];
    for(let i=0;i<3;i++){
        arr.push(generateUser());
    }
    lastData = lastData.concat(arr);
    render(arr,true);
}

function clearAll(){
    output.innerHTML="";
    lastData=[];
}

/* EXPORT */

function copyAll(){
    navigator.clipboard.writeText(JSON.stringify(lastData,null,2));
}

function downloadJSON(){
    const blob=new Blob([JSON.stringify(lastData,null,2)]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.json";
    a.click();
}

function downloadCSV(){
    const rows=["Username,Name,Email,Phone,Country,City,Address,ZIP"];

    lastData.forEach(u=>{
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.address},${u.zip}`);
    });

    const blob=new Blob([rows.join("\n")]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.csv";
    a.click();
}

</script>

</body>
</html>

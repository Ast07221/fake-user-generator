<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Engine</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* OUTER CENTER (IMPORTANT) */
.wrapper{
    width:100%;
    max-width:900px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* INNER BLOCK CENTERED */
.grid{
    width:100%;
    max-width:720px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* CARD */
.card{
    width:100%;
    padding:14px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

/* LEFT ALIGNED CONTENT */
.line{
    display:flex;
    justify-content:flex-start;
    align-items:center;
    font-family:monospace;
    font-size:15px;
    line-height:1.7;
    gap:10px;
}

/* LABEL */
.label{
    color:#777;
    min-width:90px;
}

/* VALUE */
.value{
    color:#f2f2f2;
    flex:1;
}

/* COPY RIGHT SIDE */
.copy{
    margin-left:auto;
    font-size:11px;
    color:#777;
    cursor:pointer;
}
.copy:hover{ color:#fff; }

/* LOADER TOP */
.loader{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:4px;
    color:#777;
    font-family:monospace;
}

/* DOTS */
.dots span{
    animation:blink 1.2s infinite;
}
.dots span:nth-child(2){ animation-delay:0.2s; }
.dots span:nth-child(3){ animation-delay:0.4s; }

@keyframes blink{
    0%,20%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}

/* TOPBAR */
.topbar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}

button, select, input{
    background:#0b0b0b;
    border:none;
    color:#fff;
    font-size:14px;
    padding:6px 10px;
}
</style>
</head>

<body>

<div class="loader" id="loader">
    INITIALIZING ENGINE <span class="dots"><span>.</span><span>.</span><span>.</span></span>
</div>

<div class="wrapper">
    <div id="output" class="grid"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <input id="count" type="number" value="1" min="1" max="100">
    <select id="country"></select>
</div>

<script>

const ENGINE=[
{country:"USA",code:"+1",cities:["NY","LA","Chicago"],streets:["Main St","Oak Ave"],area:["201","305"]},
{country:"UK",code:"+44",cities:["London","Manchester"],streets:["High St","Oxford St"],area:["74","77"]},
{country:"Germany",code:"+49",cities:["Berlin","Munich"],streets:["Hauptstr","Bahnhofstr"],area:["151","160"]},
{country:"France",code:"+33",cities:["Paris","Lyon"],streets:["Rue Hugo","Rue Paris"],area:["6","7"]},
{country:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"],streets:["Damrak","Kalverstraat"],area:["6","20"]}
];

const firstNames=["Alex","John","Emma","Noah","Liam","Olivia","Mia"];
const lastNames=["Smith","Brown","Johnson","Taylor","Lee","Walker"];

let output, select, loader;
let last=[];

function init(){
    output=document.getElementById("output");
    select=document.getElementById("country");
    loader=document.getElementById("loader");

    select.innerHTML=`<option value="all">any country</option>`;
    ENGINE.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        select.appendChild(o);
    });
}

function pick(a){
    return a[Math.floor(Math.random()*a.length)];
}

function user(){
    const d=select.value==="all"
        ? pick(ENGINE)
        : ENGINE.find(x=>x.country===select.value)||pick(ENGINE);

    const first=pick(firstNames);
    const last=pick(lastNames);

    const username=(first+last+(Math.random()*999|0)).toLowerCase();

    return{
        username,
        name:first+" "+last,
        email:username+"@gmail.com",
        phone:`${d.code} ${pick(d.area)} ${Math.random()*9000000|0+1000000}`,
        country:d.country,
        city:pick(d.cities),
        street:pick(d.streets)
    };
}

/* TYPE */
function type(el,text,cb){
    let i=0;
    function t(){
        if(i<text.length){
            el.textContent+=text[i++];
            setTimeout(t,12);
        } else if(cb) cb();
    }
    t();
}

/* RENDER */
function render(arr){
    output.innerHTML="";

    arr.forEach((u,i)=>{
        const c=document.createElement("div");
        c.className="card";
        output.appendChild(c);

        const rows=[
            ["User",u.username],
            ["Name",u.name],
            ["Email",u.email],
            ["Phone",u.phone],
            ["Country",u.country],
            ["City",u.city],
            ["Street",u.street]
        ];

        let idx=0;

        function next(){
            if(idx>=rows.length) return;

            const [l,v]=rows[idx++];

            const row=document.createElement("div");
            row.className="line";

            const label=document.createElement("span");
            label.className="label";
            label.textContent=l+":";

            const value=document.createElement("span");
            value.className="value";

            const copy=document.createElement("span");
            copy.className="copy";
            copy.textContent="copy";
            copy.onclick=()=>navigator.clipboard.writeText(v);

            row.appendChild(label);
            row.appendChild(value);
            row.appendChild(copy);

            c.appendChild(row);

            type(value,v,next);
        }

        setTimeout(next,i*25);
    });
}

function generate(){
    const n=parseInt(document.getElementById("count").value||1);
    last=Array.from({length:n},user);
    render(last);
}

init();
window.onload=generate;

</script>

</body>
</html>

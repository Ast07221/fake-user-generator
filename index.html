<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator</title>

<style>
body{
    margin:0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CENTER CONTAINER */
.wrapper{
    width:100%;
    max-width:620px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* OUTPUT */
.grid{
    width:100%;
    max-height:60vh;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
    align-items:center;
}

/* CARD */
.card{
    width:100%;
    padding:10px 14px;
    border:1px solid rgba(255,255,255,0.06);
    border-radius:8px;
    background:rgba(255,255,255,0.02);
    position:relative;
}

/* LINES */
.line{
    font-size:14px;
    line-height:1.35;
    display:flex;
    gap:8px;
}

.label{
    color:#8a8a8a;
    min-width:80px;
}

.value{
    color:#f2f2f2;
}

/* COPY BUTTON */
.copyBtn{
    position:absolute;
    right:10px;
    top:10px;
    font-size:11px;
    color:#888;
    cursor:pointer;
}
.copyBtn:hover{ color:#fff; }

/* TOPBAR */
.topbar{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:14px;
    align-items:center;
    font-size:13px;
}

/* TEXT BUTTON STYLE (NO BOX) */
.btn{
    background:none;
    border:none;
    color:#bbb;
    cursor:pointer;
    font-size:13px;
}
.btn:hover{ color:#fff; }

/* INPUT */
input{
    width:34px;
    background:none;
    border:none;
    color:#fff;
    text-align:center;
    outline:none;
}

/* SELECT */
select{
    background:#000;
    color:#fff;
    border:none;
    outline:none;
    padding:2px 6px;
}

/* LOADER */
.loader{
    position:fixed;
    top:18px;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    color:#777;
    letter-spacing:3px;
    display:none;
}
.dots span{
    animation:blink 1s infinite;
}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
    0%,100%{opacity:0;}
    50%{opacity:1;}
}
</style>
</head>

<body>

<div class="loader" id="loader">
    INITIALIZING ENGINE
    <span class="dots"><span>.</span><span>.</span><span>.</span></span>
</div>

<div class="wrapper">
    <div class="grid" id="output"></div>
</div>

<div class="topbar">
    <button class="btn" onclick="generate()">generate</button>
    <button class="btn" onclick="copyAll()">copy</button>
    <input id="count" type="number" value="1" min="1" max="50">
    <select id="country"></select>
</div>

<script>

/* ================= BIG REALISTIC DATA ================= */

const DATA = [
{
country:"USA", code:"+1",
cities:["New York","Los Angeles","Chicago","Houston","Miami","Seattle","Boston"],
area:["201","305","312","415","646","718"],
zip:()=>String(10000 + Math.random()*89999 | 0)
},
{
country:"UK", code:"+44",
cities:["London","Manchester","Liverpool","Birmingham"],
area:["74","75","77","78"],
zip:()=>["SW1A","EC1","W1","M1"][Math.random()*4|0]
},
{
country:"Germany", code:"+49",
cities:["Berlin","Munich","Hamburg","Frankfurt"],
area:["151","160","170"],
zip:()=>String(10000 + Math.random()*89999 | 0)
},
{
country:"Netherlands", code:"+31",
cities:["Amsterdam","Rotterdam","Utrecht"],
area:["6","20"],
zip:()=>String(1000 + Math.random()*8999 | 0)
},
{
country:"Japan", code:"+81",
cities:["Tokyo","Osaka","Kyoto"],
area:["70","80","90"],
zip:()=>String(1000000 + Math.random()*8999999 | 0)
},
{
country:"France", code:"+33",
cities:["Paris","Lyon","Marseille"],
area:["6","7","1"],
zip:()=>String(10000 + Math.random()*89999 | 0)
},
{
country:"Canada", code:"+1",
cities:["Toronto","Vancouver","Montreal"],
area:["416","437","604"],
zip:()=>String(10000 + Math.random()*89999 | 0)
},
{
    country:"India", code:"+91",
cities:["Delhi","Mumbai","Bangalore"],
area:["7","8","9"],
zip:()=>String(100000 + Math.random()*899999 | 0)
}
];

const firstNames=["Alex","John","Michael","David","James","Emma","Olivia","Sophia","Liam","Noah","Mia","Ava"];
const lastNames=["Smith","Brown","Johnson","Taylor","Wilson","Martin","Lee","Clark"];

const output=document.getElementById("output");
const loader=document.getElementById("loader");
const select=document.getElementById("country");

let last=[];

/* INIT */
function init(){
    select.innerHTML=`<option value="all">any country</option>`;
    DATA.forEach(d=>{
        const o=document.createElement("option");
        o.value=d.country;
        o.textContent=d.country;
        select.appendChild(o);
    });
}

/* PICK */
function pick(a){
    return a[Math.floor(Math.random()*a.length)];
}

/* USER */
function user(){
    const d = select.value==="all"
        ? pick(DATA)
        : DATA.find(x=>x.country===select.value) || pick(DATA);

    const first = pick(firstNames);
    const last = pick(lastNames);
    const username = (first+last+(Math.random()*999|0)).toLowerCase();

    return {
        username,
        name:first+" "+last,
        email:username+"@"+pick(["gmail.com","outlook.com","proton.me"]),
        phone:`${d.code} ${pick(d.area)} ${Math.random()*9000000|0 + 1000000}`,
        country:d.country,
        city:pick(d.cities),
        zip:d.zip()
    };
}

/* TYPE EFFECT (FIXED CENTER SAFE) */
function typeLine(container,label,value,cb){
    const row=document.createElement("div");
    row.className="line";

    const l=document.createElement("span");
    l.className="label";
    l.textContent=label;

    const v=document.createElement("span");
    v.className="value";

    row.appendChild(l);
    row.appendChild(v);
    container.appendChild(row);

    let i=0;
    function t(){
        if(i<value.length){
            v.textContent+=value[i++];
            setTimeout(t,8);
        } else cb && cb();
    }
    t();
}

/* RENDER */
function render(arr){
    output.innerHTML="";

    arr.forEach((u,i)=>{
        const c=document.createElement("div");
        c.className="card";

        const copy=document.createElement("div");
        copy.className="copyBtn";
        copy.textContent="copy";
        copy.onclick=()=>navigator.clipboard.writeText(JSON.stringify(u,null,2));

        c.appendChild(copy);
        output.appendChild(c);

        setTimeout(()=>{
            const fields=[
                ["User:",u.username],
                ["Name:",u.name],
                ["Email:",u.email],
                ["Phone:",u.phone],
                ["Country:",u.country],
                ["City:",u.city],
                ["ZIP:",u.zip]
            ];

            let idx=0;
            function next(){
                if(idx>=fields.length) return;
                typeLine(c,fields[idx][0],fields[idx][1],()=>{
                    idx++;
                    next();
                });
            }
            next();

        }, i*40);
    });
}

/* LOADER */
function showLoader(){
    loader.style.display="block";
}
function hideLoader(){
    loader.style.display="none";
}

/* GENERATE */
function generate(){
    showLoader();

    setTimeout(()=>{
        const n=Math.min(50,parseInt(document.getElementById("count").value||1));
        last=Array.from({length:n},user);
        render(last);
        hideLoader();
    },200);
}

/* COPY ALL */
function copyAll(){
    navigator.clipboard.writeText(JSON.stringify(last,null,2));
}

/* START */
init();
window.onload=generate;

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FakeUserGeneratorPro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "Inter", system-ui, sans-serif;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
}

.wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
}

/* OUTPUT */
#output {
    min-height: 200px;
    font-size: 15px;
    line-height: 1.75;
    font-weight: 300;
}

/* KEY STYLE */
.key {
    color: #9a9a9a;
    font-weight: 500;
}

/* LOADER */
#loader {
    height: 20px;
    margin-bottom: 10px;
}

.dot {
    display: inline-block;
    animation: blink 1.8s infinite;
    font-size: 20px;
}

.dot:nth-child(2) { animation-delay: 0.25s; }
.dot:nth-child(3) { animation-delay: 0.5s; }

@keyframes blink {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* BUTTONS */
.actions {
    display: flex;
    justify-content: space-between;
    margin-top: 45px;
    gap: 18px;
    flex-wrap: wrap;
}

.actions span {
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 1.2px;
    text-transform: lowercase;
}

/* INPUT */
#bulkInput {
    width: 60px;
    background: transparent;
    border: none;
    border-bottom: 1px solid #333;
    color: #fff;
    outline: none;
    text-align: center;
    margin-left: 6px;
}
</style>
</head>

<body>

<div class="wrapper">

    <div id="loader">
        <span class="dot">.</span>
        <span class="dot">.</span>
        <span class="dot">.</span>
    </div>

    <div id="output"></div>

    <div class="actions">
        <span onclick="generate()">generate</span>

        <span>
            bulk
            <input id="bulkInput" type="number" min="1" max="50" value="5">
        </span>

        <span onclick="bulk()">run</span>
        <span onclick="copy()">copy</span>
        <span onclick="downloadJSON()">json</span>
        <span onclick="downloadCSV()">csv</span>
    </div>

</div>

<script>

const output = document.getElementById("output");
const loader = document.getElementById("loader");
const bulkInput = document.getElementById("bulkInput");

let lastData = [];
let isRunning = false;
let renderToken = 0;

/* REALISTIC DATA */
const data = {
    USA: ["New York", "Los Angeles", "Chicago", "Miami"],
    Germany: ["Berlin", "Munich", "Hamburg", "Frankfurt"],
    France: ["Paris", "Lyon", "Marseille", "Nice"],
    Canada: ["Toronto", "Vancouver", "Montreal", "Ottawa"],
    UK: ["London", "Manchester", "Liverpool", "Birmingham"],
    Italy: ["Rome", "Milan", "Naples", "Florence"],
    Spain: ["Madrid", "Barcelona", "Valencia", "Seville"],
    Poland: ["Warsaw", "Krakow", "Gdansk", "Wroclaw"],
    Netherlands: ["Amsterdam", "Rotterdam", "Utrecht", "Hague"],
    Sweden: ["Stockholm", "Gothenburg", "Malmö", "Uppsala"]
};

const names = ["John Smith","Emma Brown","Liam Johnson","Olivia Davis","Noah Wilson","Ava Martinez"];

/* USER */
function createUser() {
    const countryList = Object.keys(data);
    const country = countryList[Math.floor(Math.random() * countryList.length)];
    const city = data[country][Math.floor(Math.random() * data[country].length)];

    const name = names[Math.floor(Math.random()*names.length)];
    const username = name.toLowerCase().replace(" ","") + Math.floor(Math.random()*99);

    return {
        username,
        name,
        email: username + "@mail.com",
        phone: "+" + Math.floor(1000000000 + Math.random()*9000000000),
        country,
        city,
        address: "Street " + Math.floor(1 + Math.random()*200),
        zip: Math.floor(10000 + Math.random()*90000)
    };
}

/* FORMAT */
function format(u) {
    return `Username: ${u.username}
Name: ${u.name}
Email: ${u.email}
Phone: ${u.phone}
Country: ${u.country}
City: ${u.city}
Address: ${u.address}
ZIP: ${u.zip}`;
}

/* PRINT (speed = 52) */
function print(text) {
    const myToken = ++renderToken;

    output.innerHTML = "";

    const lines = text.split("\n");
    let i = 0;

    function renderLine() {
        if (myToken !== renderToken) return;

        if (i >= lines.length) return;

        const line = lines[i++];
        const parts = line.split(":");

        const row = document.createElement("div");

        if (parts.length > 1) {
            const key = document.createElement("span");
            key.className = "key";
            key.textContent = parts[0] + ": ";

            const value = document.createElement("span");
            value.textContent = parts.slice(1).join(":");

            row.appendChild(key);
            row.appendChild(value);
        } else {
            row.textContent = line;
        }

        output.appendChild(row);

        setTimeout(renderLine, 12); // ⚡ скорость
    }

    renderLine();
}

/* GENERATE */
function generate() {
    if (isRunning) return;
    isRunning = true;

    loader.classList.add("hidden");

    setTimeout(() => {
        const u = createUser();
        lastData = [u];

        print(format(u));

        loader.classList.remove("hidden");
        isRunning = false;
    }, 500);
}

/* BULK */
function bulk() {
    if (isRunning) return;
    isRunning = true;

    loader.classList.add("hidden");

    const count = Math.min(50, Math.max(1, parseInt(bulkInput.value || 5)));

    setTimeout(() => {
        const arr = [];

        for (let i = 0; i < count; i++) {
            arr.push(createUser());
        }

        lastData = arr;

        print(arr.map(format).join("\n\n"));

        loader.classList.remove("hidden");
        isRunning = false;
    }, 500);
}

/* COPY */
function copy() {
    navigator.clipboard.writeText(output.innerText);
}

/* JSON */
function downloadJSON() {
    const blob = new Blob([JSON.stringify(lastData,null,2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.json";
    a.click();
}

/* CSV */
function downloadCSV() {
    const rows = ["Username,Name,Email,Phone,Country,City,Address,ZIP"];

    lastData.forEach(u =>
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.address},${u.zip}`)
    );

    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "users.csv";
    a.click();
}

</script>

</body>
</html>

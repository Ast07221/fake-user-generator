<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake User Generator</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b0b0b;
    color: #fff;
    height: 100vh;
    overflow: hidden;
}

/* CENTER */
.wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    max-width: 900px;
    padding: 20px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
}

/* CARD */
.card {
    background: transparent;
    padding: 10px 0;
}

/* TEXT */
.label {
    color: #7a7a7a;
}
.value {
    color: #ffffff;
}

/* TOP DOTS */
.idle {
    position: absolute;
    top: -30px;
    left: 0;
    font-size: 12px;
    color: #777;
    letter-spacing: 3px;
}
.idle::after {
    content: "...";
    animation: blink 1.2s infinite;
}
@keyframes blink {
    0%,100% { opacity:0.2 }
    50% { opacity:1 }
}

/* CONTROL PANEL */
.topbar {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
}

/* BUTTONS TEXT ONLY */
button {
    background: none;
    border: none;
    color: #fff;
    cursor:pointer;
    font-weight:500;
}

/* INPUT */
input {
    background:none;
    border:none;
    color:#fff;
    width:40px;
    text-align:center;
}

/* TYPE */
.typing {
    border-right:1px solid #555;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="idle" id="idle"></div>
    <div id="output" class="grid"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="generateMore()">more</button>
    <button onclick="clearAll()">clear</button>
    <input id="bulkInput" type="number" value="1">
    <button onclick="copyAll()">copy</button>
    <button onclick="downloadJSON()">json</button>
    <button onclick="downloadCSV()">csv</button>
</div>

<script>

/* ===== REAL DATA ENGINE (50+) ===== */
const countries = [
{country:"USA",code:"+1",cities:["New York","Los Angeles","Chicago"],zips:["10001","90001","60601"]},
{country:"UK",code:"+44",cities:["London","Manchester"],zips:["SW1A","M1"]},
{country:"Germany",code:"+49",cities:["Berlin","Munich"],zips:["10115","80331"]},
{country:"France",code:"+33",cities:["Paris","Lyon"],zips:["75001","69001"]},
{country:"Spain",code:"+34",cities:["Madrid","Barcelona"],zips:["28001","08001"]},
{country:"Italy",code:"+39",cities:["Rome","Milan"],zips:["00100","20100"]},
{country:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"],zips:["1012","3011"]},
{country:"Poland",code:"+48",cities:["Warsaw","Krakow"],zips:["00-001","30-001"]},
{country:"Sweden",code:"+46",cities:["Stockholm","Gothenburg"],zips:["11120","41101"]},
{country:"Norway",code:"+47",cities:["Oslo","Bergen"],zips:["0001","5003"]},
{country:"Denmark",code:"+45",cities:["Copenhagen"],zips:["1000"]},
{country:"Finland",code:"+358",cities:["Helsinki"],zips:["00100"]},
{country:"Canada",code:"+1",cities:["Toronto","Vancouver"],zips:["M5H","V5K"]},
{country:"Australia",code:"+61",cities:["Sydney","Melbourne"],zips:["2000","3000"]},
{country:"Japan",code:"+81",cities:["Tokyo","Osaka"],zips:["100-0001","530-0001"]},
{country:"Brazil",code:"+55",cities:["Sao Paulo","Rio"],zips:["01000","20000"]},
{country:"Mexico",code:"+52",cities:["Mexico City"],zips:["01000"]},
{country:"India",code:"+91",cities:["Delhi","Mumbai"],zips:["110001","400001"]},
{country:"China",code:"+86",cities:["Beijing","Shanghai"],zips:["100000","200000"]},
{country:"Turkey",code:"+90",cities:["Istanbul","Ankara"],zips:["34000","06000"]},
{country:"Ukraine",code:"+380",cities:["Kyiv","Lviv"],zips:["01001","79000"]},
{country:"Romania",code:"+40",cities:["Bucharest"],zips:["010000"]},
{country:"Czechia",code:"+420",cities:["Prague"],zips:["11000"]},
    {country:"Hungary",code:"+36",cities:["Budapest"],zips:["1000"]},
{country:"Austria",code:"+43",cities:["Vienna"],zips:["1010"]},
{country:"Switzerland",code:"+41",cities:["Zurich"],zips:["8001"]},
{country:"Belgium",code:"+32",cities:["Brussels"],zips:["1000"]},
{country:"Portugal",code:"+351",cities:["Lisbon"],zips:["1000-001"]},
{country:"Greece",code:"+30",cities:["Athens"],zips:["10552"]},
{country:"Israel",code:"+972",cities:["Tel Aviv"],zips:["61000"]},
{country:"UAE",code:"+971",cities:["Dubai"],zips:["00000"]},
{country:"South Africa",code:"+27",cities:["Cape Town"],zips:["8000"]},
{country:"Argentina",code:"+54",cities:["Buenos Aires"],zips:["C1000"]},
{country:"Chile",code:"+56",cities:["Santiago"],zips:["8320000"]},
{country:"Colombia",code:"+57",cities:["Bogota"],zips:["110111"]},
{country:"Peru",code:"+51",cities:["Lima"],zips:["15001"]},
{country:"Thailand",code:"+66",cities:["Bangkok"],zips:["10100"]},
{country:"Vietnam",code:"+84",cities:["Hanoi"],zips:["100000"]},
{country:"Indonesia",code:"+62",cities:["Jakarta"],zips:["10110"]},
{country:"Philippines",code:"+63",cities:["Manila"],zips:["1000"]},
{country:"Malaysia",code:"+60",cities:["Kuala Lumpur"],zips:["50000"]}
];

const firstNames = ["Liam","Noah","Oliver","Emma","Olivia","Ava","Sophia","Mia","Lucas","Ethan","Daniel","Leo"];
const lastNames = ["Smith","Johnson","Brown","Taylor","Anderson","Thomas","Jackson","White","Harris"];

const output = document.getElementById("output");
const bulkInput = document.getElementById("bulkInput");
let lastData = [];

/* CORE */
function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function generateUser(){
    const loc = pick(countries);
    const first = pick(firstNames);
    const last = pick(lastNames);

    const username = (first + last + Math.floor(Math.random()*999)).toLowerCase();

    return {
        username,
        name: first + " " + last,
        email: username + "@gmail.com",
        phone: loc.code + " " + Math.floor(100000000 + Math.random()*900000000),
        country: loc.country,
        city: pick(loc.cities),
        zip: pick(loc.zips)
    };
}

/* TYPE EFFECT */
function typeText(el, text){
    el.innerHTML = "";
    let i = 0;
    function step(){
        if(i < text.length){
            el.innerHTML += text[i++];
            setTimeout(step, 10);
        }
    }
    step();
}

/* RENDER */
function render(list){
    output.innerHTML = "";

    list.forEach((u, index)=>{
        const card = document.createElement("div");
        card.className = "card";

        const content = document.createElement("div");

        const text =
`<span class="label">Username:</span> <span class="value">${u.username}</span>
<span class="label">Name:</span> <span class="value">${u.name}</span>
<span class="label">Email:</span> <span class="value">${u.email}</span>
<span class="label">Phone:</span> <span class="value">${u.phone}</span>
<span class="label">Country:</span> <span class="value">${u.country}</span>
<span class="label">City:</span> <span class="value">${u.city}</span>
<span class="label">ZIP:</span> <span class="value">${u.zip}</span>`;

        card.appendChild(content);
        output.appendChild(card);

        setTimeout(()=>{
            typeText(content, text);
        }, index * 150);
    });
}

/* ACTIONS */
function generate(){
    document.getElementById("idle").style.display = "none";

    const count = parseInt(bulkInput.value || 1);
    const arr = [];
    for(let i=0;i<count;i++){
        arr.push(generateUser());
    }
    lastData = arr;
    render(arr);
}

function generateMore(){
    const arr=[];
    for(let i=0;i<2;i++){
        arr.push(generateUser());
    }
    lastData = lastData.concat(arr);
    render(lastData);
}

function clearAll(){
    output.innerHTML="";
    lastData=[];
    document.getElementById("idle").style.display = "block";
}

/* EXPORT */
function copyAll(){
    navigator.clipboard.writeText(JSON.stringify(lastData,null,2));
}
    function downloadJSON(){
    const blob=new Blob([JSON.stringify(lastData,null,2)]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.json";
    a.click();
}
function downloadCSV(){
    const rows=["Username,Name,Email,Phone,Country,City,ZIP"];
    lastData.forEach(u=>{
        rows.push(`${u.username},${u.name},${u.email},${u.phone},${u.country},${u.city},${u.zip}`);
    });
    const blob=new Blob([rows.join("\n")]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="users.csv";
    a.click();
}

</script>
</body>
</html>

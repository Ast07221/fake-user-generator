<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Identity Engine</title>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#0b0b0b;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CENTER FIX */
.wrapper{
    width:100%;
    max-width:900px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    margin:0 auto;
}

.grid{
    width:100%;
    max-width:700px;
    max-height:650px;
    overflow-y:auto;

    display:flex;
    flex-direction:column;
    align-items:center;
    margin:0 auto;
}

/* CARD */
.card{
    width:100%;
    padding:14px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

/* ROW */
.line{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:15px;
    font-family:monospace;
    line-height:1.6;
}

.label{
    color:#777;
}

.value{
    color:#f2f2f2;
}

/* COPY BUTTON */
.copy{
    font-size:11px;
    color:#777;
    cursor:pointer;
    margin-left:12px;
}
.copy:hover{ color:#fff; }

/* LOADER */
.loader{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:11px;
    letter-spacing:4px;
    color:#777;
    font-family:monospace;
}

/* DOTS */
.dots span{
    animation:blink 1.2s infinite;
}
.dots span:nth-child(2){ animation-delay:0.2s; }
.dots span:nth-child(3){ animation-delay:0.4s; }

@keyframes blink{
    0%,20%{opacity:0;}
    50%{opacity:1;}
    100%{opacity:0;}
}

button, input, select{
    background:#0b0b0b;
    border:none;
    color:#fff;
    font-size:14px;
    padding:6px 10px;
}

.topbar{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}
</style>
</head>

<body>

<div class="loader" id="loader">
    INITIALIZING ENGINE <span class="dots"><span>.</span><span>.</span><span>.</span></span>
</div>

<div class="wrapper">
    <div id="output" class="grid"></div>
</div>

<div class="topbar">
    <button onclick="generate()">generate</button>
    <button onclick="more()">more</button>
    <input id="count" type="number" value="1" min="1" max="200">
    <select id="country"></select>
</div>

<script>

/* ===== SAFE ENGINE ===== */
const ENGINE = [
{country:"USA",code:"+1",cities:["New York","Los Angeles","Chicago"],streets:["Main St","Oak Ave"],area:["201","305"]},
{country:"UK",code:"+44",cities:["London","Manchester"],streets:["High St","Oxford St"],area:["74","77"]},
{country:"Germany",code:"+49",cities:["Berlin","Munich"],streets:["Hauptstr","Bahnhofstr"],area:["151","160"]},
{country:"France",code:"+33",cities:["Paris","Lyon"],streets:["Rue Victor Hugo","Rue Lafayette"],area:["6","7"]},
{country:"Netherlands",code:"+31",cities:["Amsterdam","Rotterdam"],streets:["Damrak","Kalverstraat"],area:["6","20"]},
{country:"Japan",code:"+81",cities:["Tokyo","Osaka"],streets:["Shibuya","Ginza"],area:["70","80"]}
];

const firstNames=["Alex","John","Emma","Noah","Liam","Olivia","Mia"];
const lastNames=["Smith","Brown","Johnson","Taylor","Lee","Walker"];

const output=document.getElementById("output");
const select=document.getElementById("country");
const loader=document.getElementById("loader");

let last=[];

/* INIT */
function init(){
    select.innerHTML=`<option value="all">any country</option>`;
    ENGINE.forEach(c=>{
        const o=document.createElement("option");
        o.value=c.country;
        o.textContent=c.country;
        select.appendChild(o);
    });
}

/* RANDOM */
function pick(a){
    return a[Math.floor(Math.random()*a.length)];
}

/* USER */
function user(){
    const d = select.value==="all" ? pick(ENGINE) : ENGINE.find(x=>x.country===select.value);

    const first=pick(firstNames);
    const last=pick(lastNames);

    const username=(first+last+Math.random()*999|0).toLowerCase();
    return{
        username,
        name:first+" "+last,
        email:username+"@gmail.com",
        phone:`${d.code} ${pick(d.area)} ${Math.random()*9000000|0+1000000}`,
        country:d.country,
        city:pick(d.cities),
        street:pick(d.streets)+" "+(Math.random()*200|0)
    };
}

/* TYPE EFFECT (FIXED SPEED) */
function typeText(el,text,cb){
    let i=0;
    function t(){
        if(i<text.length){
            el.textContent += text[i++];
            setTimeout(t,18); // slower + stable
        } else if(cb) cb();
    }
    t();
}

/* RENDER */
function render(arr){
    output.innerHTML="";

    arr.forEach((u,i)=>{
        const c=document.createElement("div");
        c.className="card";
        output.appendChild(c);

        const lines=[
            ["User",u.username],
            ["Name",u.name],
            ["Email",u.email],
            ["Phone",u.phone],
            ["Country",u.country],
            ["City",u.city],
            ["Street",u.street]
        ];

        let idx=0;

        function next(){
            if(idx>=lines.length) return;

            const [l,v]=lines[idx++];

            const row=document.createElement("div");
            row.className="line";

            const left=document.createElement("span");
            left.className="label";
            left.textContent=l+": ";

            const val=document.createElement("span");
            val.className="value";

            const copy=document.createElement("span");
            copy.className="copy";
            copy.textContent="copy";
            copy.onclick=()=>navigator.clipboard.writeText(v);

            row.appendChild(left);
            row.appendChild(val);
            row.appendChild(copy);

            c.appendChild(row);

            typeText(val,v,next);
        }

        setTimeout(next,i*40);
    });
}

/* FAST GENERATE (NO DELAY) */
function generate(){
    loader.style.display="block";

    const n=parseInt(document.getElementById("count").value||1);

    last=Array.from({length:n},user);

    render(last);

    loader.style.display="none";
}

/* MORE */
function more(){
    const extra=Array.from({length:3},user);
    last=last.concat(extra);
    render(last);
}

init();
window.onload=generate;

</script>
</body>
</html>
